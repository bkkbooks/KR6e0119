body:
  text: 上京開龍寺圓通悟理大師賜紫沙門鮮演述疏歸命者顯歸敬之相也歸者依投趣向義命者總御諸根一身之要更無二焉又准西域記云天竺致敬之式其儀有九一發言問訊二俯首示敬三舉手高揖四合掌平拱五屈膝六長跪七手肘據地八五輪著地九五體投地今言歸敬義兼八九又准清涼而有十門一我慢禮如碓上下無恭敬心二唱和禮高聲𠻤雜詞句渾亂此二非義三恭敬禮五輪著地捧足殷重此則小教及始教中相宗禮也四無相禮入深法性離能所相即始教中空宗禮以順空義故五起用禮雖無能所普運身心如影普遍禮不可禮則終教禮通理事故六內觀禮但禮身內法身真佛不向外求七實相禮若內若外固一實故此二頓教無心是道即心是佛名之禮也但禮心佛無禮禮故八大悲禮隨一一禮普代眾生次三圓教此通終教圓教一乘故同體大悲曲論有二一同一理體二同一事體前則同教後則別教謂同體大悲自禮即是他禮故九總攝禮攝前六門以為一觀上有八門今言六者不取前二故但六也十無盡禮入帝網境若佛若禮重重無盡經云於一微塵中具一切諸佛菩薩眾圍遶法界塵亦然一一如來所一切剎塵禮若依此禮一一禮即有無盡功德豈可量哉不依此觀徒自疲勞又賴萬行一一皆爾細思行心看入阿門勿自欺謾一生虗度釋曰上言歸敬正當第十傍兼前七不唯上求於加護抑又下設於軌儀幸願群英勉旃行焉言無盡三寶者何故此三通稱寶名准心地觀經具足十義一堅固如摩尼珠寶無人能破佛法僧寶亦復如是外道天魔不能破故二者無垢如世間勝寶清淨光潔不雜塵穢佛法僧寶亦復如是能速遠離煩惱塵垢三者與樂如天德瓶能與安樂佛法僧寶亦復如是能與眾生世出世樂四者難遇如吉祥寶希有難得佛法僧寶亦復如是業障有情億劫難遇五者能破如如意寶能破貧窮佛法僧寶亦復如是能破世間諸貧苦故六者威德如轉輪王所有輪寶能伏諸怨佛法僧寶亦復如是具六神通降伏四魔七者滿願如摩尼珠隨身所求能與眾寶佛法僧寶亦復如是能滿眾生所修善願八者莊嚴如世間寶莊嚴王宮佛法僧寶亦復如是莊嚴法王菩提宮九者最妙如天妙寶最為微妙佛法僧寶亦復如是超諸世間最勝妙寶十者不變譬如真金入火不變佛法僧寶亦復如是世間八風不能傾動佛法僧寶具足無量神通變化利樂有情暫無休息如是義故佛法僧說名為寶言十號之一者瑜伽八十三解十號云一如來倣同先迹號二應供堪為福田號三正遍知達偽通真號七無上士調御丈夫降生成道號八天人師應根說法號九佛三覺圓明號十世尊處世獨尊號今當第七降生成道號也言法界亦二義一成上依處等者清涼或以寬釋狹如今文是上言塵剎狹下言法界寬以寬釋狹狹亦成寬或以狹釋寬華藏品文云華藏世界所有塵一一塵中見法界寶光現佛如雲集此是如來剎自在上言法界寬下言寶光等狹以下狹釋上寬寬亦稱狹宜細詳審言十力者一處非處力等言無畏者一一切無畏等言百四十不共者瑜伽云謂諸如來三十二大人相八十種隨好四一切種清淨十力四無所畏三念住三不護大悲無應失法永害習氣及一切種妙智即其義矣言無盡之德者故經云剎塵心念可數知大海中水可飲盡虗空可量風可繫無能盡說佛功德言承恩重者曠劫積修難行苦行本為眾生故隱實顯權成道說法種種曲巧處處開悟故用大悲力碎金剛體祐及法界留二十年福蔭含靈潛形護持稱性華嚴令見聞者當成佛道故清涼云一發心普被恩始自發心終護極果普緣眾生而為化境二者難行苦行恩猶如慈母咽苦吐甘謂捨頭目髓腦國城妻子割身千燈投形餓虎香城粉骨雪嶺亡軀如是身等事皆為眾生三一向為他恩曾無一念為於自己由如慈母但念子樂自然碎經云菩薩所修功德行不為自己及他人但為最上智慧心利益眾生故迴向四垂形六道恩為證滅道應受無為寂滅之樂而垂形六道遍入三塗以身救贖一切眾生五隨逐眾生恩上辨橫遍六道今約長刧不捨如子見父視父而已無出離心如來慈父備將萬行隨逐救攝等六大悲深重恩故善財童子謂無憂德神云聖者譬如有人唯有一子憂念情至忽見被人害截支體其心痛切不能自安等七隱勝彰劣恩十蓮華藏微塵之相滴海難稱無盡之德並隱不彰但云百劫修成三十二相三十四心斷見修惑五分法身覺樹初圓如老比丘同五羅漢故法華中脫珍飾服著弊垢衣執除糞器往到子所等八隱實施權恩圓頓一乘隱而不說乃以三乘人天小法教化眾生此上二恩淨名香積品彼來菩薩讚云如世尊釋迦牟尼佛隱其無量自在之力乃以貧所樂法度脫眾生等九隱真現應恩故法華云若見如來常在不滅便起憍慢而懷厭怠等十悲念無盡恩謂世尊同人中壽應受百年留二十年福以庇末法弟子等留三藏八藏之教廣益眾生依之修行皆得成佛形像塔廟乃至舍利一興供養千返生天等自頂至足從生至死皆佛之蔭斯之恩德何可報耶得人小恩常懷大報即涅槃經不知恩者多遭橫死即華嚴經具斯十義故云恩重言一約事就義門約別相事體之上各各隨義以成三寶隨一事體義具三寶故云同體言今舉佛所住等者屬今文也攝法從人故言二約會事從理門會三寶差別之事歸一真無差之理故云同體言今佛舉法等者屬今文也言三約理義融現門者約理體上義開三寶和融顯現故稱同體或理是佛法義是法寶融是僧寶現通三寶言由此一門等者屬今文也於所住中三寶足矣言三門雖異並稱同體者通釋上三言力持身者舍利等也言通於諸乘等者小權實乘也言歸勝非劣者約乘名勝一乘也約寶名勝同體也言以是海會之上首者初普賢者下疏云體性周遍曰普隨緣成德曰賢此約自體又曲濟無遺曰普隣極亞聖曰賢此約諸位普賢又德周法界曰普至順調善曰賢此約當位普賢又果無不窮曰普不捨因門曰賢此約佛後普賢位中普賢悲智雙運佛後普賢智海而滿而運即智之悲寂而常用窮未來際又一即一切曰普一切即一曰賢此約融攝又云而有十普一所求普二所化普三所斷普四所行事行普五所行理行普六無礙行普七融通行普八所起用普九所行處普十所行時普故新集稱讚三寶六師文云普賢菩薩懺悔師者冥真妙體稱性海遍塵方應物嚴身隨緣起而相周沙界靈山會上後乘象王而來覺樹場中先作師子之吼皆徹果海初心得號如來總該因源妙覺猶稱菩薩善心若發應時現身罪障縱深暗中摩頂如來光讚眾剎何異微塵善財修因多劫不喻毛孔圓融三聖獨表顯於真空行布六師偏懺除於妄有或居堅固窟談具深真廣之圓宗或住峨嵋山修即遍即常之勝行或於寶威佛國不來而來或向華嚴法場不遍而遍神通叵測群生而欽依功德難思得諸佛而敬禮鈔標上首誠不虗矣上來所讚之事並出眾經次文殊者具足應曰曼殊室利含有四義一首具攝諸位故二勝最極深勝故三吉祥示居此土生有十徵故四德來自他體含萬德故又新集稱讚三寶六師文云文殊菩薩軌範師者諸佛勝母大覺祖師該信知之法門徹始終之佛境即權之實撈生常遍於十方即實之權化物久居於五頂善財暫遇頓發菩提勝心龍女纔逢速登阿耨正覺執如意寶滿含誠之所求乘師子王施有情之無畏果成先劫號稱龍種尊王道證今時名曰摩尼寶積過去弘法又目妙光未來證真後稱普見受闍王之堅請變珍饌而供多聖賢稟釋迦之微言寶鉢而化諸天子既為佛陀祖師豈非僧伽上首廣讚如彼事出眾經鈔一切眾生最勝良田者良田之言而有多種故下疏云於中佛塔菩薩知識父母是恩由亦敬田眾僧二乘是德田亦敬田貧孤是悲田亦苦田此等皆能生福如世之田若敬田有病亦敬亦悲乃成四句故智論十四云若憐愍施謂於貧窮下賤及畜生二恭敬施謂於佛及法身菩薩等三憐愍恭敬施謂於老病貧窮阿羅漢辟支佛等總収為二謂悲與敬其非敬非悲亦悲田攝無德可敬故然此二田以理䘖心則等無優劣故淨名曰施最下乞兒猶如如來福田無異無所分別等若直就境論則敬強悲劣以恩深德厚故如校量功德經說若就於心則悲田為勝親引悲故故敬則田強而悲心弱悲則田弱悲心強各有其羨俱為良田若當是敬田恩則勝德故校量經云供百羅漢不及一生身父母阿含中說供養父母供一生補處功德齊等若同是恩在家則父母恩勝出家則師僧恩勝如舍利弗請問經說或約生色身及生法身則優劣可知矣若同是德田別不普故如梵網經說別請五百羅漢菩薩僧不如僧次一凡夫僧又由主則田異感報勝劣種種不同恐繁不載信知諸境福田同大地而原濕無間仰推三寶勝德若拔壤而作鹵寧參鈔指良田斯之謂歟言良以普賢該因徹果佛前佛後者該因遍六位之深因徹果通五周之妙果或該因得果不捨因也徹果初心成正覺也佛前曲濟無遺曰普隣極亞聖曰賢佛後果無不極曰普不捨因門曰賢言遮那心源者性海果分也普賢行海者緣起因分也言仰託三尊者佛法僧也或三聖也言疏中欲掩是非等者通妨也謂有難云疏意欲指昔瑕何不顯說故云疏中欲掩是非既爾鈔中何說傳者須知得失何須撰鈔諸徒誠請難以違文何須頓敘長時弘傳等言世路以多岐亡羊者列子第八曰揚子之隣人亡羊既率其黨又請揚子之竪賤童追之追求也揚子曰嘻許其反噫嘻傷歎也亡一羊何追者之眾隣人曰多岐路既返問獲羊耶曰亡之矣曰奚何也亡之曰岐路之中又有岐焉吾不知所之所以返也揚子蹙七六反然變容不言者移時不笑者竟日門人恠之請曰羊是賤畜又非夫子之有而損言笑者何哉揚子不答知問非也門人不獲所命弟子孟孫揚出以告心都子心都子他日與孟孫揚偕入而問曰昔有昆兄也弟三人遊齊魯之間同師而學進仁義之道而歸其父問曰仁義之道若何伯長也曰仁義使我愛身而後名身體髮膚不敢毀傷仲曰仁義使我殺身以成名無求生以害仁有殺身以成仁叔曰仁義使我身名並全既昭且哲以保其身彼三術相反而同出於儒孰是孰非耶揚子曰人有濱河而居者習於水勇於泅音囚浮也勇健於浮操舟鬻渡販賣渡人利供百口褁粮就學者成徒學浮者多而溺死者幾半本學泅不學溺而利害如此若茲之類孰是孰非乎心都子嘿然而出孟孫揚讓之曰讓者請也何吾之問之迁夫子答之僻吾惑愈甚心都子本會揚朱之不言故問之仁義揚朱本會心都子所問故答以泅水而孟孫揚不閑喪生之道恠不答失羊之意故迷惑甚也釋曰大道以多岐亡羊學者以多方喪真學本一而末異也子長先生之門習先生之道而不達先生之況者哀哉言各呈其能者文選云人人握靈蛇之珠家家抱荊山之玉言昔可尚也等者意云昔日章疏堪可尚重我今何有言詞或云昔可尚重多人同解我今解釋何有難詞言五百比丘等者出涅槃經三十二菩薩等者出維摩經言如折金杖等者脇尊者語言故經云者金剛三昧經也言況華嚴性海等者上之所明猶通餘教況我華嚴不彰心觀言不貴宗通唯攻言說者宗通復二一現量宗通自獲禪定親證法門心冥至理口為人說則所教者多有證達如解脫禪師得佛光觀又得無生忍故所教八百餘人皆獲禪定二比量宗通因依師教達甚深理比譬度量於境不謬解符妙趣示導含靈則所教者亦有證達近代禪師之類也故圭峯云微細習情起滅彰於靜慮差別法義羅列見於空心虗隙日光纖埃擾擾清淨水底影像昭昭豈比夫空守默之癡禪但尋文之狂慧也言唯攻言說者心無妙解口誦禪歌念諸家章疏之文狀同缾鴻昧一心寂照之理勢若雲以此誨人豈獲義利苑公之類即其人也言不能以聖教為明鏡至照經幽旨者破刊定也如圭峯云迷之則觸面向墻悟之則萬法臨鏡若空尋文句或信胷襟於此一心性如何了會哉言玄言理說等者此經多有玄妙之言稱理之說刊定並謂與隨宜之談雷同以深為淺失其大利也合空廓自己有相心情以求宗趣刊定銘目自出情懷胷臆判斷以生滅心行說實相法門也言不知萬行令了自心者如解脫長者誡善財云善男子應以善法扶助自心應以法水潤澤自心應於境界淨治自心應以精進堅固自心應以忍辱坦蕩自心應以智證潔白自心應以智慧明利自心應以佛自在開發自心應以佛平等廣大自心應以佛十力照察自心又遺教經云汝等比丘已能住戒當制五根勿令放逸乃至云此五根者心為其主是故汝等當好制心心之可畏甚於毒蛇惡獸怨賊大火猛焰未足喻也譬如有人手執蜜器動轉輕躁但觀於蜜不見深坑譬如狂象無鈎猿猴得樹騰躍跳躑難可禁制當急挫之無令放逸縱此心者喪人善事制之一處無事不辦是故比丘當勤精進折伏其心刊定反此故云不知言一生駈駈但數他寶者問明品云譬如貧窮人晝夜數他寶於法不修行多聞亦如是言或年事衰邁等者如云吾昔年來積學問也曾討疏尋經論分別名相不知休入海筭沙徒自困即其人也言豈唯抑乎佛心者佛說經心令依教而悟理隨悟理成而觀今廢教求禪故鈔云爾言用以心傳心之旨者即達磨之旨此心即是一切眾生本覺心也師資相望立以傳名此意用禪門傳心之旨開華嚴佛證之門言會南北二宗之禪門者圭峯云北宗意謂眾生本有覺性如鏡有明性煩惱覆之不見如鏡有塵闇若依師言教息滅妄念念盡則心性覺悟無所不知如磨拂昏塵塵盡則鏡體明淨無所不照故彼宗主神秀呈五祖偈云身是菩提樹心如明鏡臺時時勤拂拭莫遣有塵埃南宗意謂諸法如夢諸聖同說妄念本寂塵境本空空寂之心靈知不昧即此空寂之知是達磨所傳清淨心也任迷任悟心本自知不藉緣生不因境起迷時煩惱知非煩惱悟時神變知非神變然知之一字眾妙之門由迷此知即起我相人相計我我所愛惡自生隨愛惡心即為善惡善惡之報受六道形世世生生循環不絕若得善友開示頓悟空寂之知知且無念無形誰為我相人相覺諸相空心自無念念起即覺覺之即無修行妙門唯在於此故雖備修萬行唯以無念為宗但得無念則愛惡自然淡薄悲智自然增明罪業自然斷除功行自然精進於解則見諸相非相於行即名無修之脩煩惱盡時生死即絕生滅滅已寂照現前應由無窮名之為佛和前見性偈云菩提本無樹心境亦非臺本來無一物何假拂塵埃即斯義也言撮台衡等者天台智者衡山思師空假中三觀文也言雖入先生之門至猶迷衣內之珠者上半即列子中事已見上引下半即法華之意今當略陳即第四五百弟子授記品譬如有人至親友家醉酒而臥是時親友官事當行以無價寶珠繫其衣裏與之而去其人醉臥都不覺知起已遊行到於他國為衣食故勤力求索甚大艱難等繁不委序而言善友者唯下疏云世之善友略有七事一遭苦不捨二貧賤不輕三密事相告四遞相覆藏五難作能作六難與能與七難忍能忍如來亦爾為物隨於六趣苦而不捨貧無法財而不見輕本性客塵無不相告善根未熟則以權覆實堪真實化則以實覆虗著弊垢衣執持糞器為難作能作解髻明珠為難與能與生違佛化乃至多劫心無退動為難忍能忍言雜以邪宗者迷真異執教也言使圓實不分漸頓安辨者真具分滿教也言即用之體不成者業用既有德相獨無即業用之德相不成故言交徹之旨寧就者生佛交徹義不成也言却令相用二門無由成異者真如但是德相之因云何通與業用為因言以緣起相由之玄旨事理無礙義同理性融通之一門事理無礙義言大緣起者具足十門體周法界揀非內外故名為大言非是重古輕今者釋氏六帖云重古經今註引破邪云俗儒好長古而短今談前而薄後不非古之虗美責今之實論信久遠之偽辭忽近今之實事不知損馬之要而竟儒墨之談膏旨之病故難治矣釋曰疏主不爾故云非也言不欲欺誣亡沒者故肇論序云此實巨蠱之言欺誣亡沒街巷陋音未之足拾言使質而不野者出於論語子曰質勝文則野包曰野如野人言鄙略也文勝質則史包曰史者文多而質少文質彬彬然後君子包曰彬彬文質相半之貌即其意也言不分通局者性相共有名通一宗獨有名局言或多用法相而復盡呼為權者法相通權實故言即當既別者圓融行布別故言天之日月易之乾坤者顯性相理齊恐法相師是非心生故或日明月暗乾高坤下意彰不齊故言三倒者下疏云見想心三倒也謂於前諸事起心分別常無常等名為心等於常等境取分齊相名為想倒於想執實名為見倒翻背正信立以倒名然小乘中或說想心見三次第而起或說一時義分前後心想非倒由見亂故立以倒名雖諸說不同皆依六識建立若大乘中亦有多說一云依七識心義分三倒謂七識妄心性是乖理顛倒之法名為心倒依是心故便有一切妄境界生如依夢心有夢境起即於彼境妄取其相說為想倒於所取法執實分明說為見倒依此三倒於為無為境起常無常等八種顛倒諸宗異說恐厭繁文即斯義也言至如昇兜率品等者略示昔人不知之處謂佛地經佛有二十一種功德無著等菩薩立名解釋然觀下疏將論配經若非賢聖豈能如爾法界品末又重引釋義轉幽微言然於四十二位等者下疏配五十二位今云四十二抄寫者誤或攝十信入初住中言引六會經文等者始從第二會至第七會信住行向地及等妙二覺而對釋之言翻驗昔解臆說尤多者彈刊定也謂彼將十信却作十住等言五眼者肉天慧法佛也言十眼者加智眼光明眼出生死眼無礙眼一切智眼言六通者他心天眼宿住天耳漏盡神境通也言十通者一他心二天眼三知過去劫四知未來劫五天耳六不動往剎七分別言詞八無數色身九一切智十滅定智通也言十信者菩願化力相威意福法智也言四智者大平妙成也言九門六度等者瑜伽九門別顯六度清涼採用以釋此經十度言九門者一自性出行體二一切能具行三難行別顯勝四一切行差別五善士作饒益六一切種攝聖教七遂求隨所須八清淨攝成度九二世樂現當益言十通十忍等者十通六通如前言十忍者音順無幻焰夢響影化空言五忍者伏信順無寂十通十忍品中自會須者應撿言十身融三身者菩願化力意即化身也相威福兼報化也即法身智通三身局唯法報言十智融三智者十智者一無依成事智二體無增減智三體均益生智四用興體密智五滅惑成德智六依持無礙智七窮劫利樂智八知無不盡智九巧令留惑智十性通平等智言三智者真俗中智也就十智中達事之用融俗智照理之用融真智證無礙之用融中智也言十門涅槃者一體性真常門二德用圓備門三出沒常湛門四虧盈不還門五示滅妙存門六隨緣起盡門七存亡互現門八大用無涯門九體離兩邊門十結歸無住門言四涅槃者自性清淨有餘依無餘依無住處十中體攝性淨用攝餘三也言一智融於四智者第四用興體密一智融大圓鏡等四智也言三聚者攝律儀攝善法攝眾生也良以二地三聚戒度成就全離誤犯之愚行時蟻行分路等故名離垢言八禪者色無色界各有其四依定發慧照了大乘無邊妙法故名發光言道品者三十七種菩提分法也成無生之慧光者發智大焰燒煩惱薪證無生理之慧也言諸諦者一十五諦也言星羅十門目滿三觀者一有支相續門二攝歸一心門三自業助成門四不相捨離門五三道不斷門六三際輪迴門七三苦集滅門八因緣生滅門九生滅繫縛門十隨順無所有盡門隨一門中而有三觀一相諦差別觀二大悲隨順觀三一切相智觀言非是懸指昔三中乘所見者揀異古人謂昔人但指如中乘緣覺所觀是也今則不爾依一乘解或云非是懸指法華已前昔日三乘中間獨覺所觀之境也言權實雙行者止觀齊駈或即空方便智發起有中殊勝行理量雙行言七分該羅者謂集作地分淨忍分得勝行分淨佛國土分自在分大勝分釋名分言無功之道者故唯識云法駛流中任運轉故十三住中無相無功用故言四十辯才者法義詞樂四無礙辯各有十相故成四十言十相者一自相二同相三行相四說相五智相六無我慢相七大小乘相八菩薩地相九如來地相十作住持相言方盡種智之深玄者究竟始覺也言始成正覺等者小教則脩滿三祇三十四心斷結創圓五分三十二相莊嚴始教則歷三賢而經十地創過金剛之心轉八識而成四智初得解脫之道終教則覺心初起妄念頓除智理冥同始本不二頓教則咸遣如義之言盡除寂靜之念初獲得入創合一心圓教則真應無礙一多自在混四法界攝三世間時窮念劫處盡剎塵念念新新常成常覺故云以諸宗始成以會之言二智理量也言三智真俗中也言四智大平妙成也言兔章者一所依巾真性二幻師術法心識三所幻兔依他四幻兔有即無我法即空五癡執為實迷執我法下疏中即是馬章然兔與馬隨應皆得言分三影以別之者下疏引攝論釋云一水月喻喻於定地所引境界以水有潤滑澄清性故二光影喻喻於諸識映光弄影影成千差於境牽識識變萬殊故三鏡像喻喻非定地果報好醜影異隨質不同故苦樂果殊由業有異故言剎平等等出諸句以揀文者准下疏釋則有五種四句第一四句者一剎相二眾生相三剎無性理四眾生無性理此四句為本第二四句者一剎相即無性以事不存故二剎相不即無性以不壞事故三剎無性即剎以不守自性故四剎無性不即剎以性不變故剎上事理分此四句第三四句者眾生無無性亦同剎說第四四句者一剎無性即眾生無性以無二故二剎無性不即眾生無性以無可即故三剎相即眾生相理性融故四剎相不即眾生相不壞相故第五四句者一剎相眾生無性二剎相不即眾生無性三眾生相即剎無性四眾生相不即剎無性後四重四句中初及第三句是相融義二四兩句當句為門雖不相融與彼相即同一緣起故成無礙然為門不同有多差別理實諸句無不融通也言歷境起願以橫竪次位而彰之者彼有三十一願大同淨行歷多境顯之約橫釋配六位彰之約竪釋也言普賢三昧等者第三品也其定體用也普入一切佛平等性能於法界示眾影像廣大無礙同於虗空法界海旋靡不隨入具無盡德等故云窮妙中之妙或是三十六普賢行品抄寫者誤與出現品是平等因果故彼品中明所治廣多一障一切障故能治深妙一斷一切斷故等言出現一品等者故綱要云然此一品玄中之玄妙中之妙極物本源罄佛淵海又下疏云然此一品文旨宏奧能頓能圓究眾生之本源罄諸佛之淵海根本法輪之內更處其心生在金輪種中復為嫡子妙中之妙玄中之玄並居凡類之心以小功而速證安得自欺而不受長淪生死之中今聞能欣尤須自慶昔善等是也言至如法界等者顯疏包含也法界觀文扗順造華藏觀文旨歸義理分齊賢首造開鍵文超法師造關中維摩疏開脉繫表應是生肇融叡等諸法師所造章疏皆是性宗開節血脉網繫表顯之文也言三玄挌言周易真玄老子虗玄莊子談玄儒道正妙之言不出於此或挌言者通指詩書也言上古妙義用而不言者獲盜法之𠍴也故下疏第九下半四十二紙內云從他聞言已解為盜法觀佛三昧經說此人墮地獄如箭射空後學誡也言如破娑婆形如虗空者藏品中廣敘世界體形至此界云形如虗空而刊定破云大小乘經論但說虗空無形狀今既言如譯之誤也先師賢首在其譯場之內故清涼出古意云外書中說六合之空狀如圓帳古就外況故無失也如法華云譬如梵王是眾生父如來豈不知妄計但就常情所知爾言晉經失旨致古釋詞枝者晉經云譬如河水不至彼岸不來此岸不斷中流也一遠公云前不趣二處是離有後不住中流是離無謂生死無處名中流不住此無故云不住中流也二賢首云如東流水不住南岸不住北岸亦得說言不斷北岸中流以中無別體約岸分故若爾南岸亦得何以不言涅槃中流由所度眾生在此岸故所以偏就生死而說今文分明何須敘昔者此破刊定故唐經去譬如船師不住此岸不住彼岸不住中流等下疏釋云生死即此岸涅槃合彼岸合上中流亦言生死者以發心之後成佛之前十地三賢尚居二死是以中流即是生死故云生死中流非生死涅槃之中間名生死中也有以煩惱為中流約其漂溺從因說也即生公釋維摩意也有以聖賢為中流約受生死之人也什公釋淨名意也有以中道為中流約觀行說肇公意也斯皆清涼會餘師釋中流之義也言毒蛇螫手不得不斬者通妨也恐外難云不許破他清涼何故亦破他義故此云爾一云不得不斬於毒蛇二云不得不斬於自手若不斬之毒氣遍體命難得濟表事之不已不得輕浮言初中後善者暗用經句經云初善中善後善其義深遠其語巧妙等疏非以一緣等者問法華云唯以一大事因緣故如來出現今文非一若謂通會今為釋云此云非一非一小因緣彼經言一是一大因緣故或此言非一表自一乘多緣彼言唯一揀他三乘多緣故鈔轉勢用之者更段用之彼以須彌合佛身智合論動合說經亦通共與不共今文須彌合身智慧合海動搖合說但論不共不通其共故云轉勢言又於於經中等者前解智通能所後解身亦通二疏因十義等者通有三釋一皆用華嚴即體之義為因二皆用華嚴異體之義為因三隨應不定且初即體之義為因者應先問云有何所以佛說華嚴一法應爾故如火之熱非由別因法爾合熱大華嚴經常說遍說非由別因法爾合說故二酬宿因故但取經上能酬之義非取所酬為因三順根感故但取經上能順根感之義非取所順為因四為教本故但取經上能為諸教根本之義非取諸教為因五顯果德故取能顯義六彰地位故取能彰義七說勝行故取能說義八示真法故取能示義九開因性故取能開義十利今後故取能利義皆華嚴即體之功而為說經所以二異體之義為因一法應爾故准世界成就品疏文云二法如是者梵云達磨多此云法爾或云法性若是法性即以本識如來藏身為所依持恒頓變起外諸器界可證後義若云法爾者謂有問言何以諸佛眾生起於剎土答法應如是不可致誥可證前義若會此二謂法應如是藏識變起釋曰雙會二義彼論世界之因既爾此辨起經之因亦然但云法爾准此應悉二酬宿因取所酬願行為說經因三順根感亦取所順四為教本亦取諸教為因如欲接梨先裁扗橛是知梨為扗橛之因欲施末教先示本法是知末教却為本法之因五顯果德取所顯也乃至十利今後皆取所利故三隨應不定為教本取即體義為因利今後多取即體之義為因餘皆異體為因或皆通二學者更詳疏不待別因者問緣起法門既不退因涉自然外道之義答非全無因但用法爾一因故若爾下有九因云何不待答此意假設更無別因法爾一因足今說經故云不待或法爾因據有體有力攝餘九因故云不待疏何以法爾如是轉取即宿因深故等者問酬宿因義即我世尊初成佛道頓說華嚴是知有始云何釋成法爾轉耶答但約現在一佛可許有始逆推過去多佛故成無始或我世尊但傳古事非自新說如世君王初登寶位但行故道非創新規故成法爾又據現在新佛即過去古佛故云無始又據現在一時即過去多時故云無始故疏云時以剎那堅窮劫海疏創躡玄蹤等者釋因果大也一云創躡玄蹤至頓朗萬法釋因深及以下二句釋果大也一云創躡至齊周釋因深是以至妙門釋果大創躡玄蹤者釋初發事相菩提之心遊履一乘玄門蹤跡也捿神妙寂者離一切相契同寂理捿止神思在微妙寂滅理中上句存相菩提心下句遣相菩提心事理無礙存泯莫拘真發心也或上句觀下句止止觀無礙為真修也言悲智雙運者自他俱利也言行願齊周者一一稱性深無邊際一一等空廣無邊際言是以者躡前起後也由此因深故得果大言妄想弗剪而廓徹性空者不斷而斷悟大夜之重昏如理之真智也言靈鑒匪磨而頓朗萬法者無脩而修朗萬法之幽邃如量之俗智也乃用無障礙解脫智力宣闡此華嚴微妙法門也上之二因並是德相約法性力約佛德能常遍說故下之八因並是業用驗根示導故或唯初一是德相因中間八因是業用因故疏云乃以無障礙解脫闡斯妙門神通解脫唯業用故最後一因通德相業用何以得知前九是別第十是總總必攝別故或初一亦通業用鈔引不思議品神通說故鈔依內現依正等者問相入門中既有正中現依依中現依正應有依正中現正及依中現正然相入者必更互故若許爾者應成八句何但有六今謂通云理實可爾且就顯勝一中現二非取二中現一如舉塵毛之分現圓非取身剎之圓現分之例也問何故相即不同相入而作六句耶今加二句云此佛依正即彼佛之依此佛之依即彼之正今謂通云上句不異四句中第一句唯有剎故下句不異四句中第二句唯有正故若更救云彼四句中能即成單此後二句能即成雙何云不異後更通云能即任單任雙其體咸廢唯有所即或剎或身故不異也故鈔云相即互亡故無有六設更難云此佛之依即彼佛依正此佛之正即彼佛正依此之二句依正雙存豈不異耶若許異者應成六句今復通云亦不異四句中第三句也若爾第三俱存句第四俱泯句為相即耶不相即耶若云相即云何身剎二句有體二俱無體若不相即云何即門足成句數況緣起門有體有體不並無體無體不俱故今謂通云身剎之上各有有體無體二義有體之義為所即無體之義為能即說雖前後俱則同時前之二句各取一有體一無體互為能所即第三句雙取二所即第四句雙取二能即所即各對彼能即能即還對彼所即非謂二有體並二無體俱故或二有體是不即義要由不即方能即故尋鈔自知鈔體外無用唯相即故等者此意約體相即據用相入體用互收即入互攝也問體既相即用何不即用既相入體何不入耶有師云法爾義異不應齊責勿將異門難異門也有師云可爾體相即時用亦相即用相入時體亦相入故疏云隨舉一門即攝一切今謂通云有體無體有用無用是緣起相由門相即相入乃是玄門如佛全身在一塵中分明顯現豈非幽玄相入玄門已得成立二俱有體不成緣起何以佛身在彼塵中良以一塵有力作能攝佛身無力為所攝無力必假於有力必資於無力緣起義成作相入之所以也此意但約有力作能攝所入所以無力作所攝能入所以其體相入非謂唯用相入體不相入也如釧即金金廢釧體即是金體此是相即玄門也何以釧即是金良以釧無別體令攬金成金有自體能成其釧是故其釧還即是金是緣起相由作相即之所以也此意有體能成無體所成但是緣起相由作相即玄門之所以謂非唯體相即用不相即也今據緣起門中體用互攝故即入門亦更互全收也疏一道至果者釋有二義一者一因一果二者萬聖千賢同修萬行更無異路皆一道義疏若無此位行無成故者淮下疏釋略有十義一依唯識等而有五位一資粮位即是三賢從初發心積集福智為道資粮為眾生故修解脫分善二加行位順解脫分既圓滿已為入見道復修加行即四善根亦名順決擇分三通達位即是見道謂初入地二種見道四修習位始從初地第二位乃至金剛無間心位名為修道五究竟位金剛心後解脫道中盡未來際皆此位攝二依攝論第六說有四位一勝解行位始從十信終於地前餘三見究竟同五中後三三依瑜伽四十七說十三住者一種性住謂彼菩薩性自仁賢性自成就菩薩功德住持一切佛法種子性離麤垢不能現起上煩惱纏二勝解行住謂從初發心乃至未得清淨意樂所有一切菩薩行是三極喜住四增上戒五增上心六七八三名增上慧分上三種謂六覺分相應增上慧住七諸諦相應增上慧住八緣起流轉上息相應增上慧住九無相有功用住十無相無功用住十一無礙解住十二最上菩薩住十三最上如來住第二即是三賢第三已去如次十地四亦依瑜伽及顯揚第七於十三住建立十地一種性地二勝解行地三淨勝意樂地即前三住四行正行地謂從第四住乃至第九住五決定地即第十住六決定行地即第十一住七已後二住為到究竟地前六唯菩薩第七菩薩如來雜立為地五依仁王下卷說十三法師各住一位者一習種性二性種性三道種性四善覺摩訶衍五德慧六明慧七爾𦦨八勝達九常現真實十玄達十一等覺即八地十二慧光神變即當九地十三觀佛菩薩義當十地及等覺而佛非十三之數六依仁王上卷五忍者謂伏忍信忍順忍無生忍寂滅忍各各有上中下如次酬三賢十地等覺境覺七亦依仁王五十二位八依瓔珞四十二賢聖位以不立十信十信攝在十住中故九依瓔珞六種者一習種性二性種性三道種性四聖種性五等覺性六妙覺性又准下鈔十八上半第二紙復名六堅謂信堅法堅脩堅德堅頂堅覺堅復名六忍謂信忍法忍修忍正忍無垢忍一切智忍復名六慧聞慧思慧修慧無相慧照寂慧寂照慧名六觀謂住觀行觀向觀地觀無相觀一切種智觀亦有相承說於六定瓔珞無文言六定者一習相定二性定三道慧定四道種慧定五大慧定六正觀定此五種六皆以第五當於等覺自此已下還是前疏若依楞伽等無復地位十依此經說四十二位無別資粮加行等名然所說位依法性立行布圓融二俱無礙釋曰不唯此經獨彰地經寔乃餘教各顯階差欲導含生同躋聖域故也鈔如第二會明信等者信謂十信一信心信佛常住大乘教法歸宗不二決定無礙二念心於六念處憶念三精進心如念而行勤修止觀四慧心雙觀人法二種無我五定心解空處寂止心理靜六不退心止觀雙融心不退沒七迴向心善會平等迴向於捨八護法心解理堅固受持不壞九戒心善護身心三業齊清十願心以三業善正求菩提言三明住者住謂十住一發心住觀佛勝緣佛十力發菩提心三種發心即信成就發心二治地住謂常隨定脩諸行門淨心地故三修行住巧觀空有增正行故四生貴住生佛法家種姓尊貴五具足方便住帶真隨俗習多善巧化無住故六正心住成就般若聞彼讚毀佛法僧等真正其心念不同故七不退住入於無生畢竟空性心心常行空無相願止觀雙運緣不壞故八童真住心不生倒不起邪魔破菩提故九王子住從法王教生當紹佛位故十灌頂住從上九住當觀空理得無生心最為尊上諸佛法水灌心頂故言四明行者行乃十行一歡喜行三施皆能悅自他故二饒益行三聚之戒皆饒益故三無違逆行忍順物理無所違故四無屈撓行勤無怠退不屈弱故五離癡亂行以慧資定離沉掉故六善現行慧能顯發二諦之理般若現故七無著行不著事理遠離於我及無我故八難得行大果可尊又成大願方能得故九善法行善巧說法成物軌故十真實行言行不虗稱二諦故言五明向者向即十向一救護眾生離眾生相迴向大悲廣濟名為救護大智無著故云離眾生相二不壞迴向謂於三寶等得不壞信故三等一切佛迴向謂學三性佛所修迴向故四至一切處迴向謂菩薩悲願稱周法界令其善根供具悉周遍故五無盡功德藏迴向謂緣無盡境成無盡善根功德之行得十無盡藏之果故六隨順堅固一切善根迴向謂所修事善皆悉隨順入於堅固平等法性一切善根皆悉堅固故七等隨順一切眾生迴向謂以平等心隨順饒益一切眾生故八真如相迴向謂善根合如同如體相無盡得故九無縛無著解脫迴向謂不為相縛不於見著作用自在故名解脫十入法界無量迴向謂以稱性起周以法界善根迴向法界故言六明地者地謂十地一歡喜地謂初護聖性具證二空能益自他生大歡喜二離垢地具淨尸羅遠離微細毀犯煩惱苦故三發光地成就勝定大法總持能發無盡妙慧光故四焰慧地安住最勝菩提分法燒煩惱薪慧焰增故五難勝地真俗二智行相互違難合能合極難勝故六現前地住緣起智引無分別最勝般若令現前故七遠行地至無相住功用後邊出過世間二乘道故八不動地無分別智任運相續相用煩惱不能動故九善慧地成就微妙四無礙解能遍十方善說法故十法雲地大法智雲合眾德水蔽如虗空麤重充滿法身故言七明等妙者等謂等覺體空大寂安心平等照齊種智一相無二故妙即妙覺圓照內融窮鑒法性體無始終窮微盡極故名妙覺雖委陳於體義備在本文而略舉於門名亦於茲處然樂廣之達識無假預談慮好略之庸根不覺大疏如涉世路尚須知道店之名況詣覺場豈不曉地位之號唯希智者勿責詞技鈔此別明五位互攝者信住行向地也鈔第十住滿至亦灌頂成佛者證相似也以此二位功德圓滿同證諸佛智水灌心頂之妙果也言十行智度圓等者行相似也上雖略示總相而言所修妙因名行所獲妙果名證住行向地相梯而言一一相似各隨相似更互相攝也言海幢比丘頂出諸佛者下疏釋云頂出諸佛者尊極無上故就別彰法雨中總有三十二種前十二法雨為菩薩餘為雜類今初一普知平等法雨略有三等一始覺同本無復始本之異二等諸佛故三生佛一性故得此三等轉成妙覺次十法雨即十住者圓教經中十住位滿便成佛故此前更無別位此約以位攝以非一乘宗餘無此說後一法雨即十信釋曰初一妙覺次十十住後一十信今據逆次故云灌頂住後即明佛者即其事也言前唯約理行圓融者以理融行圓融也言此兼明行證相似者且約相似中圓融五長劫唯攝長劫等也鈔文有三節者引證也三節疏文通證前理行圓融也後二節文兼證前行證相似也如第二信該果海證理行圓融可知若將信滿功德該攝果滿功德亦證行證相似三第初發心時便成正覺證理行圓融可知但於住滿佛中密證行證相似言以一例諸位位皆然者復有二義一云一位具攝諸位功德等一云一位具攝五十二位功德後解為優言如賢首品中等者此品正明十信之德該攝後之四十二位故就若常信奉下五十頌半廣明信中所具行位初八頌半明所具行以三十九頌明所具諸位後三頌結嘆功德明具位中初八頌半明具三賢後三十頌半明具十地於中前十一頌半明具前九地後十九頌明具第十地位有五初八頌三業殊勝功德次四頌三業廣大功德三二頌辨得法結位四三頌明三昧大盡受位分五二頌明大用難測今言灌頂而昇位者即後二頌明大用難測是也故彼疏云若蒙下二頌亦是進入佛地也彼疏問曰此既是初何得乃具後諸行位及普賢德邪古德釋此略有二門一行布次第門謂從微至著從淺至深次第相承以階彼岸如瓔珞仁王起信瑜伽等說二圓融通攝門謂一位即其一切位等如此經所說今如大品等中一行具一切行此中具二門一緣起相由門二法界融攝門前中普攬一切始終諸位無邊行海同一緣起為普賢行德良以諸緣相望略有二義一約用由相待故有有力無力義是故得相收及相入也二約體由相作故有有體無體義是故得相即及相是也此經之中依斯義故行位相收總有四說一或始具終如此門中具一切行位普賢德海者是也二或終具始並在十地位後如下文十定十通等說三或諸位齊收並在十住等一一位中各收一切悉至究竟如下文十住十行等說諸位皆泯行德顯然如離世間品說二法界融攝門者謂此諸位及諸修行皆不離普賢無盡法界然此法界圓融無限隨在一位即具一切今在信門收無不盡下諸位中皆具一切者並准此釋又云如十味香纔燒一丸如小芥子十氣齊發若有聞香十味齊得若得沈氣則得檀氣若得酥合則得龍腦等十味丸藥服者齊得亦淮此知又彼疏云古察經漸次作佛略有四種何者為四一者信滿作佛所謂依種性地決定信諸法不生不滅清淨平等無可願求故二解滿作佛三證滿作佛謂淨心地四一切功德行滿作佛究竟菩薩地起信依此說信成就發心能現八相作佛文據照然況圓融門中不依位次寄終教說信滿即能因果無礙以因門取常是菩薩以果門取即恒是佛或雙存具泯自在難思故鈔云信該果海如賢首品中等又下疏云然斯位滿總有五重一約信滿如賢首品說便得灌頂而昇位等二約解滿如灌頂住及海幢處說三約行滿如第十行入因陀羅網法界等四善巧願滿如此位辨五約證滿如十地說此五重內隨一成處必具理行內相應故皆名位滿然信解等殊故不相濫若約圓融但一位滿即因究竟更不待餘又若得一即得餘位總一法界受職之位隨門差別五位不同法體融通全攝無礙不同餘教言初發心時便成正覺者正明以初攝後者問上明初心成正覺當因徹果海義正明初心為所攝故何此云以初攝後初心復為能攝耶答彼據初心無體無力義為所攝此約初心有體有力義還為能攝各取一義故不相違言如四十二字初阿具後茶也者即善財所遇第四十五眾藝童子所得法門一阿上聲短呼乃至一阿字者是無生義以無生之理統攝萬法故後四十一字若言若義皆從此字而生出故此四十二字表四十二位初阿具後茶字即來初發心住攝妙覺位以初後圓融之義以證鈔中異位相望以初攝後也言上來總有三義等者如次指前三節引證文也言能與如是觀行相應者現觀深玄也言於諸法中不生二解者了性具足萬行齊修也言一切佛法者大果無邊德用無際言疾得現前者現在速證也問何時現前初發心時問何法現前即得阿耨多羅三藐三菩提也下釋菩提之相言知一切法即心自性覺他也言成就慧身覺行圓滿也言不由他悟自覺也或知一切法即心自性釋上於諸法中不生二解成就慧身不由他悟釋上一切佛法疾得現前也疏行布是教相施設等者今將教義理事兩對辨圓融行布也斯則約教約相論行布顯也約理約性論圓融顯也非謂教之與相唯行布理之與性唯圓融也如世弟兄二人兄孝弟逆約兄常和睦約弟常乖違仍兄與弟俱和兄與弟俱違非謂其兄獨和其弟獨違法合准之又解約教相則所有圓融行布隨根隨相各不同故約理性則所有行布皆圓融就義就性成無礙故細思有味隱隱然似有問此言隱隱然似有為圓融門中似有耶為行布門中似有耶若圓融門有者圓融門中無量為一故不見多相云何言有若行布有者行布門中一為無量故多法歷然云何言隱隱耶今為答云將行布就圓融門說故言隱隱然似有如將不變在隨緣門故說真理名之為隱此之類也圭峯云鏡像千差莫執好醜鏡明一相莫忘青黃千器一金雖無阻隔一殊千影無不混和即斯義也疏言六相圓融者今為作對貴令易曉一非一對總別也似非似對同異也辨非辨對成壞也隨舉一相攝餘五相總號圓融疏普賢行品說一斷一切斷等故者問信心滿位圓斷惑已至住等位更斷惑不若有前位不成圓斷若無後位便徒施設有師答云但前已斷之惑智照體空本清淨故說名圓斷約稱法界緣起義邊假相常存復說更互圓不斷義如鏡中火無實燒熱體之與用似惑本空假相常存似惑假有此意智照體空一切皆空說名圓斷假相常存後位惑有已答前難今應問彼惑體空義本清淨義為屬斷義為不斷義若屬斯義違教理故體空義邊即同真體具非所斷若云不斷云何智照體空本清淨故說名圓斷更應問彼所存假相是所斷法若是所斷前位應斷不應至後若非所斷後位還無所斷之惑於此難中應設功力今為通云如孤舟澄江看月二舟在北千里同看一月二舟在南千里同看一月在北一月非南在南一月非北前位所斷之惑非後位所斷之惑非前行布也在北二舟一舟住觀其月全住其北一舟南行至南舟所看月處其北所看之月隨舟至南與彼南月冥合作一住北之月全住其北而非分住如前位惑全在前位而非分住行布義也來南之月全來其南而非分來即後位惑全即後惑而非分即圓融義也在南二舟一舟住觀其月全住其南一舟北行直至北舟所看月處其南所看之月隨舟之北與彼北月冥合作一住南之月全住其南而非分住如後惑全在其位而非分住行布義也來北之月全來其北而非分來即前位惑全即前惑而非分即圓融義也是知在北而有二月舊住一月新來一月以新合本同為一月是知前位而有二義惑本位一惑後位即來一惑後位即前惑同為一惑後位二惑准此應知在南而有二月舊住一月新來一月以新合本同為一月在北之中欲以掉挑其月前位之中欲以智斷其惑論彼月相本空其性常濕更不假挑況挑與不挑無殊論彼惑體本空其性常真更不待斷況斷與不斷常一論彼月相假有其狀圓白故須假挑挑即成無不挑乃有論彼惑相假有其狀輪迴故須假斷斷即成無不斷乃有為除月相方以掉挑為除妄想方起智斷在北掉挑其月時非唯舊住北月獨無而從南新來到北之月亦無前位智斷其惑時非唯本在前位惑獨亡而攝後惑至前位惑亦亡是知一斷一切斷義得成在南掉未挑月時非唯舊住南月獨存而從北新來到南之月亦存後位智未斷惑時非唯本在後位惑獨存而攝前位惑至後位惑亦存是知一不斷時一切不斷也勿難前位斷竟後無所攝惑耶無始常攝故勿難在北挑竟何有來南之月耶前已來故前來法喻隨節指配皎如在掌勿滯常門趣輕笑也鈔若成此十者故下經云所謂心不棄捨一切眾生乃至住一切世界心無所著是為十此即勸修法也則頓成五十種行者又經云佛子菩薩摩訶薩安住此十法已則能具足十種清淨十種廣大智十種普入十種勝妙心十種佛法善巧智釋曰經中廣列如是展轉皆由成就始修十法故此云爾言一念嗔心起百萬障門生者故下普賢行品經云佛子我不見一法為大過失如諸菩薩於他菩薩起嗔心者何以故佛子若諸菩薩於餘菩薩起嗔恚心即成就百萬障門故下疏第八下半釋云既一惑成百萬障門則一障一切障義即惑惑皆然今從重說除嗔之外更遍推求無有一惡如嗔之重故晉經云起一嗔心一切惡中無過此惡決定毗尼經云寧起百千貪心不起一念嗔以違害大悲莫過此故菩薩善戒經亦同此說言於他菩薩者若於菩薩起嗔過尤重以令菩薩廢大行故是以大般若中天魔見諸菩薩互相是非過常大喜標雖百萬略列百門古人寄位分五初不見菩提障下四十障十信行准經障字有三十三後開八部故成四十二不樂佛法障下九障十住行三不得菩薩諸根障下十一障十行之行四樂誹謗一切智語障下五障十向行五不樂與菩薩同住障下三十四障十地行故昔結云菩薩萬行不過此五起一嗔心一切頓障此釋非不有理如賊心求法豈獨障於地耶是知通障一切信尚不起況後位耶又所障法界如帝網重重能障同所亦皆無盡故知百萬猶是略明疏不體理事行亦非真者如夢時拜相迷心修得大梵天王等位不及覺時作尉悟時得入十信位也夢得七寶迷時修無量功德也不及覺時百錢悟時得入持五戒十善也皆以一妄一真故不可類諸教皆云施三千七寶不如聞一句偈是此意也法喻昭然學者可悉疏包性德而為體者五法中真如也二依中此涅槃也依智海以為源者五法中正智也二依中菩提也但相變體殊者迷真如成名相情生智隔者失正智成妄想言今令者正明開義知心了名相本空合體合真如本體達本達本無住情亡妄情亡正智生鈔達本無住者即淨名第二推善不善之本故經云善不善孰為本答曰身為本又問身孰為本答曰欲貪為本又問欲貪孰為本答曰虗妄分別為本又問虗妄分別孰為本答曰顛倒想為本又問顛倒想孰為本答曰無住為本又問無住孰為本答曰無住即無本文殊師利從無住本立一切法叡公釋曰無住即實相異名也言真本不可以功成等者羅什云立道不可以設功得聖智不可以有心知真諦不可以存我會至功不可以營事為唯亡言可與道合虗懷可與理通冥心者可與真一遣智者可與聖同問明品疏鈔具引須者更撿言寂照雙流者即是止觀理智體用菩提涅槃也疏以一言顯示令其知有二使其修行悟入顯現者即是頓悟漸修也恐理難明故將喻況如水真心被風激無明迷心成多波浪煩惱無邊便有漂溺之殃輪迴六道或陰寒之氣無明貪愛之智性也結成冰凌堅執四大質礙即阻溉不能雨大法雨滋潤群生潤長道芽滌不能落除煩惱罪垢之用不能起河沙妙用也然水之濕性雖動靜凝流而未甞變易貪嗔時亦知慈濟時亦知憂喜哀樂種種變動未甞不知故云不變今頓悟本常知如識不變之濕性心既不迷即非無明如風頓止悟後自然攀緣漸息如波浪漸停以定慧資熏身心漸漸自在神變無礙普利群生如春陽冰泮溉灌洗溺善利萬物也愚夫常云貪嗔慈善皆是佛性有何別者如人但觀濕性始終無畏不知濟舟覆舟功過懸殊也言開示悟入佛之知見等者准下疏鈔古有多釋一法華論釋云開者無上義論標名也謂除一切智智更無餘事釋所開即是一切智智一切智是根本智重云智是後得智根本智名知後得智名見除此二事更無有餘能勝過此故名無上即䨥開菩提涅槃釋所開一切智智也謂知見之性為涅槃知見之相為菩提論䨥釋開義也清涼釋云眾生本有本有法性涅槃及本覺菩提之二也障翳不現佛為開除則本智顯故慈恩釋開云開者出生顯證之義謂依本有四智菩提種出生四智菩提故顯證理性涅槃故即法相宗意今法性宗理則不然知見法相並皆本有大智光明遍照法界義故即寂為知見性照為知見相在因為性相在果為菩提涅槃故眾生本有障翳不現智障障菩提惑障障涅槃二障俱無菩提涅槃一時俱顯示者同義二乘同法身故別示知見之性以成涅槃悟者不知義不知唯一實事故今令知成報身菩提故一實事即是知見別示知見相以成菩提入者令證無退轉地故即是因義謂證初地已上為菩提涅槃因故登地證如為涅槃因能證地智為菩提因二喜祥法師云開示約能化悟入約所化能化有大開之與曲示但說有性名為大開言此是凡夫性此是聖人性因果理行即名曲示所化有始悟之與終入豁然了知故名與悟即頓悟上所明性也修行契證目之為入即漸修證前所示因果法也又清涼云開除惑障顯示真理令悟體空證入心體三禪門北宗云心不動是開開者開方便門也不動是示示者示真實相悟即妄念不生入則萬境常寂又釋知見云智用是知慧用是見心不起名智智能知五根不動名慧慧能見是佛知見四南宗云眾生佛智妄隔不見但得無念即本末自性寂靜為開寂靜上自有本智以本智能見本來自體寂靜名示既得指示即見本性佛與眾生本來無異為悟悟後於一切有為無為有佛無佛常見本性自知妄想無性自覺聖智故是菩薩前聖所知轉相傳受即是入義言知見者下疏十上三十一中又云知見有二義一別知即是智照事權智見即是慧照理實智二通謂知見二字俱是如來能證如實知彼義故即無障礙智若爾何假重言為揀比知所以言見非如比智見煙知火不能照了諸相差別為揀肉眼見所以言知非如欲界肉眼見麤近色細種違處即不能知但隨他說鈔正因佛性為因理佛性也緣因佛性為緣行佛性也了因所了為因本性住種生因所生為緣習所成種故彼經云佛種正因從緣起緣因總論佛性而有四種一者正因佛性即是眾生如乳與酪作正因故二者緣因佛性即是善友正教萬行如暖如酵方便等緣故所辦佛果如所成酪三者正因佛性即前正緣二性能生修成佛果皆是正因如種生芽故四者了因佛性但除第一義空餘皆能顯本有佛果復號了因如燈顯寶故故大疏云能生佛果故曰生因眾生佛性有二種因一者正因二者緣因正因者謂諸眾生是故五陰即正因也緣因者謂六波羅蜜非蘊相生名緣也然即因緣即是了因了因未必是於緣因有親疎故善友是緣因而必是了因佛性是於了因未必是緣因此約智慧性故即是本故起信云有大智慧光明義故等若以第一義空為佛性者唯是正因而非了因但為了因所了而非正因所生若以智慧為佛性者即是了因若以五蘊為佛性者名為正因亦名正因然復生必對了正必對緣又有四種故經云佛性有因有因因有果有果果因者即是十二因緣因因者名為智慧果者為大菩提果果者謂大涅槃今言佛性如應配釋疏出現又云設有菩薩等者下疏釋云若不依此教縱多劫脩尚非真實況能疾得菩提此中設有之言似當假設望慈氏讚善財言餘諸菩薩於百千萬億那由他劫乃能滿足菩薩願行今善財一生則能淨佛剎等斯則舉權顯實非假設也若實有此不信人者為在何位文無定判義當三賢以入證聖必信圓故若約教道三僧祇劫亦未入玄彼鈔釋云若約教道三祇亦未入玄者即古十玄中意然歷三祇設未究竟亦已入位何以故得言未入玄耶是故上云若約教道施設三祇教既未真則成佛義亦非真也教不實故若約證道三祇修行必已剋證修權既深則能入實所以凡夫頓能信者宿因聞熏為種別故今更不信當來豈聞疏當知此人生如來家者謂初見心性故名生家四地寄出世故生道品家八地無功用故生無生法忍家今此通三麤顯凡夫解心亦名生家因果無礙故鈔約行分二已是異前但約時故者此意利今後中兼行順根感中唯時故二因別問順根感中感者善根豈非是行故兜率偈云見佛亦復然必假眾善業十方諸佛告功德林言及諸菩薩眾善根力故解脫月云此眾無諸垢志解悉明潔等何故鈔云已是異前但約時故今謂通云感者善根未聞經已有不是所論利今後中起行聞經已後方有一見聞為堅種二起行成證入今據聞經後行不通根感唯利今後因論生論見聞華嚴熏成堅種為有漏耶為無漏耶若是無漏現是劫外凡夫豈得無漏現行也有漏不應熏無漏種勿無漏心熏有漏種彼此異因不可得故若是無為本自具足不賴熏習若是有漏有為云何要穿一切有為諸行煩惱身過到於無為究竟智處耶答有二義附相通途釋約性窮玄釋且初附相通途釋者圓經為緣引生聞慧雖是有漏增上緣中資彼本有四智佛種功德殊勝名之堅種性是無漏當生佛果盡未來際無有損廢故名堅種故無性攝論云此聞熏習雖是有漏而是出世心種子性即其義也後約性窮玄釋者華嚴經聲木覺為體性淨本覺四鏡義中緣熏習鏡隨染本覺二種相中不思議業相聞經之心了別語義當神解義本覺氣分能熏雖與染俱性是無為體非是漏所熏成種無漏無為於理何疑問答云云准前可知更願達識善留心焉故賢首一乘教義分齊云問夫論種性必是有為如何此教約真如為性種耶答以真如隨緣與染和合成本識時即彼真中有本覺無漏內熏眾生為返流因得為種性梁攝論說為梨耶中解性起信論說梨耶二義中本覺是也又彼論中如來藏具足無漏常熏眾生為淨法因又寶性論云及彼真如性者如六根聚經說六根如是無始時來畢竟諸法體故解云以真如遍一切法今簡去非情故約六處眾生數中取彼畢竟真如理以為性種性此與瑜伽所說名同但彼約始教以理從事麤相而說故約事中明性種性故地持云種性麤相我已略說此之謂也寶性論中此約終教以事從理深細而說故就真如明性種性是故佛性論云自性清淨心名為道諦又涅槃經云佛性者名第一義空第一義空名為智慧此等並就本覺性智說為性種其修習種亦從真如所成故攝論云多聞熏習從最清淨法界所流出等又起信中以真如體相二大為內熏因真如用文為外熏緣以與無明染法合故是故三大內外說熏以熏力故無明盡時冥合不二唯一真如也釋曰由內外熏即前性種功用增顯轉名習種性也疏成十種益者問起行益速證益與造修益頓得益何別答前二自利後二利他故各別也又起行益顯依此法少作功力疾得菩提造修益揀依餘法縱經多劫不能真修速證益約時不淹留頓得益據法非漸次細思其別亦無相濫鈔有藥王樹等者准俱舍論說此瞻部州從中向北三處各有三重黑山過九黑山有大雪山於是山頂有藥王樹名曰善見等釋曰上約通規且云眼見耳聞況無六根亦容覺知蒙益故首楞嚴經第四卷說阿那律陀無目而見䟦難陀龍無耳而聽殑伽女神非鼻聞香驕梵鉢提異舌知味舜惹多神無身有觸摩訶迦葉久滅意根圓明了知不因心念言初發心時便成正覺等者准下疏釋有其二義一約法圓融初心攝諸位故二約見性齊故具諸佛法竪論次位優劣非無若爾此與歷別何異請以喻顯若彼虗室置之一燈光周室內加二加三乃至百千各各重重遍於室內雖同周遍不妨後後益明初心等佛若彼一燈妙覺等初同第百千若器中盛燈雖復百千共置一室互不相見歷別修行類同此也言行多者二萬一千嗔癡等分亦然者即八萬四千煩惱也古有二釋一云眾生煩惱根本有十然一惑有力復各有十即為一百計應分為九品但上品重故開為三品中下輕故各為一品合為五百復於內外境起謂自五塵為內以他五塵為外一一各具五百即為五千別迷四諦則成二萬并本一千則有二萬一千依三毒等分成八萬四千經文自具二云以十惡為本展轉相成一一各十故成一百迷自他五塵為一千正迷十諦法門謂四諦三諦二諦一諦或迷說成諦等十諦俗諦義諦相諦差別諦說諦事諦生起諦盡無生諦入道諦成就諦或迷十善故成一萬然迷十諦空有不同分成二萬或迷十善二諦亦分二萬并本一千餘如經辨然二皆有理任情去取了惑本空居然不起鈔出現品至所謂無性等者謂理無二實該多事而皆成也如一明鏡而現多影鏡遍多影一影之中點藥在鏡變銅鏡而作金鏡是知眾影之銅鏡皆變成金鏡也鏡無體故且就佛門故說一成一切皆成若就生門應說一不成一切皆不成也然一成一切皆成義或約事事無礙說或約事理無礙說事事無礙義有多門且約即入略伸顯示攝眾生身即是佛身故說皆成而不壞事相復名一切兩門相合說得一成一切皆成初心成正覺即其例也攝眾生身在佛身中能攝有力既得成佛所攝無力豈不成佛耶如能現鏡既置高臺豈所現影不在高臺耶餘門准悉事理無礙者佛起始覺證本覺時了知眾生妄想本空唯是一覺寂而復照具德圓常故說皆成故經云皆同一性所謂無性不壞事相復名一切故經云如來成正覺時於其身中普見一切眾生皆成等兩門相合方立一成一切皆成也鈔世尊本願力故等者酬宿因彰地位為教本示真法說勝行順機感開因性顯果德法應爾如次配釋也言神力是緣者或是第三依主或是第十依加者緣也鈔古今通至浩然大均者出肇公涅槃無名論具足應云所以至人戢玄機於未兆藏冥運於即化總六合以鏡心一去來以成體古今通始終同窮本極末莫之與二浩然大均乃曰涅槃釋曰彼以涅槃本無始終今約冥會而亡時劫矣鈔初唯一念者謂於一剎那者案俱舍論時之極少名一剎那百二十剎那名一怛剎那六十怛剎那為一賴縛賴縛即是羅婆三十羅婆為一牟呼栗多牟呼栗多即是須臾三十須臾為一晝夜又准仁王經九百生滅為一剎那九十剎那為一念鈔據前文故云一念即剎那也疏九彼此相入者鈔釋有二一云彼異類異界時中自同類劫相入異類劫相入自以念攝劫自劫念重収一云異類時與同類界時相入也言謂以非劫為劫故者此非泯相歸性名非劫但是本剎之時離分限云但以二門互釋如相即門中取二所即二俱有體恐成雜亂入隱顯門以義料揀雖俱有體一隱一顯故無雜亂設更難云隱顯門中取二能攝二俱是顯亦成雜亂欲通此難勿用餘門却用相即玄門料揀一有體一無體故無雜亂但用二門更互料揀諸過俱離如空有二義更互而揀令斷常等過一切離更希智者曲賜審詳鈔謂有問言餘佛說處與遮那佛為相見不者此問意云餘佛一一皆遍法界之處說華藏經遮那亦遍法界處說華藏經為相見耶不相見耶言設爾何失者假令相見或不相見有何過失言二俱有過者見與不見皆有過失也言謂若相見即乖相遍者此意云謂若相見分成主伴若成主伴即乖相遍仍恐未曉重復顯示如遮那在娑婆界為主近東一界阿閦佛等十方一切佛為伴即許相見如遮那主佛移近東一界其阿閦佛等十方一切伴佛亦移近東一界如近東既爾近西等亦然是故主佛到處還無伴佛伴佛住處還無主佛故鈔云即乖相遍言若不相見即乖主伴者此意遮那一佛能攝有體阿閦等餘佛所攝無體是則遮那獨遍法界或阿閦一佛能攝有體遮那與餘一切佛所攝無體此則阿閦獨遍法界餘一切佛各作能攝其義皆爾由此有體不俱遍義雖成主伴義廢故鈔云若不相見即乖主伴言主主不相見者一佛為主餘佛為主義邊體廢故云不相見也言伴伴不相見者遮那一佛為伴餘十方佛為伴義邊體廢既無雙存故云不相見也祖燈七十二也神疲眼昏點科乃一時重覽之意慮有多不是幸勿罪之痛告㕛處錄摘文解歸命十禮十喻教三寶十號十恩普賢文殊最勝良田多歧亡羊不知萬行令了自心陶南北二宗禪門雖入先生之門猶迷衣內之珠見想心三倒九門始成正覺三音破娑婆形如虗空晉經失旨致古釋詞枝三義釋因十義靈鑒匪磨而頓朗萬法六句明依正體外無用唯相即故一道至果十義釋行無成故六堅六定十信十心十住十行十向十地等妙行布是教相施設一斷一切斷三人共觀一月一念嗔生百萬障不體理事行亦非真包性德而為體以言顯示令其知有開示悟入佛之知見四因佛性利令后義初發心時便成正覺所謂無性等問答法性身土淨穢剎百億閻浮等十住遍時不妨餘遍遮那餘佛見不見失本云辛未同三月一日於大宋國一交了
