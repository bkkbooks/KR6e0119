body:
  text: 上京開龍寺圓通悟理大師賜紫沙門鮮演述疏然此教海宏深等者宏者所攝義廣也深者所攝義幽也言包含無外者總顯圓教所詮無障礙法界體義之外更無別法當所依體事也言色空交暎者約喻言也色海空天也約法言之色事空理也攝色歸空理法界也當攝歸真實也色空交暎事理無礙法界當彰其無礙也言德用重重者德相業用十種現門當周遍含容也言語其橫收全收五教者能收即是圓教所收即五教義舉教收義也喻云必攝百川舉川取水也言五教者一云同常二云除能攝圓教加所攝人天教也如何攝義不攝於教大門別故前門藏教所攝即攝其教門此門義理分齊乃攝其義故前疏云已知此經總屬圓教未知圓義分齊云何言乃至人天總無不包者謂十地第二地中經明十善而有五種一人天善二聲聞善三緣覺善四菩薩善五佛善就人天善復分三品故彼疏第六下半七十紙中云謂人善為下欲天為中色無色界為上或由三時之心欲行止作行已三時俱重名之為上隨一二輕為中三時俱輕為下或約境有勝劣如一不殺一畜尤重心處不獲已而殺心為三品之惡三種不殺即三品之善或自作教他等自作但作為上唯自作為中唯教他為下細論其義多品不同將上四事交絡相望則成多品如約人境是一重更以重心則為二心復三時重即為三重更教人殺其四重餘別可思問若准戒經修二乘行尚破禁戒何況修於人天善耶答雖一十善所用功異故下大鈔十五上半十一紙中引莊子第一逍遙篇云惠子謂莊子曰魏王貽我大瓠之種我樹之或而立五石以盛水漿其堅不能自舉也剖之以為瓢則瓠鑊吾反落而無所容非不呺虗憍反然大也吾為其無用而掊蒲包反之莊子曰夫子固拙於用大矣宋人有善為不龜手之藥者世世以洴澼絖為事其藥能令手不拘折故常漂絮於水中也客聞之曰請買其方百金聚族而謀曰我世世為洴澼絖不過數金今一朝而鬻枝百金請與之客得之以說吳王越有難吳王使之將冬與越人水戰大敗越人裂地而封之能不龜手之一也或以封或不免於洴澼絖則所用之異也今子有五石之瓠落無所容則夫子猶有蓬之心也夫蓬非直達者也此章言物各有宜苟得其宜安往而不逍遙哉今借此言一種十善猶不龜手之藥也凡夫用之兼濟無外則裂地而封矣釋曰下同人天終殊權小海滴之喻思云可悉鈔雖有戒善等者揀濫也恐外疑云此經既有人天戒善應是小乘教也故今奪云是圓教戒善乃至云以彼能事事無礙故言其猶大海等者此言乃略應云其猶大海一滴之水尚異江河況於溝洫以喻圓教戒善尚異終頓況於小始也若准天台而有四句謂漸漸非圓漸圓圓非漸圓謂漸家亦有圓漸圓家亦有圓漸漸家漸者如江出岷山始於濫觴漸家圓者如大江千里圓家漸者如初入海雖則漸深一滴之水已過大江況濫觴耶圓家圓者如窮海涯底故今云漸是圓家漸尚過漸家之圓況漸家之漸例此可悉溝洫二字出於論語包氏注云方里為井井間有溝溝廣深四尺十里為城城間有洫洫廣八尺以不可將溝洫之水比大海之深廣法合可知鈔先則總收者圓教之中有前四教義也故疏云大海必攝百川圓必攝四後則總揀者圓教之中無前四教義也故疏云雖攝百川同一鹹味如月發焰帶微塵而共紅似水澄清含輕雲而俱緣故隨一滴逈異百川雖攝於四圓以貫之故十善五戒亦圓教攝尚非三四況初二耶言如圓教中亦有小乘戒善等者但有能同之義也勿謂便有所同之義是所揀故言水義同也者釋伏難也恐有疑云海中但有俱德醎水唯是海水何有百川水耶答水義同也此意云海中但有能同百川之水故云海有百川之水勿謂便有所同之水是所揀也故法合難云圓教中但有無礙法界唯是圓義何有前四教義耶答義門同故此意云圓教之中但有能同四教之義故此云爾疏一乘有二等者若就能同即目此經若約所同乃通餘教故賢首教義分齊云次教攝乘者有二先一乘隨教有五一別教一乘二同教一乘三絕相一乘如楞伽此頓教四約佛性平等為一乘此終教五密意一乘此約始教二明三乘亦五一小乘中三謂始別終同以俱羅漢故二始教中三始終俱別以有入寂故三終教中三終始俱同並成佛故四頓教中三始終俱離五同教中三始終俱同汝等所行是菩薩道等證此可悉疏以別該同皆圓教攝者始開則同別有異終合則能同別故問別教與圓教為同異耶答有云寬狹異故別教狹而圓教寬也圓教雙攝同別故今詳不爾表詮立名約收建號故名圓教遮詮立名約揀建號故名別教分相則同別乍異相攝則能同亦別故疏云今顯別教一乘略顯四門等故鈔云即此同中必有別義如事理無礙必即事事無礙爾猶彼江水入海亦醎鈔七十五法等者問彼七十五法當教談有即互相礙圓教談無如何得為玄門體事耶答就偏根所執即互相礙圓教談無不為體事就佛本意於無障礙法界之中應彼偏根派一分義依之修行證彼法門其體非無得為體事故上疏云千門潛詮與眾典為洪源即圓教所詮無障礙法界之中千門異義暗流在眾經依之修行無不獲益所益之法還是圓教無障礙法界如大海水潛流四天下地有穿鑿者無不得水所得之水皆是海水言如性雙遣者如是真如性即無性或如即寂義性即照義鈔他心等十智者他法數世集苦滅盡無道也言七方便者一五停心觀散亂數息多貪不淨多瞋慈悲多癡緣生著我界分則二別相念觀觀身不淨觀受是苦觀心無常觀法無我三總相念觀苦空無常無我是資糧位四煖五頂六忍七世第一此是加行位故成方便也言又此十對至以為十玄所依體事者問十對皆以五教出體頓教之體唯是一理如何得為玄門體事答言總意別故或相從說故或疎作體事故或與攝歸真實真空絕相作所依故鈔不即斷空等者不不即無物斷空但即成物真空故言青黃不即真空等者相有異真色不即空也無性同真色即空也言空即無色等者以理奪事故色不即空事能顯理故色即空也言以真理非青黃故非色等者不變異色故不即色隨緣同色故即色也言空是所依等者體異用故不即色體從用故即色也言第四泯絕無寄觀者前三門正當事理無礙生滅門義與真空絕相而為由漸此觀正當真如門故言不可言即色不即色等者不可言貫下四度讀之不可言即色者空若即色聖應同凡見妄色不可言不即空者空若不即色應成斷滅空拂前第二門也不可言即空者色若即空凡應同聖見真空不可言不即空者色若不即空凡夫見色應不成迷拂前第一門也一切皆不可者拂結例一切法也不可亦不可者重拂前跡此語亦不受者重拂之語亦不受也受者領納也逈絕無寄者照體獨立疏謂無分限之理等者以不可分故性無二故若爾何故下鈔云然以理融事令事如理以事顯理令理如事故云理非無分謂理即事事既有分理亦有分不爾真理不即事故准此鈔說理有分限何故今云理無分限答彼約非一而一此就非異而異故不違鈔以非異故全同等者問既云非異云何說得理徧於事事遍於理耶答此言非異不約體一但分量同故無違理又解由非異故遍義得成由非一故理事得立二義齊舉理事互遍也疏故出現品云至所謂無性等者斯乃圓宗祕鍵性海玄關若未廓於通達寔難臻於壼奧欲彰邃旨故引全文貴令時根照然可解爾故下疏云此中之成為理為事若是事成何以釋云同一性故若是理成何以此云成正覺耶入涅槃耶此是華嚴大節圓宗之義不對諸宗難以取解然諸眾生若於人天位中觀之具足人法二我小乘唯是五蘊實法大乘或說但心所現或說幻有即空人法俱遣或說唯如來藏具恒沙性德故眾生即在纏法身眾生義一名異猶據理說更有說言相本自盡性本自現不可說言即佛不即佛等若依此宗舊來成竟亦涅槃竟非約同體此成即是彼成若爾何以現有眾生非即佛耶若就眾生位看者尚不見唯心即空安見圓教中事如迷東謂西正執西故若諸情頓破則法界圓理無不己成猶彼悟入西處全東鈔云以理融事故事如理而融通不可作理事別解若爾諸佛何以更化眾生不如是知所以須化如是化者是究竟化如是化者無不化時故下結云大悲相續救度眾生隨門不同種種有異約成佛門一切成也鈔釋云即類結餘門雜有多但略分四一約性即一真法界二約相即無盡事法三性相交徹顯此二門不即不離四以性融相德用重重初約體門者問體是佛不答是不無礙應成四句一是佛以法性身無所不至故經云性空即是佛故二佛絕能所覺為其性故平等真法界非佛非眾生故三亦佛亦非佛以法性身無自性故四雙非性與無性以泯絕故經云無中無有二無二亦復無三世一切空是則諸佛見二就相門有二一情二非情真心隨緣變能所故然此二門各分深淨謂無明熏真如成染緣起真如熏無明成淨緣起染成萬類淨至成佛以修淨緣斷彼染緣方得成佛依此二義則生佛不同於染緣中復有因果因有純雜果有依正若約純門隨一菩薩盡未來際唯修一行一一皆然若約雜門萬行齊修盡未來際若約因門盡未來際常是菩薩若約果門盡未來際常是如來經云為眾生故念念新新成等正覺若雙辨門盡未來際修因得果若約雙非盡未來際非因非果便同真性前前二門雙具悲智雙融心境第三性相交徹門曲有四門一以性隨相同第二門二會相歸性同第一門三雙存無礙具上二門依此則悲智雙運性相齊融寂照雙流成不自在四互奪雙亡則性相俱絕沒同果海無成不成第四以性融相門相雖萬差無不即性性得無盡全在相中以性融相相如於性令上諸門皆無障礙因果交徹純雜相融事事相參重重無盡今就性門四句之內是即佛門不取餘三就相門中約有情門是淨非染是果非因是一分義非此所用就交徹門佛則性相雙融生則會相歸性今經正約第四以性融相一成一切皆成謂以佛之淨性融生之染相以佛之一性融性之多相令多染生隨一真性皆如於佛已成佛竟非唯有情會萬類相融為佛體無不皆成故肇公云會萬法而成己者其唯聖人乎又云是故聖人空同其體物無非我以佛之性融於物性同佛皆成以物之性融佛之相故令三業等於萬類即今經意而非餘門故云隨門不同今是成佛門也頓教多同約性四門終教即同性相交徹始教有二幻有即空同會相歸性但唯心現多同第二小乘人天皆同相門由此有云無情無佛是約性相相融以情之性融無情相以無情相隨性融同有情之相故說無情有成佛義若以無情不成佛義融情之相亦得說言諸佛眾生不成佛也以成與不成情與無情無二性故法界無恨故佛體普周故色空無二故法無定性故十身圓融故緣起相由故生界無盡故為因周遍故遠離斷常故萬法虗融故故說一成一切成也非謂無情亦有覺性同成佛若許此成則能修因無情變情情變無情便同邪見餘義具如前後廣說二釋中先總釋同一無性故得現成謂既無二性佛證一性得成佛故性隨一性皆成佛矣妄性本虗生無是佛生自有妄見生非佛佛了虗妄生為非佛真性叵得非今始成故皆成也若有可得成佛證性叵得佛非始成佛非始成佛本是佛佛之本佛何異生佛是故一成一切皆成亦可說言若一不成一切不成同一性故今是成門故云一切皆不成也問明要義不可不知幸希達士善聖心焉疏一性無性即是佛性者眾生等有故名一性緣相本空復名無性覺照靈知又名佛性如一水性一性也無其波性無性也即是濕性佛性也疏佛性名第一義空等者謂本覺體無所勝過云第一真智故緣云義妄相本寂云空而常照云第一義空名為智慧鈔一性得二修得者如次本始二覺也或正緣二因也言無相智無礙者如次是本覺智淨相不思議業相也言今觀所引正證是豈如來藏義者清涼意取能空真法薦福意取所空妄法故義別也清涼之意真如妙理離妄名空具德不空一體莫殊也疏心如工畫師等者下疏釋云心者總相之心也諸世間即諸彩色此句為總下出諸相即蘊界處故云無性而不造晉譯云造種種五蘊正法念云心如工畫師手畫出五彩黑青黃赤白及白白故上文云布諸彩色畫手喻心六色如次喻地獄鬼畜修羅人天若言種種則十法界五蘊等法皆心所造次二頌令前初偈下半於中二初一舉例以令猶成前諸言謂如世五蘊從心而造諸佛五蘊亦然如佛五蘊餘一切眾生亦然皆從心造然心是總相悟云名佛成淨緣起迷作眾生成染緣起雖有染淨心體不殊然佛果契心同真無盡妄法有極故不言之若依舊譯云心佛與眾生是三無差別則三皆無盡無盡則無別之相應云心佛與眾生體性皆無盡以妄體本真故亦無盡又上三各有二義總心二者一染二淨佛二義者一應根隨染二平等違染眾生二者一隨流皆佛二根熟感佛各以初義成順流無差各以後義為反流無差別無差之差含盡無盡又三中二義各全體相收此三無差成一緣起上約橫論若約一人心則總相佛則本覺眾生則不覺乃本覺隨緣而成此二為生滅下半即體性無盡即真如門隨緣不失自真性故正合前文大種無盡若謂心佛眾生三有異者即是虗妄取異色也鈔有云影外有質名半頭唯識等者小乘宗中除正量部餘十九部說似自相如鏡中影得名唯識本質識外不名唯識取之不全故號其半大乘之義若相若質皆從心變咸名唯識乃號其具言譬如工畫師等者如次心依計圓配釋可知疏譬如谷響從緣所起者故叡公云響無所在緣會發聲不知自我喜怒交爭叩其心事像萬形莫知其本終日營營疏上之十事同一緣起者前之十門勿謂歷別亦乃互資相待舉一全收無有障礙故成斯觀欲令易了重復略示一觀佛法身遍自身中二觀自色身遍法身中三觀佛法身變作自身四觀自色身露現法身五觀佛法身奪盡色身六觀自色身隱映法身七觀佛法身即是色身八觀自色身本是法身九觀佛法身非是色身十觀自色身非是法身如彼金體對彼環相一觀金體遍環相中二觀環相遍金體中三觀金體匠成環相四觀環相顯出金體五觀金體奪盡環相六觀環相隱徹金體七觀金體不異環相八觀環相不異金體九觀金體是非環相十觀環相是非金體以喻對法昭然可知自身既爾他身亦然有情如是非情例之然上十觀始習則前後別作久鍊乃首尾總觀何有障而不寂何有德而不具但請群英諦晉心焉疏有即有離者真理離相故名為離翻離云即事法不爾故唯在彼理望於事言有一有異者事法即理具二種一能所即同一種一也二所即理同二種一也事法非理具二種異一事別於理一種異也二事有萬差二種異也理望於事不具二種故唯在彼事望於理細思有味鈔以相遍之義義皆相似者如相即二門義亦相似云何却會答餘對但約以理望事或以事望於理事自類為對各成二對所謂成壞即離隱顯一異也唯有相徧自類無對互望為對義皆相似故不會之言又相遍者即後八門之所以故者問此之十門互為緣起隨舉一門即與餘九而作所以何故此云唯相遍義作餘所以答實則互通但從初說故鈔云爾言自他俱泯義即真理即事門者問自泯可然能即癈體故他泯難通所即體存故答此意云既是真理所即之事驗事無體如水即波波無別體故鈔云由其即故而互泯也疏且依古德顯十玄門者鈔釋依賢首所立也準此鈔指賢首新立廣狹主伴二門以替至相純雜迴轉二門也若爾何故賢首義分齊中乃有純雜迴轉即無廣狹主伴其故何耶應是賢首初依至相後方改易故鈔云爾疏同時相應具足圓滿者問佛果海中具苦集不若云具者何云蕩無纖塵耶若云不具即闕此玄今謂通云約佛自體苦集皆盡融他眾生亦無不具故前鈔云而聖不同凡無煩惱故無又佛心中有眾生等如次證上其理昭然又解以彼妄染有二種義一者過患即是所斷二者清淨即非所斷全此彼亦無有二若約初義不斷而斷佛無妄染若約後義斷而不斷是故前難一時頓遣故淨名經云阿難有此四魔八萬四千諸煩惱門而諸眾生為之疲勞諸佛即以此法而作佛事斯良證也又賢首義分齊中云一切煩惱不可說其體性但約其用即甚深廣大以所障法一即一切具足主伴等彼能障惑亦如是也是故不分使習現種但如法界一得一切得故是故煩惱亦一斷一切斷也故賢首品明一障一切障小相品明一斷一切斷是此義也又此斷惑分齊准上下經文有四種一約證謂十地中斷二約位謂十住已去斷三約行謂十信終心斷四約實謂無可斷以本來清淨故廣徹者此意有力之體為所入無力之體為能入非謂但用他雖存而不可見故有隱顯門者問佛見不若云不見見者應非是隱若許非隱應闕隱顯一種玄門也若門應非通興十玄作所以也答有二義佛雖不見而良恐不爾豈可佛智但是徧知見無徧見耶又解今就因顯門佛皆遍見彼不見不見攝所歸能佛具隱顯又門不見彼顯非謂彼隱亦皆不見故成遍知若爾不見彼顯還非遍知云良以彼法具隱具顯佛智遍知若隱若顯且就隱義不見其顯故云不見各據當門或隱或顯一切皆見故成遍知如月半晦但不見明名之為隱非謂彼晦亦皆不見又解以所觀法具彼可見不可見義亦成無礙能觀佛智雙見可見不可見義可成遍智若但見於可見不見不可見者應彼遍知故下鈔云則無一處無有普賢今何不見釋有三意一約權不見是盲者過二不見是見見虗空身以虗空不可見若不見者真見虗空三亦遍不見處故明見則不遍何者以可見不可見皆是普賢身要令可見為身則普賢身不周萬有釋曰義相當者猶而作證學者諦思又解此隱彼顯彼隱此顯等五句但是解境隱顯門成非佛智境五句皆絕方是行境遍智義立安有隱顯而當方寸何得難言佛見不見耶此理甚邃宜審詳悉言故彼相在即相入也者清涼意也若爾刊定何故德相但有相在而無相入耶彼師意謂從外至內名相入本居其內名相在既本居其內居無相入但具相在若爾清涼義云何通答行布門中常相出圓融門中常相入行布不礙圓融故從外而至內也言又德相不能入作真如則闕此德者問德相不能入作但是事事無礙何關真如耶答稱性之事事既無之理亦闕又解玄門乃是事事無礙德相即是真界性德故云爾耳言不應有普攝諸法之德等者破轉救也教外救云真如闕入作之德有何過耶故鈔云不應等光破闕相入救次破闕相作救尋鈔可悉言今明時無別體等者問行位一對位無別體何為所依答位有體理智體故或雖無別體附行而說得為所依又非外道所執故鈔如具自十對既爾者即是自體義開十對彼一華葉具前十門亦然者攝一切法他十對故鈔今欲會取等者純雜一門古師建立賢首改之清涼會取三師意取略伸區別古師立云一行名純萬行名雜純不礙雜雜不礙純若華開於錦名具德也賢首破云同一法界故純不壞事相故雜即事理無礙一行長行故純不是其雜不妨餘行故雜不是其純此但約事而闕無礙若一行多行而無障礙者一行之中多行若存濫相入門一行之中多行若泯濫相即門故賢首癈之而立廣狹若爾廣同純義狹同雜義亦有上難通答此難已見上文鈔一即十時一即顯者問一既即十一體不存如何名顯答此言一即十時非謂癈一但一正即十時一法正顯也如世十人共作其事一人正作十人十人之事一顯餘隱也鈔西方從定起為隱者問既見出定何名為隱答不見入定故名為隱如見暗處不見其明故名為隱非謂彼暗亦不見也又解東方眾生不見西方出定故名為隱尋鈔可悉鈔又暗處非無明等者上但約明上論隱顯此通約明暗兩法上論隱顯也鈔三約難知微細微塵不大而剎不小而能廣容者問微塵不壞相義作能含耶稱性義作能含耶若不壞相作能含者更有何義作所含也豈一小塵不壞事相而含多種大事相也若稱性義作能含者還是大能含小何名難知答雖彼塵毛不壞相故小而有力用故能含大如一尺鏡照現星月又解雖彼稱性而為所以不壞小相而作能含亦無違理如彼事理無礙得為事事無礙所以不應便難令同事理無礙義也鈔若是真者何異同時具足相應門耶者此是清涼難刊定也問若將此難返破清涼若為通含答同時門中具足十對并下九門圓滿無遺微細玄門但攝相入四句之中多入其一一句之義勢若雲泥豈相濫耶但由刊定錯立故帶是難故鈔云此但當法即具一切炳然齊著故濫同時門也鈔第二重所含諸剎等者問第一重塵含盡一切剎耶含不盡耶答含盡何有第二重所含剎耶若含不盡第一重塵應不稱性性外無法故若云稱性含不盡者彼不含剎應是性外性外有法事無依故若更互含與相入微細有何別耶答詞已見上文鈔金色世界即是本性者本性無染與緣成器為自體故故名金色言彌勒樓閣即是法門者經云時善財童子漸次南行至毗盧舍那莊嚴藏大樓閣前暫時斂念白彌勒菩薩言唯願大聖開樓閣門令我得入彌勒彈指其門即開善財即入入已還閇見一樓閣中有百千樓閣彼百千樓閣中一一各現百千樓閣一一樓閣前各有彌勒菩薩一一彌勒前各有善財童子一一善財童子皆悉合掌在彌勒前等此顯樓閣即是法門隨一法門即是一切無盡法門言火聚刀山即般若無分別智者經云善財童子見彼勝熱修諸苦行求一切智四面火聚猶如大山中有刀山高峻無極登彼山上投身入火彼疏釋云四面火聚者四句般若皆燒惑薪故中有刀山者無分別智最居中道無不割故高而無上難可登故投身入火者從無分別智遍入四句皆無滯故又釋刀是斷德無割故火是智德無不照故投身下者障盡證理故即刀山為能證火聚為所證故此火等即是法門不須別表現所用故稱性事故此意甚深難解不可輕爾鈔現在以可目覩例同過未故云平等者過未是無眾所咸悉現在是無理難顯示故例過未說云平等良以現在不住過未分故急流度刃其喻可知緣生無性其義無差故云平等鈔謂如因過未而有現在等者如昨日日輪上立過去世來日日輪上立未來世今日日輪上立現在世今日日輪自立現攬二日輪所以成離二日輪無體復立過未是知現在一世成就三世矣餘二三世准此可悉問過未之法有體耶無體耶答云有體還同小乘復滯常見違背如來一向說故生必滅也緣生之法過去緣息如何得存未來緣闕如何得有若不藉緣應非釋子若云無體何殊法相如何說得三世相因無體之法不但作因果故若無體法得作因果龜毛兔角應作因果若作因果龜應生毛兔應生角今謂通云過去曾有現在今有未來當有約自位論皆有約他位論三世皆無如曾有中無現未故餘例可知又緣生義自位皆有無性之義一切皆無有無雙具竝權小若就行布三世之有定不同時若就圓融三世之有而得同時融行布異時之有而作同時之有也如相入門若就行布異處之有約圓融同處之有也融異處之有而作同處之有也故名相入以處例時其義昭然矣又解緣起門中過未是無已滅未生故性起門中過未是有本來具足故亦無諸難鈔是故依古別立玄門者問長短劫即入還是即入玄門豈可順古立時而作玄門耶答成門已竟望義別故由長劫即短劫竟彼短劫便表長劫法體多劫即一念一念便表多劫法體彼時劫非幽玄耶鈔然其後千不異前千但互舉為首帶餘九所依能所相兼有十所依隨一所依有十玄門故成百門餘九所依各各為首成百亦然故成千門此是前千如一玄門為首帶餘九門能所相兼有十玄門隨一玄門有十所依差別一門而成十種所帶九門各十所依差別一門各成十種故成百門餘九玄門各各為首成百亦然故有千門此是後千依依各具十門十門各具十依門門互帶依依互帶實無二千為頭別故如云三七二十一七三二十一故疏德用所由者德相業用與彼玄門而作所因也鈔德相業用者一云十種玄門自體本具名德相蘊之在因故故下鈔云謂真如既具過恒沙德如所起事亦具德無量故知云門即是德相也應根互現名業用施之在外故如世水火本性濕熱名德相令人受用名業用二云德相是真界上性德之相業用是解脫等益物之用德相業用非是玄門若將玄門就性德論法爾本具便屬德相若將玄門就應用論隨根新現便屬業用如世油蜜秤用㪷各不同故或名一㪷或名一秤又解德目真界上性德業目解脫等功業十種玄門名相名用就性德論名相本具足故就功業論名用應根現故如尖刀就劒自體名相鋒銳之相故就人執持為用斫㓨之用故疏因廣難陳略提十類等者此是表法無礙之所以名因非是辦果之法體名因如比量三支中因支也如上所立十玄無礙恐人不信生疑詰問有何所以得知如是無礙耶答一唯心所現故得知無礙也此意能變之心既許無礙全心作境境何有礙不取心境作義為因但取心上無礙之義為因亦不取境體作果但取境上無礙之義為果細思細思二法無定性故得知無礙也但取諸法無定性義與彼玄門而作所以餘准可知勿謂諸法本不無礙由此十種令彼無礙但令彼無礙但令根信故置令言如人遙指樹下有水餘人不信乃問前人何以得知樹下有水前人答曰樹有白鷺故方能令彼信知有水勿謂水本是無白鷺令有但彼白鷺表有水因今此亦示勿見令字而乃封言不生信解疏七約起修義通德相業用者約自利修內證境界名德相約利他修外示境界名業用或約始覺相修名業用本覺性修名德相疏約佛用亦德相等者釋非兩別也謂佛利生自然業用即是德人本具之相如刀有斫㓨餘物之用歸刀還是尖薄之相言約根相亦稱用等者令生新見其相相為利生之用令物新觸其刀尖薄之相便是斫㓨之用疏即用之相染淨雙融者如即影之明好醜容盡言即相之用能染能淨者如即明之影能好能醜鈔十定品山間山上日影喻等者彼釋云喻中有五一明日光現影七寶山者即七金山如十地末列名但餘妙高及雪香二山山間有七香海海現月影山以淨金能現影二其寶山上下明兩影互現正喻菩薩自他互入以彼影明淨如今之鏡故能互現三或說月影下正辨得名不同謂水中本影現山上影時此所現影從山上出來入山間若山上本影現水中影時之所現影從山間出入七山上故正入時即名為出所喻可知四但此月影下明重現無盡喻菩薩帝網身土五體性下明體離二邊故能互現而無雜亂謂取不可得故非有影現分明故非無疏一切諸法真心所現等者圭峯云然象外之理真說難證今以喻為衡鏡定諸宗之是非注便隨喻以法合之隨文以注對之異法喻一一相照易見覽也然初覽時但且一切讀喻辨本末了然後却以注文對詳其理如一摩尼珠一靈心也唯圓淨明空寂知也都無一切差別色相此知本無一切分別亦無一切善惡也以體名故對外物時能現一切差別色相以體知故對諸緣時能分別一切是非好惡乃至經營造作世出世間種種事數此是隨緣義也色相自有差別明珠不曾變易愚智善惡自有差別憂喜愛憎自有起滅能知之心不曾間斷此是不變義也然珠所現雖百千般今具取與明珠相違之黑色以況靈明知見與黑暗無明雖相違而是一體法喻已具謂如珠現黑色時徹體全黑都不見明靈知之心在凡夫時全是迷愚貪愛都不覺如來知見大圓鏡智故經云身心等相智是無明也愚癡孩子或村野人見之直是黑珠迷人但見定是凡夫有人語言此是明珠炳然不信却嗔前人謂為欺誑任說種種道理終不聽覽宗密頻遇如此類者向道汝今了了能知現是佛心炳然不信却云此是誘三婆二婦之言直不肯照察但言某是鈍根實不能入此是大小乘及人天教中著相之人意所見如此也縱有肯信所說是明珠者緣目覩其黑亦謂被黑色纏裹覆障擬待麼拭揩洗去却黑暗方得明出現始名親見明珠北宗見解如此復有一類人指示云即此黑暗便是明珠明之體永不可見欲得識者即黑便是乃至即青黃種種皆是知令愚者的信此言專記黑相或認種種相以為明珠或於異時見黑槵子末吹青珠乃至赤虎珀白石瑛等珠皆云是摩尼珠或於異時見摩尼珠都不對色時但有明淨之相却不認之以不見有諸色可識認故疑恐局於一明相故洪洲見解如此也言愚者者彼宗後學也異時乃至黑槵子等者心涉世間分別塵境時見貪愛嗔慢之念也虎珀色瑛者如慈善謙敬之念也不對色時者無所念也但有明淨者了了自知無念也疑局者彼云唯認知是偏局也復有一類人聞說珠中種種色皆是虗妄徹體全空即計此一顆珠都是其空便云都無所得方是達人認有一法便是未了不悟色相皆空之處乃至不空明瑩之珠牛頭見解如此也聞說空等者諸部般若說空之經也計此一顆等者計本覺性亦空無所有認有等者聞說諸法空寂之處了了能知是本覺真心却云了了不知心體不空不空者涅槃經云如缾空者謂缾中無物名為缾空非謂無缾即明真心之中無分別貪嗔等念名為心空非謂無心言無心者但為遣却心中煩惱也故知牛頭但遣其非未顯其是從此已下皆喻荷澤之意何如直云唯瑩淨圓明方是珠體唯空寂知也若但說空寂而不顯知則何異虗空亦如圓顆瑩淨之慈圓雖圓淨而無聞性何名摩尼何能現影洪洲牛頭但說無一切不顯靈知亦如此也餘一切相悉是虗妄善惡分別舉動運為如洪洲初認起心動念等悉是虗妄故經云凡所有相皆是虗妄等當知彼宗認虗妄為真性也正見黑時黑光不黑但是其明青元不青但是其明乃至赤白黃等一切皆然但是其明既於諸色相處一一但見瑩淨圓明即於珠不惑一切皆空唯心不變迷時亦知知元不迷念起亦知知元無乃至愛樂喜怒愛惡一一皆知知元空寂空寂而知即於心性了然不惑此上皆逈異於諸宗也但於珠不惑則黑即無黑黑即是珠諸色皆爾即是有無自在明暗融通復何礙哉此皆同彼二宗也黑即無黑同牛頭洪洲俱此一切皆無又黑即是珠已下同洪洲云一切皆佛性凡聖善惡都無所礙自此已下喻意再將荷澤本宗結揀三宗云若不認得明是能現之體永無變易荷澤但云黑等是珠洪洲或擬離黑覓珠北宗或言明黑都無者牛頭皆是未見珠結也釋曰彼約禪門隨見解而淺深汎異據法理而南北源同此約圓宗隨事相而終行布據心性而本末圓融頓圓之義旨雖殊法喻之意趣罔別以頓成圓妙之至矣學者存心非不曉乎鈔若爾何以初異體門中云等者鈔約不相由義立同體相由義立異體疏釋反此故鈔伸問鈔答文云謂要由各異疏家異體方得待緣鈔家異體要由遍應疏家同體方自具德鈔家同體鈔據直論相由異體諸法互資故不相由同體各自具德故疏據所以相由是同體所以因相由故各自具德乃是同體不相由是異體所以因各守自性方始互待其緣乃是異體鈔一錢當體自是本一等者賢首云此且約現錢中況彼一來緣起無盡陀羅尼法非謂其法只如此也應可去情如理思之仍恐未曉今復略陳如一尊佛乃本一也而應多根物既異感佛必殊形即多一也雖應質不一然本身無二多一不礙本一也匪唯佛佛能爾抑又法法皆然故鈔云如十錢為喻其法界差別無盡法中各各遍應故隨一一各具法界差別法也恐封其喻故勸去情思之疏七同體相入義等者問一體之法如何立相入玄門耶夫相入者自他體在但互涉入故答同體之法凡夫見時可定同體聖智觀智同異無礙是故得立相入玄門也如菩提場世尊與忉利等處世尊互相涉入豈不得立相入門也若爾還是異體何名同體耶答就本真體全此全彼故約凡夫解唯一體故若不許爾云何異體之法相即門中許作一體法耶彼此異因不可得故又云何立得法無定性故同體相即准此可知鈔亦如一人望父名子等者但舉喻用明勿謂是法鈔異體相入故令同體相入者既忉利天根既入菩提場佛身彼忉利天佛豈不入菩提場佛身中也相即準知鈔冥同性海者謂前五句屬因分有迹可說故第六句屬果分絕待離言故鈔住一邊應故有廣狹至即前本門第二門也者若爾但有遍應廣狹寧成答斯則躡前起後不相離故言由此即彼故此隱彼顯者問能即無體云何名隱答正能即無體時不妨便為所即有體此所即有體之法在能即門隱也又解舉難況易也能即尚無豈不名隱如敗軍尚死豈不為餞耶言又由異體相入帶同體相入者如忉利等毗盧佛身皆入菩提場毗盧佛身中此菩提場毗盧佛身更入阿閦佛身中既所入菩提場毗盧佛在阿閦佛身中彼能入忉利等毗盧佛居然在阿閦佛身中也鈔後之七門促前三生者前三生是緣起相由所以後七乃是玄門將果顯因也言約智顯理等者上兩句因分下兩句果分言說與不說無礙難思者因果互融其猶波水相收也又准下疏釋而有多門義既幽微理須委辨幸願群英勿倦文繁故彼疏云初從義大次約說大後辨雙融義中有三一約果海可以總標令人智有名為可說不可指斥示人名不可說二約證處既此所證離相離名還云此法不可說以此遣言之言當彼法故名為可說有言斯遣名不可說如鳥跡所履之所以喻所證而言此處非有非無即為可說而迹處不可示名不可說三約本智謂以遮詮令解故名可說真詮不逮故不可說攝論云無分別智離五相故謂睡眠昏醉等以真詮不到故約遮詮以示彼法謂以空中之迹喻證智說有空中之迹即是可說不可示其長短大小即是不可說言五相者一離無作意故二離過有尋有伺地故三離相受滅寂靜故四離色自性故五離於真義異計度故又準後鈔更有二義一約自體真法互相顯現名為可說不可以此性相別取名不可說二者情實相對以情望實情外有真可以談說據真就情真外無情用何起說二就說大中亦三一約後得智隨事行相可以言分別是則可說是出世間故不可說以後得智必由證真故是出世如何說乎二約加行智謂是意言觀故是則可說觀中行相言不至故名不可說以修中觀必稱性修性出名言故不可說彌勒云種性麤相我已略說諸餘實義唯我能知三約所寄法可以寄此表示令人解十地故名為可說不可以此即為十地名不可說三約雙融中此上六中各說即無說無說即說無二俱融准思可見又果海離緣故不可說所證就緣是即可說二所證非修故不可說能證修起是則可說三正證離相故不可說後得帶相是則可說四後得無分別故不可說寄法表示是則可說五加行觀無分別故不可說寄法表示是則可說此上不可說皆各不異於不可說以緣修無性故真理不可說以普遍於事是則可說緣修即可說無性故便同真理即不可說也釋曰彼疏大門而有三義今據後義云說與不說無礙難思言庶幾者即周易繫詞云顏氏之子其殆庶幾乎有不善未甞不知知之未甞復行也注釋云殆者近也庶者慕也幾者事動之微也謂聖人見幾賢人庶幾今令後學亞夫聖賢也鈔如所起事亦具德無盡者謂真如所起事法必須稱性故德無盡言斯言未當耳者此唯約但空之理也闕事理無礙及不空之德也鈔今略舉十四德者准鈔標列而有十六應是廣狹微細二中普攝諸法合為一德及相即託事二中與一切法同其體性合為一德乃成十四又鈔中無有分限及與一切法恒共相應經中即無應是經中遍一切處無有邊際并與一切法無有相違二德準經中晝夜年劫以為四德此鈔合論但云二德餘與經同若依舊鈔標列雖同似違經故初後之經經各開二鈔合為一學者詳悉鈔枕上片時等者此之兩句即是唐宋類詩中春夢詩也乃古人岑參所作具云洞房昨夜東風起遙憶美人湘江水枕上片時春夢中行盡江南數千里上之兩句非此申故鈔不引言皆由如夢者謂色心等法皆如夢境所以即入等自在也故叡公云長夜之內大夢所成皆由心畫遍造眾形神傳五道脩盡伶俜若能悟之即破無明疏六如影像者者影字疑錯應是鏡尋鈔自知故叡公云形不入鏡光照而有世亦如是業影而受不知此者長嬰其咎若能悟之還神氣母或是影字以況虗無自在之義亦得故叡公云光不照處謂之為影不照慧明生生死長永捨遠夷途而行榛梗若能悟之狂惑自醒言略有二義者准下疏文而有四義一妄分別故二諸識熏習故三由無性不相知故四真如隨緣故今云其二故云略也疏下經云遠物近物雖皆影現不隨物而有遠近等者大鈔十八上半三十三紙云如執鏡臨池池中月出而此影不近天上之月去地四萬二千由旬影落潭中而亦不遠以喻菩薩遠在他方恒住此故雖住此處常在彼故安有遠近之異相耶一切遠近類此可知鈔但得成佛法爾能爾者釋成唯德相也言前即德相此則業用者問前疏料揀云八約果分唯是德相今鈔引證何通業用答鈔約利生故通業用疏約佛證唯是德相故疏中云約佛用亦德用德上用故鈔該取前三故皆別教分齊者以別該同也疏隨聲取義有五過失者下疏釋云一不正信以隨言解不稱實故二退勇猛不能亡相趣真實故三誑他以己謬解為人說故四者謗佛指己謬解是佛說故五者輕法以淺近解解深旨故謂法如言不殷重故疏約未悟入故名為兼者謂地獄天子聞天鼓說法頓超十地乃是正為今約前身熏種之時故屬兼為問彼時聞經不信謗經即墮地獄應屬遠為何名兼為兼為之根約信向故答地獄天子而有二類一者謗經屬遠為攝二者戒縵當兼為收故無其失疏借其三乘行布之名等者問為即圓融之行布耶為異圓融之行布耶若異圓融之行布者乃是抗行非圓教義若即圓融之行布者是圓教義應不名借答良以圓教兼具行布正宗圓融十宗之中具德宗故十地之中隱其圓融彰其行布乍觀名相似唯行布所名借又解若就真證道唯是圓融若隨根宜教道通於行布故上疏云行布是教相施設圓融是理性德用所以名借言權教極果無實事故者斯則暗用天台意也故下鈔云智者雖說四教三教果海處無有實事但就教中施設有果進入位後果即便虗如別教說三賢十地修三賢位則有何修乃至證地更無有別此約證道別教十地證境但是圓家住耳此據教道癈別就圓即由此義圓教初住自在過地疏權為等者謂佛菩薩權作同類方便為彼故名為權言或在法會而聾盲彰其絕分者以化將作聲聞亦顯法深故言或示在道而起悟知可逈心者化己作聲聞兼彰法廣故疏墮無為坑者無為正位一墮難出故喻深坑又悲無水取灰斷故如彼地獄言壞善根至貪愛之水等者邪見撥無貪愛浸爛皆喻於水不容善根又闕土緣非生處故言曾無厭捨者上據現惡闕緣令生厭怖而同有佛性久久當成故不厭捨是知顯惡無則無惡必有故涅槃云一闡提人雖復斷善猶有佛性若能發心非闡提也問後之所為即前所揀五類非器收揀相違其猶水火若為通會答下疏云其猶棃庶以對於貴賤懸隔斯則揀也以王收人則率土之內莫非王人斯則收也是以若約普收則一切眾生無不具有如來智慧況於二乘無漏因果若校優劣則權教久行菩薩尚不信聞況於二乘二乘上首尚如聾盲況凡夫外道鈔欲配前非器令盡者問但配前四何名盡答以少從多故權不乖實故疏謗雖墮惡猶聞歷耳終醒悟故等者准下疏釋此則益深如來祕密藏經明罵藥服之得力罵沈燒以還香罵佛猶勝供諸外道若爾豈無罵罪罵罪非無今語遠益故法華云䟦陀婆羅等罵常不輕千劫墮於阿鼻地獄受大苦惱畢是罪已還過常不輕菩薩教化涅槃喻以毒塗之鼓欲聞不聞無不死者故菩薩之名趣自聞謗之曰謗尚遠益況深信耶況解行耶況證悟耶佛持之者勉思此文疏大海潛流至無不具有如來智慧等者故下疏云所以知佛智遍者無一眾生不有本覺與佛體無殊故以上言潛流則以佛智遍他眾生今顯生生自有故云遍爾此有二意一明無一眾生不有則知無性者非眾生數謂草木等已過五性之見二眾生在纏之因已具出纏之果佛故云有如來智慧非但有性後方當成亦非理先智後是知涅槃對昔方便且說有性後學尚為談有藏無況聞等有果智誰當信者三彼因中之果智即他佛之果智以圓教宗自他因果無二體故不爾此說眾生有果何名說佛智耶斯則玄又玄矣非華嚴宗無有斯理言又破塵出經卷等者下疏又云如來藏經等說有九種喻喻如來藏謂如青蓮華在泥水中未出泥水人無貴者又如貧女而懷聖胎如大價寶垢衣所纏如摩尼珠落在深廁如真金像弊衣所覆如菴羅樹華實未成亦如稻米在糠糩中如金在礦如像在摸皆是塵中有佛身義鈔言被非情者以所被情即非情故者問情即非情情體既癈何為所被不可非情而為所被縱為所被都無覺智有何益用不可能即情體不癈也體若不癈不名即故答由常即而常不即是故得名非情亦是所被疏前五唯體者問下疏料揀前三重體云然大小諸宗雖通用四法而理不同也准此豈不通理也何云唯體答前五重體本唯事法將後深義料揀前四乃通其理故無有失又問通取所詮體豈不通理答約親所詮故或以少從多故或以性從相故鈔於後三重料揀則前前無後後等者問四通小前七通三乘前八約同教既皆言通應知通大通一乘通別教也若許皆通何云前前無後後耶答不據所料揀教體前無後故但約能料揀義前無後故小乘無後六三乘無後三同教無後二故作是說因論生論問海印炳現體準還源觀指論本覺豈同教若作海印定體唯屬別教以讚假者可通諸眾若作萬乘唯目一人疏謂佛語言乃至是謂佛教者問語路一種或是意識或是脣等既非是聲何為教體答尅性乃非相從可是故鈔正出今之教體等者正出婆沙論體也鈔語教異名教等者正理同意語謂語者音聲為體故謂言教亦即音聲色蘊所攝名是不相應體行蘊所攝名與教言其體條別教何是名問意約語即教故後答意云語之教故以名為體如云佛子非佛為體但用弟子以為體故鏡影由假發者問正理論說麤細俱實云何名假答云但藉多塵故名為假非謂虗假或云本計是實未計是假義亦可通疏大乘有三大意同前者小乘前二或單取聲或單取名等大乘不爾取聲必攝於名等取名等亦攝於聲故疏成所引聲者圓成實性所引聲也鈔若因受大種等者謂因第八識執受有情四大種所造之聲餘二準知言若世所共成等者如次依他圓成遍計三性所發之聲也言性聖言者猶正也鈔天受非餘者謂彼愚人世無錄用唯天怜愛方得自存又世間所尊莫過於天世間所賤莫越於愚呼卑賤之愚夫立尊高之天號如呼奴為郎君戲而調之應云咄天汝甚可怜故云天愛作如是說非餘有智之人亦作如是說也鈔法詞二無礙解脫境有差別者法緣名等詞緣於聲言蘊界處攝亦各有異者聲與名等色蘊行蘊聲界法界聲處法處如次攝故言正理救云等者本計聲上屈曲非名句文未計云是言依一切位非自在者依凡夫位非聖人故十地菩薩於一字中顯無量名句故言而體非顯者自差別義字者無改轉義者理不詮義不可翻譯如梵云菩提是名此翻為覺如但云菩是字未有所屬之義不可翻譯故號不改轉也言多剎那聲集成一字等者問前一剎那聲現在時後一剎那聲至現在時前聲已滅如何集成其字今謂通云本質前後互不相見影像連帶許同時現故乃集成又解雖非同時隨其解心攀前接後假建立故如施火輪實非是輪隨心作輪又如佛言昔日鹿王今我身是名句問答準字應知言自共相者局附己體名自相貫通他義名共相色礙心緣各局己體故名自相空無我等遍一切故名共相此是體義對復有寬狹對色蘊名共相寬也色處名自相等狹也復有離言帶言對乃至極微為共相帶言也離言不可說為自相離言也復有增益非增益對此非緣境而有解行貫通多法名為共相增益也現量緣境行離動搖局附本真名為自相非增益也復有有作用無作用對如因緣變境有作用名為自相如分別變境無作用名為共相言一扇者現涼凡故二相好者現大人故三根形者現男女故四味者應云鹽現食味故應云文現義味故鈔顯無方理者方猶比也無比道理也或顯義體無定方城娑婆一方亦許色等為佛事故不同唯識此方定用音聲為佛事故鈔七賢四果者三資糧五停心觀別相念觀總相念觀四加行煖頂忍世第一為七賢也預流一來不還阿羅漢四果也言預流者初預聖流故見愛定斷修惑不定或一至五前十五心六人名向第十六心見相諦圓六皆名果言一來者依次初果進斷修惑一至六品六無間道前五解脫咸名為向第六解脫其心容預得名為果超越初果先伏六七及第八品來登見道前十五心亦名此向第十六心超證此果闕品證初後證一來經義可思但就次第約皆離欲有下三品潤一往來欲界生故得名一來超證相從亦復此名言不還者依次二果進斷欲惑後之三品三種無間二品解脫咸名為向第三解脫方得名來超前二果先伏九品及上七地六十三品來登見道前十五心名不還向第十六心證不還果證果已後必不還生欲還聖人色界中有起智本有證得涅槃得名生般色界般申事習力不假加行證得涅槃名無行或超或次或半或全至色究竟證得涅槃名禪定現法樂住十三思法若不思惟即便退失若思惟已便不退失十四護法作意防護故十五安住平等位不煉不退十六堪能證達故十七不動性是利根無上進對下不退十八慧解脫但斷慧障故十九但解脫復斷定性故鈔以其被呵者呵其乞食不平等也言置鉢欲出者維摩詰問亡絕之理須菩提不知所以捨鉢欲出其舍言維摩詰言至即諸法也者令須菩提了言相同幻了幻化同真了自身如化故言一切諸法如幻化相者故叡公云眾生如化非有非真不達此者轉如車輪解法清涼淨無我無人眾垢消除如日無雲言文字性離無有文字者一云上句標下句釋此意云文字真性本離文字之相下句釋云無有文字又解長讀兩次一云文字性離無文字二云文字性離有文字是則有無雙遣言即亡言通圓頓意者即言緣生也亡言性空也又即言隨順也亡言得入也言但就教道則可見聞者約真空頓教隨順門也就破相始教俗諦門也言念處者照寂也鈔五行相者或取蘊等相應語言或取能說佛菩薩等皆能顯義故號於文言一地者資糧加行等二相者自相共相等三作意者七作意四依處者三依處五過患者所毀厭法六勝利者所稱讚法七所對治法者謂貪嗔等八能治者謂不淨觀等略廣如名可知疏而作佛事者但為教體攝化生眾斷惡進善名作佛事鈔非言說有性有一切性耶等者非字之上加一莫字其義方顯此問意云由能詮言說有性知所詮一切法有性或不加莫字但是牒世尊言最後耶字疑問之詞也佛告下答初答法無其性而有言說遺法也又云下答無有言說遣言也大慧問意言法必相須世尊答意意言法不相須先明無法而有言後明無言而有法是故下結言法不相須也大慧下舉事釋成也疏既語嘿視瞬皆說者問嘿名為說行相云何復用何法而為教體答由其嘿住令根生解故名為說或取彼人五蘊為體約事相也或取無言真如為體約理性也鈔如聲是色即二所顯影者耳意二識所現影也或說聽二識所現影也疏唯本無影者如日舒光新照本法也疏復說五心集現者非是五心法等現但是經歷五心影像聚集顯現言五心者一率爾心創物遇境都未作解二尋求心推求前境仍猶預故三決定心了知前境生印可故四染淨心既識前境作善作惡故五等流心同前善惡後念相續故疏總十二心等者散亂聞經也專注聞經但有八心於行常二字上除率爾尋求二心故言十四相者一云十四人影像相一云是四聲相餘相依聲假建立故鈔言其五心初後通六識中三唯意識者法苑云第六具五隨意轉亦是尋求有希望故不爾此心應非五攝率爾一念決定未生若非尋求便為大失決定意識既許多時染淨自無勢力可自引生故果即具有勢力緣故有義八地已上五識自在前後相引亦成染淨許七八識前能引後為染淨心五何不爾故知五識因亦具五總結之者前六具五心七八各四但無尋求第八界初第七轉依遇新境故容有率爾餘三可知此中有義五識唯二但有率爾及等流心尋求等中五隨生者即等流心許亂生故今據後義故鈔云爾言又前三是無記後二通善惡者法苑云瑜伽論說初三心是無記第四五通三性此依因位中容無亂境五識中一與第六識連續生說若在因位境界強勝諸識雜生並生五心皆通三性所攝若無漏位乃得自在一切多善疏唯影無本謂大乘實教至是故聖教唯是眾生心中影像者問若爾何故下文說聽全收中終教亦具四句或唯說佛心現故等今謂通云彼宗以始同本相盡成佛寧有本質但隨妄心變現身說豈非唯影是則能現眾生為聽所現影佛為說本覺真心體通二故名說聽全收也如人夢中一見法師昇座說法自聽他說二義得成唯影無本其義亦立又解約自利內證隨染智淨性淨前三鏡名唯影無本也約利他外現隨染不思議業相性淨緣熏習鏡說聽全收也疏此前四說至攝眾生故者如次圓融行布二義也或全收全揀二義或別教同教二義也疏說聽雙存二教齊立者問興亦影亦本二教條別今此可教其體無殊全此全彼二門雙取故云齊立鈔唯明始本不二三大攸同而是自心各各修證等者譬如一珠本性明淨如本覺也久埋泥中在無明中瑩新明淨如始覺也新本無殊始本不二輕重之體圓明之相出寶之用一味無差三大攸同普對多鏡齊對多心一鏡磨時至明至淨獨照無殊體相用三一人心中光修獨證大三餘鏡未磨未照其殊餘心未修未證二大華嚴不爾也磨未磨二鏡互入故與前殊問攝境唯心中唯本無影是小乘義何故前文四通小後六唯大乘答唯本無影非唯心義為明四句因便言之故疏云唯本無影謂即小乘不知唯識故即斯義也又問說聽全收中既有別教何云前八同教答既無唯字理有何妨疏則隨一聖教俱非二心者問二心既泯其教寧存又問心泯教存何言攝境唯心耶答此言泯者非謂落空但約互奪歸一心故無前二難疏會緣入實體者立相始教攝相名會緣從性名入實終教緣生無性名會緣入實頓教相盡性現名會緣入實圓教將緣起相由歸理性融通名會緣入實義雖通爾正唯始頓疏此方所說十住等十方亦爾即主伴教也者此意就能說之人分所說教成主伴也豈可將說聽者教分主伴也例知上文主伴重重極十方而齊唱不關於聽言即眷屬教雖不得為主亦是伴類者如因對果亦不為主但得為伴何所以耶以劣對勝故問法法稱性何分勝劣答就不壞相化生儀軌故作是說鈔譬如書字普入一切事等者如書一切字隨目何法皆能目故言而無所住者而作其法無定目故疏海印炳現體者前九為別此一為總攝別歸總此定為體如香海之萬影咸以香海為體疏諸部論師共惟不受者受者信也納也疏八真空絕相宗者一收破相始教二攝頓教問何故終前頓後列宗頓前終後答教約成佛遲速終遲在前頓速在後宗攝法寬狹頓狹在前唯理法界終寬在後通三法界又解約無相義正始兼頓故在終前約絕待義唯頓義故在終後疏然此十宗五教互有寬狹等者文義稍隱今略指陳一以經望宗教料揀教寬宗狹一經容有多教寬也一經唯是一宗狹也二以宗教望教料揀一宗全攝多經宗寬一教但攝一經少分教狹又解具數多少論寬狹教寬宗教一經容多教教寬也一經唯一宗宗教也攝經全分論寬狹宗寬教狹一宗全攝於多經宗寬也一教分攝於經文教狹也應舉喻云經如一國宗如帝王教如民類一國容有多民寬也唯有一王狹也民類各別不攝全國狹也一王總攝全國寬也思之疏龍樹指此為大不思議經者同準此清涼宗中少一大字如無大字揀濫不盡還同賢首答法界緣起等言義同大字以揀神通解脫等不思議也疏第二品會差別者據文約簡攝義淵弘綸綜宏綱研覈妙趣也且八十卷圓經浩渺畢在斯門況十萬偈具本幽微盡含此處是以鈔文控提首尾漚派源流隨會會而來意先陳依品品而正文次釋躡前起後歷歷分星布義天辨趣開宗昭昭兮月臨性海遵泣岐悲絲之誨焉敢增華憑爭衣折杖之儀叨輝潤色類五岳而巘崿何讓纖塵同四海以汪洋靡辭滴水鮮演昔但講宣之際於茲尚欲書細今當染翰之時至此難緘狂簡不揆庸虗粗伸重釋良以餘論餘經顯隨宜乎但依一勢斯文斯義表稱性乎轉變多端由是附大疏十例之科判狀若星分收圓經一部之真詮形同滿月且初本部三分科者肇興彌天之判終符佛地之文今古同導華梵共稟洎從光統迄至清涼通將一經科為三分妙嚴品為序分現相品下為正宗法界品內時文殊從善住樓閣出下為流通所以三者慈龍降雨八方先布於密雲大聖談真三世始彰於嚴事故受之以序分醫王治世逢痾必賜於靈丹善逝調根遇器當宣於妙法故受之以正宗天池浩汗派流橫亘於四方教海汪洋傳竪窮於三際雖本會而周畢貴末葉而葉葉傳方然佛日而潛輝令法灯而灯灯續焰故受之以流通羅初中後之三善始末可觀列孟仲季之三時寒暄有序且初妙嚴品為序分者總標六成就顯七處之圓宗遍嚴三世間為九會之都序以現相品下為正宗者勒五十五卷之寶偈日朗星纏編三十八品瓊章連珠貫玉粗衣品次略辨宏綱且由致既彰正宗將闡四十念興於眾海舉其問端五重相現於如來將其酬答面門光召於眾剎表從佛生眉間光矚於普賢示說法主降神力而威加震動剎網垂禎祥而應現警策群根地湧妙色之華顯談依果毫出勝音之眾彰教佛流為說法之端倪故受之以如來現相品二瑞相彌著法主將宣覩毫光而懸解毗盧之心照法理而親入藏身之定內觀事理外鑒根宜上感佛加下為物軌故受之以普賢三昧品三既入至定感諸佛而讚揚特沐勝緣篤群根而信受陳十方之依報剎海莊嚴攬十種之因緣世界成就故受之以世界成就品四已知大覺之通依體同狀異未審本師之別剎因淨果嚴莊嚴無盡一一量等於虗空妙勝難思塵塵遍含於法界故受之以華藏世界品五依報既彰昔因宜顯猶根深而果茂若源遠而流長修因號威光歷事難思佛尅果名遍照莊嚴無盡方舉果人而顯因法故受之以毗盧舍那品已上明所信因果為第一會名舉果勸樂生信分也六已知依報殊勝無量莊嚴未審正報難思如何圓滿乃應物而成身遍百億四天之下各隨宜而立號建百億萬種之名故受之以名號品七普隨物欲廣說法輪一諦別名一十千四諦通稱四百億故受以四諦八顯身智而兩光鑒事之二境境既性相而無礙光必色心而圓融故受之以光明覺品九上四品為所信身語意之三業下三品作能信解行德之三心十首菩薩顯解而互相激揚十種甚深彰玄而往復徵詰故受之以菩薩問明品十既有正解復須勝行類膏明而相助猶足目而更資歷境造修逢緣運觀轉煉悲智兼濟自他故受之以淨行品十一妙解既發淨行復修得具殊因須獲勝德以圓功德而莊嚴攝四十二位之賢聖以圓力用而建立化二十五有之眾生賢首說此故受之以賢首品已上明第二會十信法門竟十二十信已周十住將演不動覺樹而昇釋天其猶澄江者一月共觀者三舟隨南北而不離中流住中流而常隨南北應赴彼根故受之以昇須彌山頂品十三隨根緣而如來月現讚佛德而菩薩雲臻彰雲體而深玄顯真空而寥廓故受之以須彌山頂上偈讚品十四感應既交根教相扣明信滿而得入正定談慧深而安住真空故受之以十住品十五總位別行已彰通修淨行宜顯歷十境之深觀運四等之妙心赴十力之真智生不二之勝解初發心時便成正覺故受之以梵行品十六位行既具勝德須談且明初住之殊功以況後位之勝德強取世喻但量等於虗空若就圓宗寔功齊於種智故受之以初發心功德品十七下賢既滿性起中賢說於妙慧明門示於策心勝進故受之以明法品已上明第三會十住竟十八十住已圓將談十行亦須赴感俯應其根故受之以昇夜摩天宮品十九主既赴感伴必讚揚顯行體而深玄依佛智而寥廓故受之以夜摩宮中偈讚品二十由致既彰正宗宜顯因修正行位尅中賢故受之以十行品二十一已圓中賢將趣後位蘊積眾行擬將圓迴故受之以十無盡藏品已上明第四會十行竟二十二中賢既具將闡上顯示應當根說主赴感故受之以昇兜率天宮品二十三既主伴而咸集伸總別之讚揚顯迴向之願門依如來之智海故受之以兜率宮中偈讚品二十四由漸既圓本宗應顯分十向而無障無礙迴三處而難思議故受之以十迴向品上已明第五會竟二十五三賢具闡十聖宜談趣佛智而四河同入於天池秀德華而萬物齊生於地面類十德之大海德德該通同十德之寶珠德德增勝作菩薩之心階為如來之智業故受之以十地品第六會竟二十六者因地將滿正覺將成建勝進之殊熏立等覺之勝位廣闢多門量同法界略伸教義分顯深玄光明妙定徹究真源善發神通能生智慧故受之以十定品二十七深定之用至聖至靈妙智之功無擁無障故受之以十通品二十八定力難思神通門議由智極而作本假慧奧而為源故受之以十忍品二十九定通智之三用辨難量等數喻之三門慧心莫測重重校比明等覺而難知一一對量況妙覺而微細阿僧祇為大數之首故受之以阿僧祇品三十念劫圓融剎那間莫窮邊際塵剎該攝極微有無盡普賢略陳指示粗顯如來以後剎而倍前時以前劫而為後日故受之以壽量品三十一上就實說無塵不是佛所居指事寄談有處堪為聖依心故受之以菩薩住處品三十二等覺已周妙覺應闡明佛德而總超言念顯果位而悉扣冲玄故受之以佛不思議法品三十三品身相普周具十蓮藏之塵數功業宏廓該三世間之分量故受之以十身相海品三十四海品三十四大相既爾隨好更多一一好中有多光明一一光明有多神用破阿鼻之地獄生兜率之天宮三重頓圓十地速滿故受之以隨好光明功德品上明差別因果次辨平等因果謂因無異果之因果無異果之因交徹而不一因果歷然而莫殊因即普賢三行門三十五故受之以普賢行品果即如來之性起三十六故受之以如來出現品上六會修因契果生解分竟三十七上契果而修因該羅六位今攝解而成行融貫一時雲興二百之問掩義天之慧光缾瀉二千之酬漲心地之法水處世無染故受之以離世間品第八會竟三十八上辨其行今明其證佛入嚬申之定普現神通眾生逝多之林頓證法界故受之以法界本會上來多段總是正宗已竟後流通者文開五相之異五星炳現於長空義列五位之殊五岳群分於率土良以此之一品大文有二分本末之會筵折因果之法界剖頓漸之證入辨總別之圓融非頓無以顯圓非漸無以階進非本無以垂末非末無以階本非人無以證法非法無以成人前明不異漸之頓多門而眾人同契此明不異頓之漸一人而歷位圓修今托人以修進軌範後徒使大教而弘通法眼無缺故受之以法界末會上來多義不同總是本部三分科竟二問答相屬科者或問或徵各舉千鉤之杵或通或答咸鳴萬碩之鐘三以文從義科者分因果之五周華敷實茂攝文義之九會月皎光輝四前後攝疊科者捨後從前折因源而為異派開總成別分一路而作多歧五前後鉤鏁科者或以前而躡後繼武聯蹤或以後而編前連絲接縷六隨品長分科者開無盡之雜華隨品長分於十段類莫限之剎海辨處無越於十方七隨其本會科者前八各當其一科時會名異後一獨開其兩段本末自殊八本末大位科者總列六十四之雅會尅果嚴因別彰五十五之嘉筵依人證法九本末遍収科者總合百二十六之大分法盡幽玄別開三千大千之微塵人皆善友十主伴無盡料者一一會而一一品結通十方一一義而一一文展遍三際既主伴而互遍一一難思若自他之相資重重莫盡科列十審條貫乎五周不紊收歸一揆囊括乎四分無參由是七處九會之法苑枝枝森茂十玄六相之義林藂藂蓊幸冀良工妙施斤斧鈔眾等勤精進者故遺教經云汝等比丘晝則勤心修習善法無令失時初夜後夜亦勿有癈中夜誦經以自消息無以睡眠因緣令一生空過無所得也當念無常之火燒諸世間早求自度勿睡眠也諸煩惱賊常伺殺人甚於怨家安可睡眠不自驚悟煩惱毒蛇睡在汝心譬如黑蛇在室眠當以持戒之鉤早併除之眠蛇既出乃可安眠不出而眠是無慚人也慚耻之衣於諸莊嚴最為第一慚如鐵鉤能制人非法是故比丘常當慚愧無得暫替若離慚耻則失諸功德有愧之人則有善法若無慚者與諸禽獸無相異也鈔地獄門前見一僧云是地藏菩薩乃教誦偈云等者問菩薩具四等心何不普教耶答有緣無緣故業有定不定受苦有益無益故故下疏問菩薩之苦自業所招自心所變云何菩薩而能代耶答通諸代苦有其七義一以苦自妄增悲念故瑜伽四十九云菩薩自勝解行地墮入淨勝意樂地時云何超過諸惡趣等此問菩薩云何自離惡趣等此問菩薩云何自離惡趣下答文廣意云謂菩薩於世間清淨慮已善集資糧於多苦有情修習哀愍無餘思惟由此修習故得哀愍意樂及悲意樂利惡趣有情誓處惡趣如己舍宅設住惡趣能證菩提亦能忍受為除物苦願身代受令彼惡業永不現行一切善業常得現行由此悲願力故一切惡趣諸煩惱品所有麤重於自所依皆得除遣得入初地釋曰約此但有悲願意樂身不能代由悲決定自獲勝益二約菩薩本為利生求法苦行已名為代後能為物為增上緣亦名代受三約菩薩留惑同事受有苦身為生說法令不造苦因因亡果喪亦名代受四設有眾生欲造無間等業菩薩化此不從遂斷其命菩薩自受惡趣苦報令彼得免無間大苦名為代受此依梁攝論第十一說涅槃仙預國王亦同此義非唯意樂而已五由菩薩初修正願為生受苦至究竟位願成自在常在惡趣救代眾生如地藏菩薩及顯莊嚴王等乃至飢世身意大魚皆其類也或以光明照觸或以神力冥加其事非一六由菩薩此願契同真如彼眾生苦即同如性以同如之願還潛至即真之苦依此融通亦名代受七由普賢以法界為身一切眾生皆是法界即眾生受苦常是菩薩故名為代上來七義初但意樂次二但約為增上緣四五二義實能身代六七二義理觀融通問若依四五二義應能普代何故猶有眾生受苦答此有三義一有緣無緣故與菩薩有緣即可代也二業有定不定故不定者可代三若受苦有益菩薩令受方能究竟得離苦故如父母教子附嚴師令治如是密益非凡小所知但以圓經略本該十萬偈之真宗大疏全文盡一軸之奧致應樂廣之偉器備彰九會之詮接如略之煗根唯闡八門之趣今所釋者即斯文也實可謂文布蜀錦行行競吐於芬芳義貫驪珠句句爭呈於煥爛包雜華之法寶類天宮之賢瓶出方廣之聖財同龍藏之如意若窮妙旨海墨難書但竭愚誠管毫可盡初解題目控舉提綱次釋文義又委於妙理後障結束復綰收於大節倣經開初中後善依僧分序正流科故有斯文不徒然矣釋茲一疏啟彼四門一總敘名意二歸敬請加三開章釋文四謙讚迴向且初總敘名意者總則略而咸周敘則述而不作名乃毗盧教藏意乃普賢心胸麤分四段䫫四海而汪洋細列十門同十山而巘崿標宗體而歸法界超言超思歡能詮而屬此經具深具廣顯教主而難思有應一多而無礙彰說儀而周普橫竪能所而該通言該本末等天池而能百川旨趣玄微似香海而印萬像權小莫測積行菩薩迷遍益頓圓難報含靈速證暫聞暫見熏五智而金剛圓解圓修結十身之妙果文殊示教利喜六千道成毗盧自入嚬呻眾海頓證或啟明而東廟智海初心或寄位而南求因圓毛孔破妄想之纖塵空空絕迹取佛性之經卷了了分明在一塵而化一生心心無倦經多剎而歷多劫念念忘疲結歎宏遠者比須彌而橫海面高掩群峯方杲日而掛天心光奪眾彩感慶逢遇者久沉八苦之巨海怱遇龍舟永墜三覺之高山頓駕仙鶴感慶再三忻歡千萬既抃躍不能階也非聖賢曷能知之或略釋於住題彰五對義之妙理或粗陳於品目顯三世間之莊嚴雖控提於法門分列十段然總敘名意收歸一科二歸敬請加者歸謂歸投依托之貌敬請敬處恭之儀請乃祈求之詞加乃護助之義以我疏主清涼大師握管臨牋祐文布義慮凡情而迷昧恐四魔以侵凌伏聖力以冥資降六通而護祐希無障而無難願有始而有終言言調契於佛心字字無乖於經意使造解而成觀根根頓證於真源令涉有而空念念沒同於性海陳製疏之十意廣有多文并敬請之三門束歸一段三開章釋文者初標列於章門如宣開於眾庫後次第而別釋似賜於名珍同畫橫而填彩先後恒規若鑄而發明古今常則文分十段斯辰以盡於八門義列萬途此日總收其一會一教起因緣者動須彌之側實非小緣激巨海而傾搖誠為大事現德山而勝智海理不徒然談稱性而闡通方言無虗發所起雖無勝劣能起自有親疎隨兼正而各殊開因緣而逈異初因十義者應法爾之良觀窮晴窮處酬宿因之妙用能遍能常順根感則中秋玉兔影下印於潭心為教本則晨旦金烏光先臨於山頂顯果德而依正參融即入無礙彰地位而圓行自在超思難思說勝行也分頓成與遍成開闢於天地示真法也融理界而事界譬交參於陰陽開因性者或利今而利後勝益難思或得見而得聞殊功叵測剎那成於堅種狀若金剛一念生佛家形同王子後緣者依時也竪窮念劫始終延促而相融依處也橫遍剎塵染淨通局而交徹依主依應超情依定而靜亂豈測現相乎瑞應種種說人乎賢聖重重聽人則除當根之眾會德本則揀化主之昔因依請乃有言念之兩殊依加乃具冥顯之二異率向多義收歸一果咸為教起因緣總辨說經所以二藏教所攝者或藏教而各攝兼正不同或此彼而更收全分有異初藏攝者二藏也隨半滿字而區分上乘下乘三藏也依寬狹義而辨析具分具全若藏攝於此經有攝不攝若經收於彼藏無收不收後教攝者或華梵而咸同通分十二或古今而各異別辨一多大意離合者離則淺深逈別隨草木而千差合則大小攸同本天雨而一味二古今違順者東土西土之賢師各張教網性宗相宗之英彥互啟玄關覺愛則佛言具異如善口之歌音童壽則異自在根似水形之任器牟纖陌延唐印劉亂四人共立於二教南中諸佛光統吉藏多師同建於三門光宅四乘已分折於權實天台四教復區別於偏圓元曉苑公亦開四類波頗賢首更立五重戒賢則分有空并中道顯了三乘智光則開實假與真空終極一性會了義而及不了總具二門辨性宗而與相宗別有十義三五教開宗者教分五教由斷證而不同宗列十宗因淺深而辨異言五教者悟單空而行自利四諦緣生修自利而證俱空三乘五性約幻有而與隨緣生佛有異據體空而與不變寂照無差障則一斷一切斷因則一修一切修果則一成一切成理則一證一切證言十宗者義在下門無繁預敘四總相會通者初通諸教而淺深隨緣益物後會化儀而前後逐性開迷三義理分齊者具深具廣明一乘而無量乘全揀全收說同教而帶別教包四重之法界四序無參攝三重之觀門三光不亂會色空之四句不亡具源分理事之十門同一緣起談十種之玄門總別有異出十重所以德用不同既窮理而盡性又徹果而該因言念不可詮緣牋毫那能載錄四教所被根者揀非器也抑挫令其發心彰所為也褒揚令其聽受以根對教量自力而有未任以教對根約佛心而無不被所以蟾輪皎潔落影不現於渾池兔魄輝霞流光逈照於濁水輪王髻寶豈賜無功之臣親友衣珠密與醉臥之客或揀或為良有以焉五教體淺深者能所單雙而有異俱舍婆沙體用出沒而不同深密唯識或通攝於所詮更兼十義或盡收於能顯具足六塵若本影而於對有實有權若說听而全收亦別會緣入實之體或攝末而或顯如理事無礙三門或互存而或於即事事無礙圓音具足於十玄海印禪那教體總歸於三昧淺深行布後二正是經宗首尾圓融前八無非教體六宗趣通局者宗謂宗崇而侍主趣謂意旨若子而養親通謂總通於餘教性相師而多同局謂別屬於此經古今說而全異翫諸師之各別勢若星分仰疏主之孤圓形同月滿依一題而用四句至妙至深隨一句而列十門難思難議七部類品會部謂部帙或略本而或圓滿類謂類或相似而或派流品者篇目不同會者法筵亦異八十卷之極談難陀翻譯十萬偈之妙說龍樹流傳中上二本非閻浮提人所受匿在龍宮普眼一經唯總持菩薩能知空竭海墨同說則遍同類之剎塵不可結集異說則該異類之世界部類難量主伴者重重齊唱眷屬者處處別談圓滿者或舉一而全收無障無礙或以多而互攝超言超思世親龍樹釋經備在於西乾靈辨謙之造論盛行於東夏八傳譯感通者先譯傳乎有緒使習學者無疑後感應乎垂積令見聞而仰信雖歷代而唯二譯并補闕而唯四經各奉綸言編入寶藏或翻譯而或書寫瑞應彌多或讀誦而或講傳禎祥難錄鮮演首習唯識三能變叵究其源次覽華嚴十所因罔窮其邃且揮麈傳灯膚受空慚於孟浪操觚翰牘散村實惡於文然承諸徒而勸請偶因前夏續啟法筵洎至初秋列狀扣請其詞曰切以滿規等五百學流宿慕圓宗時被義理事之異同莫辨生佛之即離難分昧因果而感酬迷染淨而斷證擬請於玄談上下之內據義門隱闢之間略集記文永為義釋勞謙靡遑憑眾聖而潛加強陳鄙作儻片言而合理唯願鉤深或大義而違賢真更希摝而已矣迴向偈曰已得冥加力集成決擇文遍熏含識類普入解脫門
