body:
  text: 上京開龍寺圓通悟理大師賜紫沙門鮮演述鈔玄飈才舉則無著牽羊者論語云微子玄之箕子為之奴比干諫而死注云微箕二國名子爵也微子紂之庶兄箕子比干紂王諸父微子見紂無道早去之箕子佯狂為奴比干以諫見煞武王遂統雜兵八百諸候不期而會一陳交鋒紂軍大敗紂王既敗左手執貓右手牽羊降伏之相也言翊羽暫騰則陳那亂轍其亂轍之言出於春秋魯莊公十年齊師伐魯魯莊公將戰魯人曹音貴請從才用切公與之乘繩證反共在兵車也戰於長勺上酌反地名也公將鼓之曰未可齊人三鼓曰可矣齊師敗績公將馳之曰未可下視其轍登軾而望之曰可矣遂逐齊師既克公問其故對曰夫戰用氣也一鼓作氣再而衰三而竭彼竭我盈故克之夫大國難則也懼有伏焉吾視其轍亂望其旗靡故逐之知非詐也釋曰配合消文可以意得鈔護法難陀未有得聖之文者難陀可爾護法菩薩若準唯識論樞要云菩薩臨終之日天樂霄迎悲聲動域空中響報波羅門曰此是賢劫千佛之一佛也鈔初時約依他説有者四諦之中滅諦是圓成故七十五法中三無為亦圓成故但從多分故作是説言初即相無性者體相無故言次無自然性者託因緣有故自然性無故言後由遠離前遍計對依他名前所執我法二空生圓成門也性也鈔此中等者指當段疏義當鈔中四門之內第二約心境空有論了不了也遍計唯境依圓通心前第三時等者指前段正顯所立疏也即是鈔中四門之內第一門也而言含者初時不云約三性故有次時不云約三無性故空唯第三時方言三性三無性故云含也餘二門者即一乘三乘成佛不成佛也鈔二智光論師至無相大乘為真了義者問準此所明空教性教合為一種何故圭峯性宗空宗分成十異故彼師云第一第二空有相對第三第一性相相對皆迢然易見唯第二第三破相與顯相對講者禪者同迷皆謂同是一宗一教皆以破相便為真性故令廣辨空宗性宗有其十異一法義真俗異空宗則未顯靈知之性但以一切差別之相為法法是俗諦照此諸法無為無相不增不減等為義義是真諦故智度論以俗諦為法無礙辨以真諦為義無礙辨性宗則以一真之性為法空有等種種差別為義故華嚴十地云法者知自性義者知性滅法者知真諦義者知俗諦等十番皆以法為真諦以義為俗諦二心性二名異空宗一向目諸法本源為性性宗多目諸法本源為心目為性者經論多同不必敘述目為心者勝鬘云自性清淨心起信云一切諸法從本已來離言説名字心緣等相乃至唯是一心三性字二體異空宗以諸法無性為性性宗以靈明常住不空之體為性故性字雖同而體異也四真智真知異空宗以分別為知無分別為智智深知淺性宗以能證聖理之妙慧為智以該於理智通於凡聖之靈性為知知通智局五有我無我異空宗以有我為妄無我為真性宗以無我為妄有我為真故涅槃云無我者名為生死有我者名為如來六遮詮表詮異遮謂遣其所非表謂顯其所是又遮者揀却諸餘表者直示當體如諸經所説其妙理性每云不生不滅不垢不淨等皆是遮詮若云知見覺照靈鑒等皆是表詮若無智見等體顯何法為性説付法不生滅等如説水云不乾是遮云濕是表諸教每云絶百非者皆是遮詞直顯一真方為表語空宗之言但是遮詮性宗之言有遮有表但遮者未了兼表者乃的等七認名認體異謂一一法皆有名體設有人問每聞諸經云迷之即垢悟之即淨縱之即修之即聖能生世出世間一切諸法此是何物舉義用問也答云是心舉名答也愚者認名便謂已識智者應更問何者是心徹其體也答之即心指其體也以此而推心之名體各為一字餘皆義用知之一字貫於貪嗔慈忍善惡苦樂萬用萬義之處今時學禪人多疑云達磨但説心荷澤何以説知答直須悟得心是名不是體知是體不是名即真妄垢淨善惡無義不通也空宗等恐淺根隨言生執故但標名而遮其非廣以義用而引其意性宗令上根亡言認體故以知之一言直示其體八二諦三諦異空宗所説世出世間一切諸法不出二諦學者皆知不必引釋性宗則攝一切性相及自體總三諦以緣起色等諸法為俗諦緣無自性諸法即空為真諦與前宗同一真心體非空非色能空能色為中道第一義諦與前宗別九三性空有異謂遍計所執性依他起性圓成實性空宗云諸經每説有者即約遍計依他每説空者即是圓成實性三法皆無性也性宗即三法皆具空有之義謂遍計情有理無依他相有性無圓成情無理有相無性有十佛德空有異空宗説佛以空為德無有少法是名菩提色見聲求皆行邪道性宗則一切諸佛自體皆有常樂我淨十身十智真實功德相好通光一一無盡性自本有不待根緣此上所明十異歷然二門煥矣豈得二宗合為一教今謂通云會不會故既師宗各異何須會釋或總對相教小教合為一宗分別分破相顯性開成二教故不相違如通論大小二乘作聲聞乘權實共為菩薩大小各開如名可知以彼例此居然易見鈔寧起有見如須彌山不起空見如芥子許者良以空有二見雖皆是病存毀因果輕重逈異故此云爾言空有相即者問既許空有兩法更互相即能即所即皆通有體無體豈不違能即無體所即有體耶答此云空者非無體法但是真空故或據二有體相即能即有體廢所即空存故言空有二體既同何要偏留依他但空偏計者謂繩蛇同一麻體何故偏遣其蛇仍存繩耶以喻顯法學者可知鈔隨緣益物何須和會者如對冷病讚附子而呵甘草若遇熱病讚甘草而呵附子何須和會言若約後門則法性宗為了等者智光意合無相法性二宗同為一宗故言今觀賢首之意等者上依文述古二宗理齊下約意增新兩教義殊言攝生寬為了不及約物唯大為了等者此意根性雖多不及益物殊勝言故雖廣不及理趣增明言雜以無稽首者故尚書云無稽之言勿聽弗詢之謀勿庸注云無考無信驗不詢專獨終必無成故誡勿聽用矣言則四不了皆屬前宗等者四不了義一攝生寬化雜類故二言教具無稽言教三益物劣通三乘故四顯理微真未全故四種了義一攝生狹唯菩薩故二言教闕但一來故三益物勝減成佛故四顯理增盡緣相故言若經意則二衆俱得至合之䨥美者謂此上二教據佛本意雖不相違然後學所傳多執文迷旨或執一見彼此相非或二皆泛信渾純不曉故龍樹提婆等菩薩依破相教廣説空義破其執有令洞然解於真空真空者是不違有之空也無著天親等菩薩依唯識教廣説名相分折性相不洞染淨各別破其執空令歷然解於妙有妙有者是不違空之有也雖各述一義而舉體圓具故無違也問若爾何故已後有清辨護法等諸論師互相破也答此乃是相成不是相破何者以未學人根器漸鈍互執空有故清辨等破定有之相令盡徹至畢竟真空方乃成彼緣起妙有護法等破斷滅偏空意存妙有妙存故方乃是彼無性真空文即相破意乃相成由妙有真空有二義故一者極相違義謂互相害全奪永盡二極相順義謂冥合一相舉體全攝若不相奪全盡無以舉體全收故極相違方極順也龍樹無著等就極順門故相成清辨護法等據極違門故相破違順自在成破無礙於諸法無不和會爾哀哉此方兩宗後學經論之者相非相斥不異仇讐何時得證無生法忍努力通鑒勿偏局也問西域先賢相破既是相成豈可此方相非便成相疾答如人飲水冷暖自知各各觀心各各察念留藥防病不為健人立法防姧豈為質士百喻洗足之誨講者銘心涅槃摸象之談學流書紳而已矣鈔小乘中説獨佛一人有大覺等者問如阿含中亦與彌勒授記若為通會答部執不同故或雖授記不明顯故或多分説獨佛一人有大覺性如小乘不説法空之例也鈔五段引經者尋科自知言三論附出者第四二論附第五復一論附即地持也言第四云雖未已入正性離生者入謂證入離謂遠離能離是解脫無間證理斷惑之真智也正性即所入真理也生即所斷之見惑也言已者至見道已言未者見道斷前也言若入見道則名正定聚者非是龍樹所論三聚此意但約小乘望於大乘分可回心不可回心而論定與不定龍樹唯論大乘三聚而有三解脫縱彼無學尚是邪定聚豈入見道名正定聚耶細思可知言如入聲聞見道終無回心作菩薩者問涅槃經初果回心八萬劫等此云何通答根教異故無有相違般若應權涅槃約實故疏無性瑜伽亦同此説者無種性義瑜伽亦同説故瑜伽合為一論前但云三鈔六處殊勝者言總意別故內外六處中唯內六處中唯第六處第六處中有八識八識中有第八識內四智佛種有為無漏故名殊勝鈔不乖所以大故不無之者賢首云雖權實有異同是菩薩所乘是故經云唯此一事實餘二即非真又云息處故説二菩言趣舉二三者趣者意也或是向義也鈔非自不從因生非他不從緣生非共不從二生非離不自然生此是四不生義以顯聖空如彼鏡緣非自鏡生無質不現故非他質生無境現故非二合生無二影現故非離二生自然無影故言智度論説法性法界法住法位皆真如異名者故下鈔云謂法性不虗妄性不變異性平等性離生性法定法住實際虗空界不思議界已上大般若文真如實有空不空性勝義已上佛地論攝論也無相無為正性已上思益經中法位真性無我性真實性心性一心大品華嚴唯識性無性法印第一回向云以法界印印諸善根寂滅智論三性中名圓成實性三身中名法身三淨土中名法性土三佛性中名自性住性五法中名如如五藏中名皆是謂法界藏法身藏出世間上上藏自性清淨藏如來藏四勝二中名勝義勝義亦通證得及道理滅諦瑜伽十四大十六現觀中名真諦七諦通達中名法性顯揚二種佛性中名理佛性十四諦中名勝義諦三般若中名實相般若三三寶中名一體三寶三解脫中名空解脫出智論七十四二果中名智果涅槃中名性淨方便二諦中名真諦勝義諦三諦中名空諦仁王經中四諦中名滅諦或名實諦顯揚論名一諦或名中道或名解脫涅槃中以一百門顯解脫異名或名不二法門或名無二性或名實性或名實相或名無量義亦名第一義諦亦名第一義空釋曰上並真如異名也言因乖常理成三界無常者今有已有還無故不可為有泥洹以不生滅為實諦三界以生滅為真諦二理不偏名中道義彼問云常無常二理相反云何而為中道不偏之理耶答二理雖殊理自相資何者因乖常故有三界無常因解無常之實性故成常智所以經引二鳥義自在此二理不偏照與猶懸鏡高堂萬像斯鑒矣清涼釋曰懸鏡高堂即無心虗照萬像斯鑒則不簡姦故以絶常無常之淨心照常無常之圓理即斯義也上言因乖常理成三界無常者因根本無明述乖真諦常之理真妄和合成三細六粗三界無常之法問根本無明假因緣不若無因緣便非釋子同自然外道者若有緣何者是耶答一云本覺為因緣生故若爾本覺自性生即隨緣生耶若自性生佛果位中無明還生有本覺故本覺應是性染幻故若隨緣生更隨何緣生無明耶設更有法與彼為緣無明應非名根本故今謂通云但用前念根本無明熏動本覺迷真也不知也生起後念根本無明妄念生也不覺念起也無明之外更無有法故號根本設有難云最初根本無明何法為緣者此難違教諸教同説無明無始何得難言最初根本無明耶如彼相宗有種子但用前念為因緣故生起後念推之無始故無諸難又解根本無明具二種義一有體有力義二無體無力義恆具二義非前非後望有體有力義恆作能熏熏本覺故迷真也不如也望無體無力義常為所生依本覺故妄念生也不覺念起也如一望多望有體有力義常能生望多無體無力義常是多生緣起之法理定如是亦如相宗心境相望因義邊而作能變變彼境故為果義邊而作所牽彼境牽故應云心所變境同念之中還能牽心心如無明境如彼覺比類可知又解無明之因而作能熏熏本覺故迷真也不如也無明之體而作所生依本覺故望念生也不覺念起也如彼相宗種子是第八識功用而作能生第八識現行自證分是本體還為所生亦如為教本用為能起體為所起故又解龍樹説一念本法有為自在迷真也不如也作彼五種有為妄念生也不覺念起也如彼龍王尾未出標嵐也又解四相為緣熏動本覺迷真也不如也生起無明妄念生也不覺念起也良以無明四相無始法爾俱時成就互為緣故龍樹論説上下下上二種因緣即其義也若爾既互為緣何分本末答粗細別故又如炷生焰焰其炷雖互為緣亦乃同時不妨炷為其本焰為其末故此義幽隱人多迷昧輒依鄙見粗伸區別更願群英各垂清鑒言所謂解脫相等者如次即是我樂淨常四德也言離諸苦縛者苦即苦諦縛即集諦言又云常寂滅相即性淨涅槃者重釋前經作涅槃解言解脫相者有餘涅槃也解脫煩惱故言離相者無住處涅槃也遠離二迷也言滅相者無餘依涅槃也身智皆滅故鈔指一種影取前三學者應思鈔畢竟有二種者因種之別名也言究竟畢竟者正因也言世間畢竟者有漏種子也言出世間畢竟者無漏種子也又解準彼涅槃疏釋云望小大極故名畢竟因果不同故分二種能因嚴果故曰莊嚴果德窮滿稱曰究竟世及出世約位分異十地已還通名世間皆是變易世間攝故佛名出世是也言六波羅蜜者此云彼岸到也準唯識云要七最勝之所攝受方可建立波羅蜜多一安住最勝謂要安住菩薩種性性宗新修相宗本具二依止最勝謂要依止大菩提心三心五願前三曾發故三意樂最勝要慈愍一切有情現與利樂心故四事業最勝謂要具行一切事業隨修餘行以莊嚴故五巧便最勝謂要無相智之所攝受造三輪空離二我相六回向最勝謂要回向無上菩提三處回向略故言一七清淨最勝謂要不為二障間雜即三時無悔加行根本後起無悔若七隨闕非到彼岸實具無邊略云六度今顯圓數而彰其十一施度輟己惠人故即以無貪及所起三業而為其性具有財法無畏施故二戒度防非止惡故即受學菩薩戒持三業為性律儀攝善饒益生故三忍度堪受諸法䨥忍事理故即以無頂精進審慧及所起三業為性耐被怨害安受苦楚諦察諸法故四進度鍊心於法名之為精進心務達目之為進以動及所起三業為性被甲攝善利樂三故五禪度梵云禪那此云靜慮即以等持為性謂安住引發辦事三故安住法樂引起諸道辦利生事為次第故六般若度般若梵言此翻為慧推求諦理名之慧也此及後四皆擇法為體生空法空及俱空故七方便度方謂方法便謂便宜此具回向拔濟二方便故八願度即希求要誓為願求菩提利樂自他二種願故九力度能摧怨敵不可屈伏隨思隨修任運成就名之為力謂思擇修習力故十智度如實覺了決斷名智謂受用法樂成熟有情成二種智故此合後四故但云言理運彌載者問真理湛然焉能運載答豈不見商人載寶龍舟必仗於滄溟賈容運珍象駕須憑於陸地者乎言海有八德者三十二經云一者漸漸轉深二者深難得底三者同一醎味四者潮不過限五者有種種寶藏六者大身衆生在中居住七者不宿死尸八者一切大雨注之不增不減言甘露以喻涅槃者夫甘露陰陽精氣天地靈液其色潤白其味甘滑食之即資色身而延壽命其涅槃者九流交歸衆聖冥會纖瑕必去片善無遺證之則圓法身而堅慧命所以云爾鈔有淨佛土出於三界者此論説羅漢已生淨土何故仁王經云三賢十聖住果報唯佛一人居淨土答經據有漏皆除純淨之土論約煩惱盡斷分淨之土故不相違淨土多義廣如上説鈔影響其迹者謂助佛傳化如影隨形如響應聲示現化迹或取不實是聲如響應故言亦抑法華諸羅漢耳者暗彈慈恩也言何得不依者清涼結憑也問安國之難此云何通答豈不論云如不輕品中等此意但舉昔時為例是故言如非是昔時菩薩預記今日聲聞又解論但顯聲聞根熟未熟悉皆得記根熟得記者今日靈山佛自與記是也未熟得記者昔日不輕菩薩與記是也亦非昔時菩薩預記今日聲聞也疏不可不順己宗判論錯者故彼疏云由趣寂者與增上慢合一處説翻譯之主同言根未熟令其發心正義應言趣寂者根不熟故佛不與記菩薩與記全令發信解大乘心故增上慢者根未熟故佛不與記菩薩與記發趣向大乘心故若趣寂者後亦作佛違涅槃等處處教文即其義也鈔同引三卷者二四七三卷也彼經云大慧何故復説入涅槃衆生得成佛道佛言我為無餘涅槃界故密勸令彼修菩薩行又密嚴經云般涅槃者非是壞滅若解脫者衆生界滅即壞如來一切智性譬如熱鐵投水勢熱雖除而體不壞又十法經云若不信入無餘依界聲聞成佛過挑一切衆生眼故鈔云明知定無趣寂也言但是三昧等者問入此三昧是何位地人也答一云凡夫人也下引論證增上慢故寡聞比丘之類也二云是阿羅漢四聲聞中決定聲聞故言第四為有定人説化滅喻等者故彼疏云有定人者彼已得定諸有學凡夫人今説往事令憶念故此所起慢或欲界分別或上界煩惱三昧城者謂有學凡夫專心所求在無學身盡無生智後世間禪定所變解脫離能變無總名三昧此定有漏名為世間此中意説佛三事名大般涅槃三乘同得擇滅解脫即是無學解脫道中所證生空理由此後時或苦不生名為解脫佛説此解名為化城生空智證名為暫入以息衆苦故言方便入涅槃城後引至寶所方至大般涅槃城二乘之人加行智永變作此相至於無學解脫道中正證解脫都無分別種種之相出解脫道後世間定心重緣所得以心粗故不知所證之法但見加行所求涅槃解脫相狀便謂涅槃謂有實滅豈非假解是世間定故言以有世間三實無涅槃而生涅槃起堅執心作意欣趣故今破云説彼所證猶如化城尚為不實不應趣求況在無覺假所變耶問此當第三宿世因緣説彼下根五百千二百並是羅漢何云對治增上慢耶答正被下根羅漢兼治彼慢故不相違言三昧者正受也三摩跋提者等至也疏更受變易者釋此生死大分二段初依相宗釋二依性宗釋且初依相宗釋者定性二乘不受變易何以故非彼境界故厭生死切故趣寂滅深故闕智障緣故不長時修故不普化生故不求大覺故得少為足故種性決定故法爾如是故不定二乘五果聖人若在本乘亦不能受回心已後皆許能受二種無學決定便受煩惱盡故分段無故初果聖人或時即受或經一生二生等受極遲不過七大生後受第二果人或時即受或人或天一生一往來已後方受第三果人或時即受或於上地一生二生極遲不過十六生後決定當受直往菩薩若智增上即於初地斷盡分別伏竟俱生不受分段便受變易若悲增上直至八地生空觀恆相續煩惱不起無理能受分段方始受斯變易已上三乘聖人分別煩惱定斷俱生煩惱或斷或伏皆盡無容復受當分段身恐廢長時修菩薩行遂以無漏勝定願力此是無漏後智相應王所一聚有分別業為變易因資現身因資昔地前所造故業招現身因功能殊勝凡小不測令彼長時與果不絶一云令彼業種與果功能而不斷絶二云令彼報理與果功能而不斷絶因既如是果必殊勝彼顯報體改粗令細易短令長改粗身成細身易短命成長命數數如是定願資助乃至成佛解脫道中方棄捨故覺其業勢盡時還用定頭熏資煩惱種在助願潤生每一一資稍得長時煩惱種無闕彼潤緣無一一資時分仍促問變易報體何法是耶答總報正體第八識全唯業果故通一聚故別報兼體前六識中唯取無記業所招者又該根塵具五蘊故問變易因體是何答約增勝論無漏後得有分別智相應定願據盡理論通該一聚心王心所問變易緣體是何答所知障品問如何為緣答有三種一悲願緣由所知障一類法執執菩提可求發起大願執情可度發起大悲欲求菩提欲度有情須賴所依果報之體乃用定願潛資故業方受變易故二所斷緣菩薩之人本求種智所知障品障彼智故唯識云由斷礙解所知障故得大菩提欲斷彼障故留身住受斯變易故三所依緣一切生死染妄之法皆用智障而為所依所依為無生死難立如無大地草木奚存賴彼為依變易方受故復依性宗釋者起信鈔云二乘無學通定不定性長時未回名定性早發大心名不定性由此二種妄心資熏無明故有二種生死暗用龍樹論意豈可事識資熏枝末無明令凡夫受分段苦時彼業識等不資熏於根本無明耶暗破相宗捨分段後方受變易若令不熏彼枝末從何所起便失迷真起妄道理破轉救也然此細苦無始來有即六道凡夫二苦本具無明熏真莫窮其始上下熏力未嘗不無迷自義也今三乘衆厭苦欣樂息妄顯真變易既屬妄苦理合厭而捨之表不故意資感而受但為智行未及何必資熏而受耶結破相宗問二死之體隨目何法為同為異耶若云同者三乘聖人分段既捨變易寧存一體之法不應亦捨亦存故豈可一人亦死亦活也如斬眠士夫豈悟士夫而不傷耶若云體同用異但捨粗用名捨分段者亦不應理三乘聖人同出宅豈可難離燒燃之用而不出於火宅之體耶火宅之體即分段體若言異者二死頓具應有二趣並生之過分段既屬趣生之體變易豈非趣生體耶又云二苦本具變易不賴資熏等因緣者分段亦應不賴造業等因緣故彼此異因不可得故若具不賴深違教理諸教同説業繫果故不修善因應生天界不造惡因應墮地獄分段本具既賴造業等因緣例準變易本具亦賴資熏等因緣故今謂通釋云二種報體同一真界全此全彼隨緣轉故約性常一無始頓具約相不同派成前後分段緣合彼一真界全作分段報體變易緣合彼一真界全作變易報體楞伽經云如來藏受苦樂與因俱若生若滅猶如伎兒又法身經云法身流轉五道名曰衆生又相宗但説阿賴耶為趣生報體殊不知阿賴耶以如來藏為體故密藏經云如來清淨藏世間阿賴耶如金與環展轉無差別仍恐未曉借以喻明如一團金真界本一百鍊不輕千理不改四相莫遷三世莫轉善隨良工作種種像妙隨衆緣作一切法良工意鑄人形彼一團金隨彼良工全作人體復經多時消鎔人形即鑄天形彼一團金全作天體復經多時消鎔天形改鑄形狀種種差別準上可知有同分段將此生彼復經多時消雜類形鑄菩薩形彼金全作故初雖粗弱時出治漸漸細好有同變易轉粗令細復經異時消菩薩形鑄作佛形彼金全作故如捨變易得自受用論彼像體本是一金未作像時一切皆具論彼報體本是一真未作報時一切皆具論彼像相遇緣方有前後不同談彼報果隨緣乃有前後不同但以相宗約相唯前後故性宗徹性亦頓具故非唯本具不賴招感等因緣也何者是因緣次引無上依經寶性佛性論等可知不唯二種生死餘一切法準此可知故下鈔云法離於性本無今有者性出自古此為本有法既離性故本無今有何遇耶即虗空等本無衆生常生衆生若爾法即於性應非本無今有何以論云從無之有曰生自有還無稱滅釋曰緣會事顯則是本無今有無始衆生不可得言本無今有即斯義也更願諸賢證心鏡鑒勿滯常聞返生輕笑賢首師意寄彼六粗以顯分段體三細唯變易體若爾者二乘無學未斷智相及相續相云何已離分段苦耶又分段體而無總報耶又無色界那含聖人入滅盡定應捨分段耶細思賢首義分齊中五教料揀須者應捨鈔生緣惑者所生變易體也能生緣惑體也生對緣惑之即可知相宗所知障為體性宗根本無明助感變易故名為緣障彼淨德乃號其惑言生因惑者所生變易體也能生因惑體也相宗資感性宗親招力勢強勝名因障彼我德稱惑言有者一云有此變易故名有有二云有此細苦故名有有三云生表現有故名有有言無有者一云無彼分段故名無有二云無彼粗苦故名無有三云滅表後無名無有上依義釋竟更依佛性論第三略示名相者一方便生死謂生死緣即無明住地惑能生新無漏業譬如界內無明生行以惑生智非同類故名為方便二因緣生死謂生死因即上無明所生無漏有分別業譬如無明所生行業但感同類故名因緣三有有生死即由前因緣感得變易異熟有果如三界內以有漏業感六趣身言有有者未來生有更有一生故如上流般阿那含第二生般涅槃故亦云有此果故名有有四無有生死即改變易脫譬如生為緣有老死等過患以其報謝後更無有有故名無有名義稍穩細尋可知言緣無明住地者緣之一字義應在下即前生緣惑也因無明住地所起無漏行者因之一字義應在下即前生因惑也雖舉因緣意取報故言種意生身者聲聞緣覺菩薩也又準下疏云然此身第四云謂入於三昧離種種心寂然不動心海不起轉識波浪了境心現皆無所有云何覺法自性謂了法如幻皆無有相心轉所依依如幻定及餘三昧能現無量自在神通如華開敷速疾如意如幻如夢如影如像非造與造相以一切色相具足莊嚴普入佛剎了諸法性故云何種類俱生無作行謂達諸佛自證法相釋曰初從所依定為名次從所依智立稱三自證法相義定慧及法性相故名種類由此故能隨衆生類種種一時現生任運而成云無作行若依地位初則五地前次即八地前後即八地後等即其義也言譬如四取者或見欲貪我語言三三有漏業為因者三字在果欲色無色三字在因福非福不動言起三種有者三界各一故言何無有等者謂變易身為緣剎那滅為體如分段中生支為緣老死支為體故言無明住地一切煩惱是其依處者相宗所知障與四住煩惱障作依處性宗智礙與九相煩惱礙作依處言因無明住地起輕相惑有虗妄行者因字合在行字之下言輕相惑者揀異有漏有虗妄行者招生死故一云無漏之法非是其惑由與惑俱故名為惑如礦金故二無漏之法亦是其惑由帶其妄故名為惑即是不覺故言緣無明住地等者緣字合在字下因字合在業字下起字合在因字下讀者應審言一切煩惱諸業生難如次因緣雜三法也言無明住地所起方便生死者即生緣惑一云種起現故二云前起後故三云用起體故四云本起末故緣從果以得名生死之方便依主釋也如分段中無明支也言因緣生死者生因惑也因得果名故分段中行支也言生報難生支也言過失難者老死支也問無漏業是道諦變易體是苦諦若許爾者理應集諦證彼滅諦彼既不爾此云云何然若皆許爾是則四諦因果便成雜亂今謂通云彼無漏業通二諦收約斷漏義得名道諦分證滅諦約相有義得名集諦招變易苦故無前失準上經論十地菩薩已出分段若依賢首義分齊中更有別理不可不知故彼文云若直進中有二説一謂寄顯十地之中功用無功用粗細二位差別相故即説七地已還有分段八地已上有變易二就實報即談分段至金剛已還以十地中煩惱障種未永斷故留至金剛故既有惑障何得不受分段之身故十住經中十地已還有中陰者是此義也八地已上一切菩薩於煩惱障永伏不行以無流知果恆相續故如阿羅漢既無現惑何得更受分段身耶答若是凡夫即以現惑潤業受生聖人不爾但留惑種用以受生故雜集論云一切聖人皆以隨眠力故結生相續又梁攝論云異凡夫故永伏上心異二乘故留彼種子解云聖生非現潤彼復留種如何不受分段身耶若言八地已上以知障為緣受變易者所留惑種即便無用何不於此第八地初永害一切煩惱種子耶彼既不爾此云何然若約回向菩提聲聞已斷煩惱者彼即可以所知障受變易身通諸位也問若爾何故有聖教説八地已上唯所知障為依止故受變易身答等為欲寄對二乘顯其優劣故作是説又云若準圓教不説變易但分段身至於十地離垢定前以至彼位得普見肉眼故知是分段也又如善財等以分段身窮於因位故也言下疏明四種生死可撿於此論者應平聲呼之即是説義即是名號品疏也鈔大涅槃光所入毛孔者云涅槃時佛光入衆生毛孔故二云涅槃經教光入衆生心毛孔故言佛性略有五種者謂善如清水性不善如濁水性無記如不太清不太濁水性果如清淨水性理如水濕性言離欲善根人等者得定凡夫離欲但伏其現那含聖人離欲亦斷其種問真妄交徹中如來不斷性惡何故今云善根人無不善佛性耶答前約以相從性云不斷此約以性從相云無又前據曾談從舊得名云不斷此據現説新來離妄云無又彼相宗復有四句一因成果不成為大悲菩薩二果成因不成有性斷善恨人三因果俱成有性不斷善根人四因果但不成無性斷善根人若約性宗容有前三但無第四又準彼宗第五無性有三梵名翻譯亦異一阿闡底迦此云不樂欲不樂涅槃故二云一闡提迦此云樂欲樂住生死故此上二名亦通大悲及與斷善二種人故三云阿顛底迦此云畢竟無唯局無性通斷善根及與不斷但無三乘無漏種故若準性宗斷善之人且就長時言畢竟無或約大悲願力故當不成佛名畢竟無疏若有衆生不入涅槃我亦不入涅槃者故下鈔云一切如來因地發願度盡衆生生界不盡不取正覺現是衆生沉淪九有故知諸佛未合有成則違誓古有多釋一云本擬度生未期成佛積行淳熟行催自成如撥火杖本欲燒草不欲燒杖撥草既多任運燒盡故三論師詺為不自在佛不欲成佛而自成故有云成佛若不化生可違本誓成佛亦化衆生豈違本誓難云化生之義雖許得存盡竟方成真義何在豈得不違如實義者諸佛皆有悲智二門以大悲故窮未來際無成時故菩薩闡提不成佛也以大智故念念速成又欲化盡諸衆生界自須速成方能廣化不懼違昔盡竟成言又了衆生之本如故化而無化是則當成亦常不成亦常化生而常無化悲智自在何局執耶鈔彼有十意者一為引攝一類引不定二乘令依大乘涅槃故二謂任持所餘即大住已前猶居退位恐於大乘退思二乘故三法等故行乘唯有異而趣真無別四無我等故若有實我可有乘別既無實我故説一乘五解脫等故三乘並於煩惱障中而得解脫解脫無別故六性不同故不定性人具大乘種由有此性故説一乘七佛於有情得同自體意樂故此彼相即我既成佛故彼亦成佛故八二乘於佛得同自體意樂同名菩薩得受記別故謂於此會中佛與二乘受佛記別為令攝得如是意樂我等與佛平等無二菩薩名同一得記別九化故示同趣寂後起得記使彼不定信捨寂求記十究竟故由過此外無別勝乘依理究竟最為殊勝故説為一鈔義語相違者義當第二語判第三故疏理性定有行性或無斯言可爾者縱彼相宗所言契當也此約言同教作是説若約本義理性大同行性全異行者相宗行性即目法爾無漏四智本種性宗行性即目所修善行攬理所成以為其體泛約言同故言可爾鈔何以至今猶存無義者清涼傷嘆也彼時經文未全諸德言無可爾今時文具何存無義鈔能化便成無用者疏云即為調伏所化聲聞佛菩薩等自化其身為彼同類於無餘依現般涅槃經百千劫耽寂滅酒醉逸而臥後從彼起現受佛記令諸不定種性二乘盡作是心往昔耆尊入涅槃者今皆復起現受佛記況我今者不希作佛而入涅槃據上所説即是有用何故鈔云便成無用耶答若相宗具大乘不定性人假設不化終不沉寂故成唯識云如諸異生拘煩惱故若定性人決定沉寂終不可化無用之難其理昭然鈔然準法相立新熏者亦説有五等者準彼宗説護月菩薩唯談本有設後熏習但令增長離本有種更無別體難陀菩薩唯用新熏三乘無漏見道之種世第一心新所熏成建立五種性但依二障可斷不可斷義非謂法爾有無種異若依煩惱障種可斷義邊利鈍差別開成聲聞及與獨覺二類種性若依二障皆可斷除立作決定大乘種性若依二障單䨥不定可作不定種性若約二障畢竟不斷立作無種性非無漏種法爾已來有無差別故有漏種子無始已來具能所熏立作斷熏其理可知護法菩薩新本合用本種遇緣本種性現新熏遇緣新熏生現二齊遇緣二合性現如一麥中多麵塵故能持識體無差別故無漏種子法爾已來有無類別不許有漏世第一心熏無漏種見道已去無漏現行方許新熏有漏種子具本具新其理昭然但在第八識中自證分內生現功能以為其體故具足六義遮他表自以為其相唯是有為不通無為與此性宗其義全別故鈔云今借其言不依其義也鈔如折金杖者俱舍疏云建陀羅國有王名迦膩色迦其王敬信尊重佛教味道忘疲傳燈是務有日請僧入宮供養王因問道僧説莫同王甚怪焉問脅尊者曰佛是同理無異趣諸德宣唱奚有異乎尊者答曰諸部事興雖復方途津梁一揆是故大聖喻折金杖等餘無鈔同言況以爭衣者俱舍論云過去迦葉佛父訖栗㭁王作十種夢來白彼佛佛言此衣當來釋迦如來遺法弟子之兆也其王夢見一衣堅而且廣有十八人各執少分四向爭挽衣猶不破此不表遺法弟子分佛正法成十八部雖有少異軌而真法尚在依此修行皆得解脫彼有十夢此當第九夢矣故鈔云疏以深密第二第三時同許定性二乘俱不成佛者問前説深密第二時一向成佛是為太過云何此言定性不成佛耶答深密第二時文雖説一切成意乃定性不成佛也又彼依二以判三時一約成佛不成佛故第二時一向成第三時有成不成二約三性空有故第二時唯空第三時中道皆許定性無性不成佛故今據三性空有云第二第三定性不成佛也問第二空宗一味真空云何説得不成佛耶答真諦皆空成與不成俱泯俗諦皆有有成不成故疏頓詮此理故名頓教等者問此門相本自盡性本自現無斷無縛約法唯是絶待一如約人唯有清淨解脫者何者能化何者所化何須設教化之何益又終教成佛為實為權耶若實何須頓教若權行相云何今通此等多難故立一章顯示蓋聞真空緣相無升沉之兩岐幻有隨緣派上下之二轉由是逮頭橫走捨父虗貧逐陽焰以撈魚趁空華而採果故我世尊與一子念身雲示遍於塵方運同體悲法雨宣流於沙界雖開通於多路復淺復深然綰攝於二門乃頓乃漸其頓教也詮即心即佛之旨何假三祇顯無斷無縛之宗不登五位似神仙術點瓦礫兮即時成金如菩薩通攬江河兮頓然作乳其漸教也説從凡入聖之旨定歷三祇闡斷妄證真之宗須經五位類陶治匠煉金砂兮漸漸成金同放牧人執牛乳兮微微得乳匪唯頓漸成株抑又權實不等故龍樹云欲開隔檀門權顯狂向位雖聖教而昭昭同懸日月奈凡情而漠漠各説青黃鮮演忝為佛使濫作人師丁迷昧之時難默斐然之談是以時陳小喻助顯宏宗但曉悟於童蒙焉敢呈達識本意乎欲提耳而告擬指掌而示之冀信心而受獲昭體而證之者歟如世二人漸頓兩眼同在覺位向真如門無病安健相盡性見同在眠位向生滅門夢見自身妄認之體尫羸憔悴凡夫下劣復縈重病更纏厚障由慣習力眠心變力由熏習力唯識變力而於夢中生滅門內遇自親知得逢是時親知世尊伺察二人令時世尊觀緣兩根利鈍有異頓漸成別一人聞説本身無病即便信受如彼頓根一人聞説自體安健未肯信受如彼漸根是時親知爾時世尊隨彼二人應彼兩根利鈍有異頓漸成殊乃設二法乃施兩教為初人云化頓根云汝身自體無病相本自盡本來安健性本自現不須服藥而療治之非賴修行而斷除之汝今一切所見皆是眠心眠心生則眠位一切法生眠心滅則眠位一切法滅心生則種種法生心滅則種種法滅眠心有也多時尫羸眠心息也頓爾安健心有也曠劫而滯凡夫心無也剎那而登證覺上所聞言雖無眠中乃談覺位事順向覺位稱實説故上所聞教雖在生滅門中仍詮真如義向真如門如如説故是時彼人爾時頓根成皆信受總領頓教即生不羸不病之解永於覺位故頓起寂滅寂靜之念隨順於真如門未覺之時恆如其上未臻得入但且同常颯然得覺頓爾得入所見親知所見世尊所聞言説所聞頓教永覺之心俱非心念一切皆離説念成主省本安健悟本元佛為後人云化漸根云汝今尫羸汝是凡夫身縈重病體具多障汝病可差非同闡提宜服良藥應修對治漸漸調治漸漸斷除方得安健乃得成佛是時彼人爾時漸根咸皆信受總領終教雖受此言未求良藥雖信佛語未修對治寄邪邪地復經少時又歷餘時從親友所向世尊逐乞得良藥永得對治乍咽乍吐或修不修正氣才生那氣微損覺心初發滅相始立寄十信位藥力更盛病勢復痊覺心轉明執計相除寄三賢位勉強學行同修十度寄十地位平復如故寄如來位雖得安健猶在夢中雖成妙覺而在生滅伺彼信解還説前言待彼根熟却談頓教方從夢眠以趣覺位乃從生滅以入直門直就窮中但論平復不遮前位皆求其覺今論究竟直論妙覺不障餘位皆許入頓義不異前無繁再示就覺位論約直門説在眠二人自體就相兩眼己身所見良善親知所遇大慈世尊所聞權實兩説所聽終頓二教一味元無平等真空就夢位論約生門説二人自體兩眼己身所見親知所遇世尊所聞權實兩説所聞終頓二教一向是有皆總成幻以見二位皆各總攝一切法故以此二門皆各總攝一切法故所以者何何以故以此二位不相離故以此二門不相離故既爾二言皆齊寧分權實若爾兩教皆齊何分頓漸答曰就體無別約詮有異尅體不隨用分異一順覺位稱實説故一順真門如如説故一順眠位權假説故一順生門虗妄説故是故得知權實有異由此應信頓漸逈別雖眠覺之二位有異然士夫之心體不殊雖真生之二門有異然法界而心性莫殊隨眠位之種種妄解多一識心在覺位之一向親知一一識心若順眠位認自病生從微至著常住心念認自病差從重向輕無常心念屬眠位攝生滅門攝若順覺位了本無病達無新差俱非心念屬覺位攝真如門收前就覺位心念皆無無一一法非真如故都約眠位心念皆有無一一法非生滅故今從所順各歸一位俱就所順各屬一門外曰認自病生從微至著常住心念認自病差從重向輕無常心念俱在眠位眠心所攝俱在生門多一心攝理順無惑無勞被結了本無病違無新差之俱非心念眠心攝耶多一心耶覺心攝耶一一心邪若屬眠心順覺位故若屬多一是隨順故若屬覺位在夢眠故若屬一一動念故今謂通云據實二位皆收一一門齊攝但從所順別屬覺位唯從所順判歸真門問答云云準前咸悉上來法喻璨若星分勿對舊見不生新解豈不知愚癡農夫守株待兔智慧賈客麻須易金況乎依法不依於人依義不依於文者哉雖無顯教之所憑實乃澄神之所得幸願群賢俯賜鏡鑒言以四教中皆有一絶言故者四教之根見道已去所證真理皆離言故鈔何得難言更何是教者教字誤書應是理字或據返難義亦可通言形雖入豈智未升堂者堂之與室義一名異意云論其身則以為入室之資何殊十哲量其智則未是升堂徒無異三千矣又解私寢在內稱室通賓處外堂以況刊定身已臻於內室智未階於外堂尚難齊於七十豈能預於四科者乎言若不指一言等者一言即知之一字也故圭峯云性宗對久學及上根令云亡言認體故一言直示即知之一字也達磨云指一言以直示後人意不解尋思何言是一言若云即心是佛是一言者此是四言何名為一也疏圓教者明一位即一切位等者賢首義分齊中問曰既一位中有一切位及信滿心即得佛者何須臾説後得初則得後者亦可後亦具初既不得後應亦不得初耶答實爾但得初時無不得後故是故無有未得後而不得初也問若爾云何得説諸位階降次第答以此經中安立諸位有二善巧一約相就門分位前後寄同三乘引彼便故是同教也二約體就法前後相入圓融自在異彼三乘是別教也但以不移門而恆相即不壞即而恆前後是故二義融通不相違也問若爾是初門即一切者何不説信位初心即得而説滿心等耶答若自別後教即不依位成令寄三乘終教位説以彼教中信滿不退方得入位今則寄彼得入位處一時得此一切前後諸位行相是故不於信初心説以未得不退不成位相但是行故問若爾應云住位成佛何名心滿答由信成故是行佛非位佛也餘義準之鈔欠二十五法者心法欠七心所欠五謂善中無癡一根本中惡見一大隨中不正知妄念散亂三不相應中欠十流轉與定異相應并勢速次第時方數和合不和合無為中欠三不動念受滅真如故二十五疏説有百法者夫百法者瑜伽經緯唯識宗挑具義何限於萬重出體無過於百數若曾習於彼教罔假區分慮但鍊於斯文故伸標釋此一百法勒為五門一心法二心所有法三色法四不相應行法五無為法心法有八一眼識二耳識三鼻識四舌識五身識諸識雖差體性行相了別是同然此五識別了識等五塵為境仍任運知俱得自性現量性故若入地後許互緣故自實他假亦無根境壞亂之失隨根立名建號決定三性逢順等境三受客俱六位心所與識相應謂遍行別境善但具十無輕安故煩惱具三貪嗔癡故隨惑之中但俱中大無小隨十不定全無界繫云何眼耳身三識色通界初禪鼻舌二識唯欲界一地緣合不定或俱不俱六意識得名作釋亦如前五不同眠等別緣五塵此識通能了一切法仍非任運假實俱得亦通三性及與五受間憂喜故三塗實苦三禪真樂餘處苦樂皆假説故心所相應通五十一界地差別除無想天及無想滅盡二定極重悶眠二位此五位無餘時無間七末那識末那梵語此翻云意積集了別劣餘七故恆審思量勝餘七故獨彰意號不名心識若據總名理亦無遮思量便為體性行相依異熟識復恆緣彼執為內我所變親相真帶質境或本或見或別種生有覆無覆性亦不定心所相應具十八數遍行五所別境中慧根本四惑癡見慢愛隨惑大八具足二執唯是俱生有覆無記性所攝故三受之中唯具捨受與第八識齊生同繫恆續無間此染污名三乘無學種現永滅有學滅定出世道中暫伏滅故善無記法正漏體者通此識惑恆行不共長夜未醒獨在無明也八阿賴耶識此翻云藏具有能藏所藏執藏義故謂與雜染互為緣故有情執為自內我故攝持因果以立自相別業總根真異熟識界趣生體變異異時異類熟故名為果相執持一切種子不失立因相名然此種子亦名因相而有二類一者本有法爾而有二者始起熏習而有又此種子而有六義一剎那滅才生即滅故二果俱有與俱生故三恆隨轉續至究竟故四性決定善等性定故五待衆緣賴緣方生故六引自果色心各生故此種勢力生近正果名曰生因引遠殘果令不頓絶即名引因內種必由熏習生長親能生果是因緣性何名熏習所熏能熏各具四義所熏四者一堅位性二無記性三可熏性四與能熏和合性此上四義準此識具能熏四有一者生滅二有勝用三有增減四與所熏和合唯七轉識及彼心所具上四義可作能熏此識行相任運了別所緣之境而具三類根身種子及器世間前之二類是所執受後之一種但為所依無漏種子持而不緣性相違故若隨業力唯變當地惑約定通亦變餘地二變之中因緣變故三境之中性境所攝心所同緣但分別變三境之中獨影境攝故無六處受熏持種六根身過性唯無記亦無覆故心所相應唯具遍行五受之中唯捨受故復與末那相依而轉如瀑流水非斷非常二乘無學八地菩薩方永捨故然此八識自位説竟具能緣多少云何眼識九緣謂空明作意種子根境明了第六深淨第七根本第八耳識其八於前九緣不假其明鼻舌身識各具七緣復除其空合中知故第六具五種子境界作意七八為依第七具三根境合一種子作意第八具四開根境故若加等無間於前各增一眼識九中不共眼根六七八識四是所依具四義故調決定有境為主令心心所取自所緣故餘五唯依不具義故餘之七識準此應悉上所明義據有漏位若論無漏其義稱異二乘入見直至無學唯轉第六唯生空故大乘入地亦轉第七六入生空七除我執六入法空七成無漏五八二識佛果方轉同境根故為所熏故前五後得許疏緣如後三通本亦親緣故第八心王變自受用及持德種餘之七識但故疏緣不容親變餘身土及親變之時亦不違理第八淨心如大圓鏡第七平等翻我立號審根兩法六名觀察五識利生時名成事實具遍別善所相應通二十二揀擇力勝但彰智號六識容間七八相續大同因位神力難思許化四事內之三分皆得互緣實亦自緣成遍知故但新舊緣變不變殊無熏緣過八非無記七無增減非能所熏更不新熏故先後成佛德平等二心所有法言心所者謂恆依心起與心相應許屬於心故名心所如屬我物立我所名心於所緣唯取總相心所於彼亦取別相助成心事得心所名如畫師資作摸填彩故瑜伽説識能了別事之總相作意了此所未了相即諸心所取別相觸能了此可意等相受能了此攝受等相想能了此言説因相思能了此正因等相餘處復説欲亦能了可樂事相勝解亦了決定事相念亦能了慣習事相定慧亦了得失等相故遍行等名心所法諸心所法皆於所緣兼取別相雖諸心所名義無異而有六位種類差別一遍行遍四一切故謂遍三性及與九地諸心起時必無前却八識咸俱住在何位一觸令心心所觸境為性受相思等所依為業二作意警心為性引心為業三受領順等境為性愛為業四想取像為性施設名言為業五思造作為性伇心為業次別境謂緣所決定曾習觀察別別之境故名別境四一切中唯遍性地起亦不定五受咸俱一欲吝望為性勒依為業二勝解印境為性非轉為業三念明記為性定依為業四定專注為性智依為業五慧揀擇為性斷疑為業善有十一唯善心俱得善所名善者順益義此世他世俱順益故有尋伺等三地有故唯除輕安非欲界有餘通三界五受三中唯除輕安憂苦不俱餘具五受此與別境皆得相應不相違故一信於實德能深忍樂欲心淨為性樂善為業二慚崇重賢善為性止息惡行為業三愧輕拒暴惡為性止息惡行為業四無貪於有有具無著為性五無嗔於苦苦具無恚為性六無癡於諸諦理明解為性此三同以作善為業七勤善惡修斷勇捍為性滿善為業八輕安調暢身心為性轉依為業八不放逸防修為性成滿善事為業十行捨令心平等為性治掉靜住為業十一不害不損有情為性治害悲愍為業此十一法三是假有謂不放逸精進三根於此四法修斷事中皆能防修名不放逸非別有體無異相故行捨亦即此四法上令心遠離掉舉等障靜住名捨非有別靜不害即以無嗔一分於諸有情不為損惱假名不害無嗔拔苦不害與樂粗相差別餘八實有相用別故四煩惱有六此貪等六性是根本得煩惱名一貪於有有具染著為性能障無貪生苦為業二嗔於苦苦具增恚為性不安惡行所依為業三癡於諸理事迷暗為性一切雜染所依為業四慢高舉為性生苦為業五疑諸諦猶預為性能障善品為業六惡見此行相差別有五一薩迦耶見執我我所故二邊見執斷常故三邪見撥無因果故四見取五戒禁取執自見自戒是勝是淨能得涅槃故無利勤苦等以為其相如是總別十煩惱中六通俱生十分別起疑後三見唯分別起貪為嗔疑定不俱生貪與慢見惑得相應嗔與慢疑惑得俱起嗔與二取必不相應此與三見惑得相應慢於境定疑則不然無相應義慢與五見皆容俱起然與斷見必不俱生與身邪見一分亦爾疑不審與見相違定不俱起五見展轉必不相應非一心中有多慧故癡與九種皆定相應諸煩惱生必由癡故貪嗔癡三俱生分別一切容與五受相應分別慢唯四受相應三塗無故若俱生慢亦苦俱故疑後二見容四受俱唯除苦受俱生二見容五受俱分別二見唯除苦受三性之中嗔唯不善損自他故餘九通二上二界者唯無記攝定所伏故若欲界繫分別起者唯不善攝發惡行故若是俱生發惡業者亦不善攝餘無記攝三界繫別嗔唯在欲餘通三界六煩惱中見是假有即慧分故餘是實有別有性故五隨惑有二十唯是煩惱分位差別等流性故名隨煩惱此二十種類別有三謂忿等十各別起故名小隨煩惱無愧遍不善故名中隨煩惱掉舉等八遍染心故名大隨煩惱但小隨十一忿憤發為性執杖為業二恨結怨為性熱惱為業三覆隱藏為性悔惱為業四惱佷戾為性蜇螫為業五嫉妬忌為性憂戚為業六慳祕吝為性鄙畜為業七誑詭詐為性邪命為業八諂險曲為性不受教悔為業九害損惱為性遍惱為業十憍醉傲為性染依為業中隨二者一無慚輕拒賢善為性二無愧崇重暴思為性同長惡行為業大隨八者一掉舉令心不靜為性能障止品為業二昏沉令心無堪為性能障觀品為業三不信心穢為性惰依為業四懈怠修斷事中懶惰為性能障精進增染為業五放逸不能防修縱蕩為性增惡損善所依為業六失念不能明記為性散亂所依為業七散亂令心流蕩為性惡慧所依為業八不正知謬解為性毀犯為業二十皆通俱生分別此二十中小十展轉定不俱起互相違故中二一切不善心俱隨應皆得小大俱起大隨煩惱遍諸染心展轉小中皆容俱起中大全與五受相應誑諂憍三五受容俱忿等七法但除其樂唯欲界故二十容與別境俱起此中妄念不正知念慧體者容餘與四相得應故通癡分者五皆相應忿與念俱剎那去過曾習類故散亂與定相應無失染定之中亦疏擾故中二大十八煩惱俱小十定非見疑俱起粗細異故忿等五法容慢癡俱非貪恚並是嗔分故慳癡慢俱非貪嗔並是貪分故憍唯癡俱與慢解別是貪分故覆誑與諂貪癡慢但行相無違貪癡分故小七中唯不善攝小三大八亦通無記小七中二唯欲界攝誑諂欲色餘通三界此二十中小十大三定是假有忿恨惱疾害依嗔分立覆諂誑三貪癡分立慳憍二法貪愛分立放逸謂由懈怠及貪嗔癡不能防修總名放逸非別有體餘皆實有六不定有四於善染等皆不定故非如觸等定遍心故非如欲等定遍地故立不定名一悔追悔為性障止為業二眠昧略為性障觀為業三尋令心於境粗轉為性四伺令心於境細轉為性此二俱以安不安住身心分位所依為業四中尋伺定不相應粗細異故依於尋伺有染離染立三地別不依彼趣見起有無故無雜亂俱與前二容互相應前二亦有互相應義五受之中惡作除喜樂唯戚行故眠除樂受唯欲界故尋伺通五受遍初禪故四皆容與別境俱起行相所緣不相違故悔眠俱與十善容俱此唯在欲無輕安故尋伺容與十一善俱初靜慮中輕安俱故悔但容與無明相應此行相粗貪等細故睡眠尋伺十煩惱俱彼此展轉不相違故悔與中大隨惑容俱非忿等十各為主故睡眠尋伺二十容俱眠等位中皆起彼故此四皆通善等三性於無記業亦追悔故生得加行二善咸通染淨無記後三皆通惡作非染解粗猛故四無記中悔唯中二行相粗猛非定果故眠除第四非定引生尋伺除初彼解微劣不能伺察名等義故尋伺是假思慧合成悔眠是實尋伺因無漏悔眠唯有漏作惡眠唯欲界有尋伺在欲及初靜慮餘界地法皆靜妙故此等心所望彼心王依同時同所緣亦同事各體一故所及王得名相應故三者色法略有十一謂五根五境法處所攝質礙變壞名之為色言五根者一眼根二耳根三鼻根四舌根五身根謂第八所緣不共不共四大所造淨色為體能與五識作不共根故言五塵者一色二聲三香四味五觸根境對論五識親相以總從別以暗從明第八所緣內外諸色亦在此收法處所攝而有五類一極略折俱礙色至鄰虗量故二極逈折所礙色至不可折故三受所引生色即無表戒四定自在所生色即定果色五偏計所起色意識所得異前四種皆此所收四不相應行法略有二十四謂不與心心所色法相應名不相應行揀無為以立此名一得於一切法成就用故二命根現生第八親名言種隨業世勢力連持色心一期決定差別用故三衆同分人法自類相似用故四異生性見所斷種令彼聖性不成用故五無相定六滅盡定咸以遍別善王二十二法微微心種礙心功能以為其體有漏無漏凡聖所得二定別故七無想異熟彼定所熟感長壽天中第六別報遍別心王十一法種礙心功能中位無心以為其體八名詮自性故九句詮差別故十文為二所依彰彼二位故但依此土依聲假立若通餘土色等亦立十一生表先無故十二住表暫有故十三異表轉變故十四滅表後無故十五流轉因果續不斷故十六定異因果各無雜故十七相應因果相順故十八勢速行轉迅疾故十九次第因果各不俱故二十方約顯色分劑故二十一時三世異故二十二數一多等別故二十三和合二十四不和合有為諸行聚散緣別故五無為法略有六種本性凝寂無始體真性離有無豈存生滅動作俱泯故號無為一虗空體無色性無礙容受故二擇滅謂由慧力滅障顯得故三非擇滅緣闕不生性本清淨伏惑所得故四不動不為苦樂行所動故五想受滅想受不行之所顯故六真如離妄別倒性常周遍故前五是假就義徑六故後一是真尅法本真故前五亦容識變後一唯目法性法相要義不可不知願諸後學勿倦文繁鈔謂種子識等者一云種子不離識故名種子識唯取種子體二云識持種故名種子識唯取現體三云種用識體持業立名種出現䨥取今據初解鈔一本性住唯法爾種二習所成通本新故本有重長新熏熏生疏既所立識唯業惑生者第八識全前六識分業惑親生異熟法故第七識全前六識分業惑疏生依異熟故鈔分別緣所生者一云虗妄義二云緣慮義言淨分依他亦圓成者無漏有為而有二門一常無常門此當無常依他性攝二漏無漏門此當無漏圓成性攝言性顯二空非圓成實者解性字也二空但是所遣二我以為其門能遠離真性方是圓成今言其性即能遠離揀非所離故此云爾梵云舜惹名空梵云多名性是故得知性與二空其體甚異言真如離有離無性者釋上性也意表真性任執有無一切皆離故鈔依唯識第九有四種勝義等者別名略如其鈔釋名出體今當粗陳初釋名後出體初文復二初釋總名次釋別名釋總名者護法釋云世謂隱覆可毀壞義俗謂顯現隨世流義此諦理應名隱顯諦隱覆空理有相顯現如結手巾為兔等物隱本手巾兔相顯現此亦如是今隨古名名世俗諦又復性墮起盡名之為世體相粗顯目之為俗世即是俗名為世俗或世之俗義亦無違諦者實義有如實有無如實無有無不虗名之為諦世俗即諦世俗之諦二釋如次勝謂義有二種一境界名義二道理名義第四勝義諸論多説勝即是義或四勝義皆勝之義論説依他圓成二性隨其所應根本後得二智境故其無漏真智隨在何諦亦以勝為義真如為境故通有財釋第四勝義多分依於道理名義廢詮談旨非境界故前三勝義境界名義諦者實義事如實事理如實理事理不謬名之為諦勝義即諦勝義之諦二釋如前如四聖諦聖者能知有無事理皆不虗設目之為諦次釋別名世間世俗者隱覆真理當世情有墮虗偽中名曰世間凡流皆謂為有依情立名假説名為世俗道理世俗者隨彼義立蘊等法名為道理事相顯現差別易知名為世俗證得世俗者施設染淨因果差別令其趣入名為證得有相可知名為世俗勝義世俗者妙出衆法聖者所知名為勝義假相安立非體離言名為世俗此中世間即世俗諦乃至勝義即世俗諦皆持業釋世間勝義者事相粗顯猶可破壞名曰世間亦聖所知過第一俗名為勝義道理勝義者知斷證修因果差別名為道理無漏智境過前二俗名為勝義證得勝義者聖智依詮空門顯理名為聖得凡愚不過前三俗名為勝義勝義勝義者體妙離言逈超衆法名為勝義聖智內證過前四俗復名勝義此中世間即勝義諦乃至勝義諦皆持業釋或勝義之諦依士無失次出體者第一世俗體者顯揚論説謂所安立瓶軍林等我有情等或無實體實無但有假名都無體性然通有用無用二法瓶等有用我等無用涅槃第十三云有名無實如我衆生乃至施火之輪及名句等五種世法是名世諦衆生等用無火輪等體無第二世俗體者瑜伽論説謂所安立蘊處界等涅槃亦言諸陰界入名為世俗即有無為諸法體事有別體用異於初俗第三世俗諦體者顯揚論説謂所安立預流果等及所依處即諸聖果四諦理等涅槃亦言有八苦相名世俗諦第四世俗諦體者瑜伽論説即所安立勝義諦性涅槃説言若燒若割若死若依名為世俗由可燒割等無有常一我法等相即二無我名世諦也第一俗體假名安立後三俗體有相安立第一勝義體者成唯識説謂蘊處等事涅槃亦言有名有實名第一義蘊處界等亦是勝義第二勝義體者成唯識説謂四諦等因果體事涅槃亦言苦集滅道名第一義諦第三勝義體者成唯識説依詮門顯二空真如涅槃亦言無八苦相名第一義總觀諸法為二無我故無苦等名勝義也第四勝義體者瑜伽論説謂非安立一真法界涅槃亦言實諦者即是如來虗空佛性又言無燒割等名第一義不依無我而顯真故前三勝義有相故安立第四勝義無相非安立初之一俗心外境無依情立名名為世俗第二俗諦心所變事後之二俗心所變理施設差別即前三真其第四真唯內智證非心變理隨其所應即是三性上來顯名辨體境更有餘門備在法苑法相準繩勿倦文繁疏同時四相滅表後無者立則四相同時顯則滅獨過去但約相滅衆生異時疏義説䨥觀決定別照者一本後相從義名䨥觀本後別論實乃別照二自證體同義説䨥觀見分用異決定別照三根本䨥斷義説䨥觀後得單斷決定別照四後得遍智義説䨥觀根本單緣決定別照五了俗由證真義説䨥觀二智不融二境不即而常別照鈔世出世斷道者謂後得智䨥緣事理故或後得智緣世間故名世性無漏故名出世言斷迷事理即觀理境等者附性宗談相宗義也性宗説彼所斷即所緣境故云照惑本空又龍樹云粗中之粗凡夫境界等相宗不爾謂根本智唯緣真理䨥斷迷理迷事二惑後得智通緣理事單斷迷事一惑故或根本智親緣理境能斷迷理之惑後得智親緣事境但斷迷事之惑也言應云義説䨥斷者約本智也而實別斷者約後得智也鈔一切種等者一切種者所觀境也或屬能觀類差別故言心者八識心也言心所有法者謂遍行五別境五善十一也言及彼品類者通該五蘊也言四念住者身受心法也言大圓境智成自受用等者實乃第八淨識舉鄰近勝法故不爾應有二十二根身過平等性智應根説法故四智各別解也疏少説法相等者其猶説海水多波少也波浪之外有靜水故所有波浪皆是水性故鈔謂唯真不生者問佛果功德豈非真性耶答此據妄識非謂一地如水靜故不賴風緣又約舉妄顯真亦非唯真性也疏但以是真如等者下疏釋真如云不變為真順緣曰如由不變故與有為法有非一義由順緣故與有為法有非異義而起信云無遣曰真無立曰如唯約遮詮頓彰其理亦非真性也鈔如失濕性將何隨風等者下疏釋水有十種義即同真性故一水體澄清喻自性清淨心二得泥成濁喻淨心不染而染三雖濁不失淨性喻淨心染而不染四若澄泥淨現直心惑盡性顯五冷成氷而有硬用喻如藏與無明合成本識用六雖成硬用而不失軟性喻即事恆真七暖融成軟喻本識還靜八隨風波動不改靜性喻如來藏隨無明風波浪起滅而不變自不生滅性九隨地高下排引流注而不動自性喻真心隨緣流注而性常湛然十隨器方圓而不失自性喻真如性普遍諸有為法而法失自性略辨十義少分似真故多以水為喻疏依他無性即是圓成者鈔雖已明其理昭然仍恐初學猶壞迷懵強用情螺荐斟義海釋茲三性啓彼二門初直明正理後決擇殘疑且初明正理者三性各有二義真中二義者一不變義二隨緣義依他二義者一似有義二無性義所執二義者一情有義二理無義由真不變依他無性所執理無由此三義故三性一際同無異也此即不壞末而常本也經云衆生即涅槃更不滅也又約真如隨緣依他似有所執情有由此三義亦無異也此即不動本而常末也經云法身流轉五道名衆生故也則由此三義與前三義是不一門也是故真該妄微妄徹真源性相融通無障無礙問依他似有等豈同所執情有耶答由二義故是故無異也一以彼執執似為實故無異法二若離所執似無起故真中隨緣當知亦爾以無所執無隨緣故問如何三性各有二義不相違耶答以此二義無異性故何者無異且如圓成雖隨緣成於染淨而恆不失自性清淨只由不失自性清淨故能隨緣成染淨也猶如明鏡現於染淨雖現染淨而恆不失鏡之明淨只由不失鏡明淨故方能現染淨之相以現染淨知鏡明淨以鏡明淨知現染淨是故二義唯是一性雖現淨法不增鏡明雖現染法不污鏡淨非直不污亦乃由此反現鏡之明淨當知真如道理亦爾非直不動性淨成於染淨亦乃由成染淨方顯性淨非直不壞染淨明於性淨亦乃由性淨故方成染淨是故二義全體相收一性無二豈相違也依他中雖復因緣似有顯現然此所有必無自性以諸緣生皆無相故若非無性即不藉緣故即非似有似有若成必從衆緣從衆緣故必無自性是故由無自性得成似有由成似有是故無性故智論云觀一切法從因緣生從因緣生即無自性無自性故即畢竟空畢竟空者是即般若波羅蜜此即由緣生故即顯無性也中論云以有空義故一切法得成者此則由無性故則明緣生也涅槃經云因緣故有無性故空此則無性即因緣因緣即無性是不二法門故也非直二義性不相違亦乃全體相收畢竟無二也所執性中者雖復當情稱執現有然於道理畢竟是無以於無處橫計有故如於木杌橫見有鬼然鬼於木畢竟是無如其於木鬼不無者即不得名橫計有鬼以於木有鬼非由計故今既橫計明知理無理無故得成橫計成橫計故方知理無是故無二唯一性也當知所執道理亦爾上來直名正理竟後決擇殘疑者問遍計是無依他幻有圓成實有其理逈異如何相即耶答良以此宗本真唯一圓成實性但隨緣故成餘二性何者由諸識熏習故舉體成依他因妄心分別故舉體作遍計類麻體由細合等緣全成其繩因迷倒情全作其蛇據義有異分成三種其體無殊故相即也又解通釋由識熏習妄心分別成依遍二性但宿現別故何者謂從無始以久熏習及與分別故成彼依他但從現在新新熏習及與分別復成遍計如誕一子本無名字同圓成實也乃為呼為揚家轉習經以自他定為似依他也匆有一人乍呼揚家呼作趙家衆皆謂非如遍計性隨門有異而開三種統體無差乃即相也又解若約彼本是虗妄成依他起謂妄差即名遍計如患冷病同圓成實夜夢溺河似依他起怖死求救如遍計性分三相即義不殊前又此三性各具四句真約不變依他就相遍計據情皆是其有真約隨緣依他就性遍計據理咸是其空俱存䨥泯如常可知若具德有茲四句若遮其非亦絶四句反上思之無煩曲示更有餘義準之應悉三性之義二宗之要一切性相咸以為源幸希學者勿咎文繁鈔一因緣上三義具足等者空即所執假即依他中即圓成鈔若言無者智不應二者何分理量二也若言有者智不應一者真智內證應見相故言汝今無聽者不可思也我今無説者不可議也無聽無説即為一義二義由不思議一二之義自在無礙也或分汝我約俗二無聽無説約真名一故言無相第一義無自無他作者真諦也上句標體下句遣執遠離諸相無相無所勝過名第一真智所緣名義不賴自性諦等所作不賴同類因所作不賴單因所作名無自作不賴梵王不賴異熟因等不賴單緣名無他作因緣本自有無自無他作者俗諦也因緣之法無始本有非由自性諦等自所作也言三假者法受名也言於解常自一者獨悲心平等似明鏡無名於諦常自二者同怨親人異如好醜影別通達此無二者一云通達真俗無二二云通達心鏡無二言而皆約事令第八諦獨居事外者問三科法中法界法處亦攝真理四諦法中滅諦亦攝真理二空真如全是真理此如何通答離有其理皆就詮論咸云其事唯第八諦廢詮談旨故居事外言二而不二者結仁王經境二心一未曾各本唯一諦上句結仁王下句結涅槃言一諦為真四言成權矣者一云廢詮談旨諦為一二空真如等為四二云真諦為真苦等四諦為權三云空有相即為一四重二諦為四焉言中道妙旨不唯約事者形破相宗鈔以性滅為滅故得同時者相滅異時二宗同許性滅同時一宗獨立又下鈔第十一上半三十八紙末云若相融為四者攬緣名生生即無性空有無礙虗相安立名之為住住即無住圓融形奪隨緣轉變名之為異異即無異兩相都盡各無自性名之為滅滅即無滅斯則即相而性固無所得言一切法無生我説剎那義者一切法者總目色心等法云無生者萬法緣生無性耶空空即理性故云無生我説剎那義者由法即真是故説云性滅同時釋成上也言以四相俱時而有皆無自立者龍樹引經釋云悟滅相品般若滅相位中而共俱時有滅相品無時共俱時無等問若俱時有者有惑智俱成失如明與暗得俱時耶智有無功失不斷惑故惑有無功失不障智故若俱時無者有惑智不分失豈黑象負而白象亦真耶智有無功失體已無故惑有自無失不假斷故良由惑有二義一相有義能障於智是智所斷智方得有二性空義不障於智非智所斷智亦本空故無前過今取本空表滅同時也言所相法體等者所相事體隨不變隨緣乃空有而自在能相事相隨緣生無性亦生滅而無礙疏不二而二有能所斷者約性是一名為不二就相差有故名為二如一甕水濕性無異同一性也隨寒漂緣半結成氷同妄惑也隨燒煮緣半熱成湯同真智也以湯消冰有能所消同智斷惑分能所斷言二而不二説為內證者惑既即如斷便稱澄疏明斷義以以彰緣境鈔釋如文言照惑無本即是智體者煩惱即菩提如火焚薪還是火言照體無自即是證如者菩提即涅槃也薪盡火滅灰燼也以喻對法昭然可悉鈔云取一時則不能斷三時總取方説能斷等者問約性空義若別若總皆不斷約相有義若別若總皆斷此云何通答時別論互不相資非緣起義以顯性空彰不斷義三時總取更互相資是緣起義以顯相有彰斷除義故此云爾故下大疏第六上半三十一紙內云謂三時無斷方説斷故云非初非中後釋此有二義一約相翻二約相續言相翻者謂無間道正斷惑時為智先起惑滅耶為惑先滅智後生耶為同時耶此三惑智各有兩失故不成斷為智先起智有自成無漏過不能滅惑過煩惱後滅煩惱有自滅過不障聖道過智後同時各具四過如燈不破暗可以喻此又涅槃云毗鉢舍那不破煩惱若爾云何説斷若依唯識第九明二真見道現在前時彼二障種必不成就猶明與暗定不俱生如禪兩頭位升時等諸相違法理必應然是故二性無俱成失者此俱舉法相一邊亦不違餘緣集斷義若望此宗則有所遺謂稱衡是一位昂無妨解惑不爾豈得俱時明暗之喻雖則相傾到與不到俱不破暗同時即相乖異時不相預故若此宗斷結要性相無礙上明非先後俱為顯無性無性緣成則説斷結由能斷無性方為能斷所斷本空方成所斷若定有者則墮於常不可斷故若定無者則墮於斷失聖智故言相續者不約惑智相對但就一智自有三時論依此釋就此三時復有二種一約心究竟通分三時二約無間道中剎那三時經論並通此二論云此智盡漏為所智斷為中為後答云非初智斷亦非中後偈云非初非中後故此上順釋偈文兼定三時唯約智説故言是智斷惑若爾三時無斷云何斷耶論云如燈焰焰非唯初中後前中後取故此舉與釋成謂實教斷惑必性相䨥明經文證顯證智唯據甚深緣性不可説義論主兼明斷義故性相䨥辨非初中後辨因緣無性是斷之不斷前中後取即不壞緣相是不斷之斷故大品云菩薩非初心得菩提亦不離初心後心亦爾而得菩提譬如燃燈非初焰燋炷亦不離初焰後焰亦爾而性實燋故龍樹判云佛以甚深因緣答涅槃二十九亦云衆生五陰雖念滅而有修道如燈雖念念滅而有光明上諸經論皆顯性相無礙無斷之斷又今經論及覆相成謂若定斷者一念便足何假三心既並取方成明知無性無初中後無初中後是無性故方得成於初中後斷此則因緣故無性無初中後無初中後是無性故方得成於初中後斷此則因緣故無性無性故因緣也若云初念即能斷後念方究竟斷者不異毗曇一念有燒始終方盡若云初念獨不能斷積經中後方能斷者不異成實一念不燒相續方然勿失旨一念上能具足一切道品何有不能斷除煩惱又但成於斷惑之義不知斷而不斷不斷煩惱入涅槃義故結殫云莫失宗旨上猶通實教若依圓宗所斷之惑一切迷故一斷一切斷無斷無不斷若具顯諸宗差別如別行章義甚幽微無厭繁文言若以智會如非證如矣者乃揀權小也故永嘉偈曰若以知知寂非是無緣知如手執如意非無如意手若知自知亦無緣知如手作於拳非是不拳手如雖不知寂亦不自知知不可謂無知以性了然故不同於木石如手不執物亦不作於拳不可謂無手以手安然故不同於木石釋辛曰上一即是權小證如中則實教下乃頓宗今據揀權故此云爾疏則有為無為非一非異等者下疏問無取五蘊即有為無漏何以言不為相遷答約教異故前是權小所明若實教定談非為無為同真性故但似蘊相現立以蘊名故涅槃純陀云善覆如來有為之相應言如來同於無為況一一融攝鈔云然雜集第三亦云無取五蘊當言有為言無為答彼不應言有為無為何以故諸業煩惱所不為故不應言有為隨欲不現前故不應言無為所以者何無取諸蘊隨所樂欲若現前若不現前無為不爾以常住故鈔今言不異明即是常者問龍樹論釋本覺常住心念始覺無常住心念何以此云明即是常答始覺具二種義一與本覺非異義即常住也二與本覺非一義即無常也以據前義彼據後義故不相違言義同有為者義同相宗定相有為故言不應宣説如來定是有為定是無為者故下疏第九上半二十四紙內云是知寂然不動未曾無為應迹無方未曾有為豈可隨於見聞以滯殊應之迹疏無佛無不佛等者鈔有兩解一云單重遣拂也二云無佛者寂也無不佛者照也無生者一切法不生也相本盡也無不生者般若生性本現也鈔況心所變者五蘊法也故經云心如工畫師能畫諸世間五陰悉從生無法而不造言離言説相等者離三假相滿三實德建立體真如也離四種言説假相滿畢竟平等實德離一種名字似相滿無有變易實德離九種心緣假相滿不可破壞實德言唯是一心故名真如者結歸能入門也言亦通四法界皆不可説故等者問頓教分齊但彰理法界何故此云四法界也亦違上文云但諸經中一向辨真性處即屬頓教也答有二解一云正辨理法界餘三法界因便言之二云攝四法界咸歸一理故鈔有一法非實相故者仍恐未詳借一喻明如衆波浪事法界也其水澄清理法界也波水相收事理無礙法界也諸波互藉事事無礙法界也無非濕性無非實相歸絶待理是知借圓崇信成頓教義妙之至也言謂以心傳心等者心即本覺一心也心傳者師資相望也故圭峯云然達磨西來唯傳心法故自云我法以心傳心不立文字此心是一切衆生清淨本覺亦名佛性或云靈覺迷起一切煩惱亦不離此心悟起無邊妙用亦不離此心妙用煩惱功過雖殊在悟起迷此心不異欲求佛道唯悟此心故歷代祖宗唯傳此也然若感應相契則雖一燈傳百千燈而燈燈無殊若機教不授則雖一音演法而各隨解故諸宗異説過在後人即其義也言心無心相即安心者古師偈曰實相言思斷真如絶見聞此是安心處異學徒云云又又二祖白達磨曰我心未寧是師與安師曰將心來與汝安曰覓心了不可得師曰我與汝安心竟即思義也言念相都盡者望念之相咸除也或念自無明相目四相也言寂照現前豈不名佛者始自發心乃至成佛唯寂唯照不變不斷但隨他位名義稍殊謂約了悟時名為理智理即寂也知即照也終發心修時名為止觀止即塵緣契於寂也觀照性相冥於照也約任運成行名為定慧因止緣功融定定者寂然不變也因觀照功發是心慧者照無分別也約煩惱都盡功行圓滿成佛之時名為菩提涅槃菩提梵語此翻為覺即是照也涅槃梵語此翻為滅即是寂也當始自發心乃至成佛唯寂唯照也言心有也曠劫而滯凡夫至剎那而登正覺者直説難明應舉喻顯如有大官佛性夢迷也在牢獄二界身本識著枷鎖貪愛種種憂苦一切業報百計求出問法勤修過人喚起善知識教忽然覺悟聞法開心方見自身法身真我元在自家淨名云畢竟空寂舍安樂寂滅為樂富貴體上本有河沙功德與諸朝寮都別異同諸佛性以在眠心之時恆處獄中暫得覺悟之後即居高位法喻相對俱然可知言非了心於了耳者遮癡禪也但不生於常無常之解豈不生於寂滅靜之解耶問所生之解從何而生此門真理唯不變故通釋此難已上上章言還被無生之所纏縛者故古人云無生終不性萬像徒流布若作無生解還被無生顧故即斯言也言唯亡言者可與道合等者即什公悟玄序次前云夫玄道不可以設功得聖智不可以有心智真諦不可以存我會至功不可以營事為今鈔即以下之言此上二對反顯難思鈔文所引即順明難思亡者捨筌蹄也虗懷者離取著也冥心者不己見也遣智者泯能證也道理真聖大同小異然上三即法後一約人道者虗通即前玄道理以簡於事即前玉功所契真簡於俗即前真諦聖簡於凡即前聖智故有心不契遣智方知若有契合復應拂迹故彼次云雖云道合無心於合合者合焉雖云聖同不求於同同者同焉無心於合則無合無散不求於同則無異起非於百非之外非所不能非焉是於萬是之內是所不能是焉非所不能非則無非矣是所不能是則非是矣無異無同故惡親無二無是無非則毀譽常一天然則機於道契今略引二對足令得意言淨名默住等者問默住無言乃證頓教豈相愜當答但令生解即是其教不須言説清涼云語默視瞬皆説也鈔十身十忍十眼十通者十身十眼已見上文十定之名今雖不標名有本品故略顯示言十定者定謂心一境性十是數之圓極以普賢深定妙用無涯寄十以顯無盡故云十定然此十定皆云大者因滿之定性法界故一普光大三昧身心業用包遍為普智照自在名光二妙光大三昧身智遍照名光勝用大映為妙三次第遍往諸國土大三昧十方無餘之剎皆至入定為遍往往無雜亂不礙時節歷然為次第以智用如理本自遍故四清淨深心行大三昧明達諸法本自清淨離於想念契理深心依此起用遍供諸佛請法起行名之為行五知過去莊嚴藏大三昧佛出劫剎等事皆名莊嚴過去門中包此事盡為藏六智光明藏大三昧未來藏中包含諸佛及佛此等名云為藏智慧徹照稱曰光明七了知一切世界佛莊嚴大三昧現在諸佛作用衆會身相益物皆曰莊嚴橫遍十方故曰一切現可曰覩故曰不云藏八知一切衆生差別身大三昧於差別衆生其身內外入定起定皆自在雖通三種世間從多但云衆生前後諸定皆從多説幻相如焰受如夢聲如響行如電色如化總觀一切蘊界處等畢竟空故猶如虗空雖通此別意經文之中總喻一切世間出世間法以皆從緣無自性故如幻等虗而不實雖無有實非無幻化種種之相如一切法雖空不斷不壞假名二而不二喻中道義若依攝論第五八喻皆喻依他起性然並為遣疑所疑不同故所喻亦異一以外人聞依他起相但是虗妄分別有非真實義遂即生疑云若無實義何有所行境界故説如幻謂幻者幻所作緣六處豈有實非二疑云若無實何有心心法轉故説如焰漂動非水似水妄有心轉三疑云若無實何有愛非愛用故説如夢夢中實無男女而有愛非愛用覺時亦爾四疑云若無實何有戲論言説故説如響實無有聲聽者謂有五疑云若無實何有善惡業果故説如影謂如鏡影像故亦非實六疑云若無實何以菩薩作利樂事故説如化謂變化者雖知不實而作化事菩薩亦爾然彼論無空喻而有影喻喻鏡像更有映質光影喻喻種種識無實又有水月喻喻定地境界無實今經以義類同故令在影中經文當知疏第四總相會通者問既賢首五教為是餘師皆非是者即收揀何須委曲和會答良以古今開合或二或三等皆憑教理悉非邪僻但緣各皆黨己為是斥彼非彼此礭定故須和會問既皆非邪僻即各任礭定何須會之答經道歸一精義無二不應兩存經道非邊了義不遍不應單取必會之之令皆妙問以氷雜火勢不俱全將矛刺楯功不雙勝諸宗所執既互相違一是則有一非如何會令皆妙答但存其法俱遣其病即皆妙也謂法就人即難以人就法即易人多隨情斥執即相違誠如氷火相和矛楯相敵故違難也法本稱理互通通則互順自然疑流皆水環釧皆金故亦也舉要而言局之則皆非會之則皆是故立斯門不徒然矣疏一大善巧攝生方便者攝五教而為一教也故賢首義分齊云諸教相收者有二門一以本收末門二以末歸本門初中於圓教內或唯一圓教以餘相皆盡故或具五教以攝方便故頓教中或唯一頓教亦以餘相盡故或具四以攝方便故熟教中或一或三初教中或一或二小乘中或一皆準上知云以末歸本中小乘內或一以據自宗故或四謂於後三教皆有作方便故熟教中或一或三頓教或一或二圓教中唯一皆準上知之是諸教下所明義理交絡分齊此思攝是則諸教本末句結成網大聖善巧長養機緣無不周盡是故此經云張大教網洹生死海潦天人龍置涅槃岸此之謂也疏或唯後一是不共一乘者問終頓二教何所攝耶若一乘攝何異前解前解後三皆一乘故若三乘收中頓二教非三乘故答實通三一今顯別教具三乘攝何以得知故賢首義分齊云二明三乘亦五一小乘中三謂始別終同以俱羅漢故二始教中三始中俱別以有入寂故三終教中三始終俱同並成佛故四頓教中三始終俱離五同教中三始終俱同汝等所行是菩薩道等故故與皇朗法師云若因開而得悟者聖教烏之開若因合而得悟者聖教烏之合如其雨曉總成甘露若也雙迷俱成毒藥開合隨緣事無恆準鈔上來開合遍收者問清涼判教捨合後離何故此云開合遍收也答判雖依開收乃通合故次鈔云若準為一難見淺深非判教也如依賢首五門判教豈不收餘師義也是知判收不同故無過失言行布即始終之教者問始教既屬真實中攝彼方便中大乘是何教也答始教一種兩處收攝若對小乘真實中攝若對一乘方便中攝如分半滿亦兩處攝故言權實雙明者乘不了而法了也言帶權説實者帶共般若説不共般若也言帶實明權者帶實相而説觀照也言相想俱絶宗者破相始教與頓教也鈔此應廣引者故經云譬如日出先照須彌山等諸大高山十大山王以嚴十地故次照黑山喻緣覺者無法空之光故次照高原喻聲聞者不生佛法蓮華故然後普照一切大地此一種通合三聚取決定能生處喻正定聚得緣方正喻不定聚沙鹵等地喻邪定聚然亦不捨故皆等照也曰不作是念我先照此照彼但以山地有高下故照有前後等法合準之疏更有一類不定根等者問與攝末歸本根有何別耶同據從淺至深故答彼約從淺至深決定此約從淺至深不定故也鈔謂緣自得法及本住法者緣自內證真實境界不可顯示一切衆生故此約證道也本末常住無礙法界不由如來新所建立此約本性通二道也言二趣者謂能説所説能想所想能名所名之二相也言如來不説墮文字法者文義相屬謂之為墮佛知名無得物之功物無當名之實也言四悲願所成等者問第四第五同約自利即無利他方有有何別耶答第四佛如明鏡根如物身説如影在佛心故第五佛如天月根如衆水身如如影在根心故細思甚別慎勿相濫言悲願所成即兼因果者悲願因也所成果也向言教證二道名雖常聞義甚幽僻今承文便粗當顯示準下疏辨總百九重一教行相對言聲為教行德為證猶下請中字義義者謂諸地勝妙行字者謂説十地差別相二地前地上相對以地前聞思修慧為教地上行德為證解行已前依教證行名教初地已上離言合實為證三真偽相對即於地中聞思修慧報生識智緣照之解名曰阿含真智出言為證謂不與如合墮世而修名之為偽契如為真地上菩薩生來即有此智故云報生識智悲初證如故屬於教可宣示故真智出言故名為證四修成相對一切地中真偽合修為教捨偽契真為證猶下所明義説二大説大中有證智故云真有加行後得緣世法故云偽名真偽合修義大中唯明證智故云捨偽契真矣五相實相對世間修得彼證相名教契本實相為證相即前捨偽契真有即得故實相則違本離相無所得故六體德相對就彼離相所成行中顯本法性為證依本成德為教猶下煉金金體與釧等謂所成行體為證成德為教故以金喻證顯本性故莊嚴其喻教信等德是修成故七體用相對前體及德皆證依體起教智之用為教下珠放光光喻於教珠體喻證八自分勝身相對自分所成體德及用皆證進受佛教為教下嘆金剛藏二萬妙智及辨名為證力堅念教法為阿含九約詮就實相對真智之體為證約言分十為阿合猶下述録摘文解玄颷才舉無著牽羊智光立無相寧起有見如須彌等智論説法性法界法住法位皆真如異名因乖常理成三界無常六波羅蜜七最勝所攝海八德不可不順己宗判論錯但是三昧性相二宗受變易生死三種意生身衆生不入涅槃我亦不入諸相立新熏頓詮此理故名頓教百法四種勝入同時四相滅表後無水有十義依他無性即是圓成於解常自一等處虗空在喻證空處之迹喻地阿含四相俱時而有照體無自即是證如以智會如非證如矣謂以心傳心心無心相心有也曠劫而滯凡夫亡言者可與道合十身十忍十眼十通一大善巧攝生方便
