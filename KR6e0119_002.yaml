body:
  text: 上京開龍寺圓通悟理大師賜紫沙門鮮演述疏盡宏廓之幽宗者盡字是教餘皆是義宏者大也即是廣義通收五教若巨海遍納於百川廓者空也即是深義別揀九宗同天池獨具於十德或宏者事法界廓者理法界二字相合者事理無礙法界幽宗事事無礙法界或四字相合同詮一真無障礙法界斯則能被之教義也鈔真應權實者智冥一理曰真悲赴萬根曰應或本高而迹下或本下而迹高名權本迹相稱名實言四十二衆者謂同生衆有一菩薩也異生衆有三十九執金剛神乃至大自在天王也座內流出衆眉間流出衆故四十二以配四十二位故言況口光所召者即現相品衆齒面門光召十方衆是故彼經云有十億佛剎微塵數菩薩摩訶薩一一各有世界海微塵數諸菩薩衆前後圍繞而來集會乃至於其座上結跏趺坐言毛光重現等者亦是此品謂即前所召十方世界海諸來菩薩身毛孔中皆有光明一一光明中現無量菩薩此諸菩薩皆於塵中親近三世諸佛以種種法門教化衆生是也又彼經云如是坐已其諸菩薩身毛孔中一一各現十方界海微塵數一切寶色光明一光中悉現十世界海微塵數諸菩薩等鈔本即圓音者揀非在根之教得名為本故下鈔云一音普應但是教本非是其教即其義也言經列二十者一名最勝光遍照狀如摩尼寶形乃至二十名妙寶焰言結有等者經云此一一世界各有十佛剎微塵數廣大世界是也或獨華藏品中經云諸佛子彼一一切世界程或須彌形江河形乃至云諸莊嚴具形如是有世界海微塵數或是世界成就品文彼有十程經云爾時普賢菩薩復告大衆言諸佛子世界海有種種差別形相所謂或圓或方乃至云或如佛形如是等有世界海微塵數言經云佛演一妙音一梵音故周聞十方剎二遍聞一切稱法性故衆音悉具足三此一即多事理融故法雨皆充滿遍四彼一一音雨多法雨一切言詞海五彼法各異一切言詞一切隨類音六各同一切衆生之音一切佛剎中七此音各各遍一切處轉於淨法輪八所説各顯世淨之義一切諸國土悉見佛神變聽佛説法音九普令一切各得見聞聞已趣菩提十各各皆得究竟之益具斯十義方曰圓音出現品中復有十喻次下具引疏主伴重重極十方而齊唱者上句標舉下句釋成此意云主伴重重作何事業故下句云極十方而齊唱也有力自在説法名主無力不自在説法名伴但是説法之中分成主伴非為聽法得名為伴夫主伴者必圓作事主既説法伴必説故何以得知下釋成云極十方而齊唱唱者顯示果主因伴云謂遮那處普光堂東方十佛剎塵數世界外有金色世界文殊而來為伴應問彼云第二會文殊為伴為説經耶為聽經耶若云聽經違下經故下經正明文殊説第二會故若云説經何云聽法名伴由此得知主伴雖殊同説經也重重者鄰次相押數多之義也極者盡也十方者窮法界之處也齊者同時也唱者宣唱也此意云説主説伴重重疊疊盡十方界一時宣暢華嚴經也揀異隨宜之教或有國土説或有國土不説故鈔舉一為主十方為伴乃至云故曰重重者略總釋也此意云諸佛菩薩隨一為主法界諸佛菩薩咸為其伴主唯是一互為其主至尚無數伴即無邊互為其伴伴寧知數既主伴無數重重疊疊遍於法界主既説經伴必隨説那有一方不説華嚴言相猶難明下廣別釋也言此一亦名輔翼者勝劣齊平但得稱伴以劣望勝復名輔翼謂淨土中有十八圓滿今菩薩衆即輔翼圓滿也此非局此界名號品中他方菩薩疏科成六輔翼言不名因主果伴者問曰十玄門中主伴門云隨舉一法為主餘一切法為伴今何不爾答曰據義不同彼約稱性實義此約教相軌義故如臣作主不可君為參佐也若爾準下疏云主伴有三一回向主伴爾修善根互相回向故今成佛邊為主伴二同行主伴同修禪戒等行三如相主伴二俱稱性居然相收釋曰準彼所説毗盧與彼菩薩遞為主伴豈非因果互為主伴耶答曰彼約昔時同修善根互相回向今隨一成佛餘作菩薩而為其伴故云遞為主伴非是因果互為主伴又解此約化儀非因主而果伴彼據稱性故因果而遞互言鄰次相押故曰重重者此界他界附近名鄰次若主若伴互遍名相押言如佛佛既爾佛主菩薩伴亦然者問曰諸佛與遮那互為主伴何云既爾菩薩與遮那既無遞互何云亦然答曰約人即無隨界乃有何者應云此界佛為主餘界佛為伴餘界佛為主此界佛為伴即是果主果伴遞互也此界佛為主餘界菩薩為伴餘界佛為主此界菩薩為伴豈非果主因伴遞互義也言二者遮那一佛為主等者前望多佛互作主伴顯重重義此望一佛一往作主明重重義如前釋處中二義一總將七遞為能遍二別將一遞為能遍也言如長空等者此釋主移伴亦移也如西川內月在其中火星在西一丈許地木星在東一丈許地向東川內星月相望亦同其上非謂月與木星相近與火星遠也問此遞言移上言不赴樹王豈不相違答彼約起而不起此約不移而移文雖有異理歸一途又問為但移人界耶答人界俱移鈔文甚顯學者自觀言如是主佛至東一佛剎塵數界外至正當本金色世界處者此是第十佛剎塵數主佛主界當第一金色世界非謂第十主佛主界但當一佛剎塵數界內第十界已請思請思問曰主佛至彼金色世界本娑婆界為有主佛為復無耶若有主佛應成雜亂財首伴菩薩亦在此界故若無主佛是則説主不遍一切在彼金色處本界處無故答曰此義亦難幸希詳審但以為門不同不應致難何者若約不移義此界有主佛財首伴菩薩無故若約移義此界有財首伴菩薩劫無主佛則無雜亂移與不移復不相礙亦無不遍是則前難一時都遣言如是主佛極於東方者問曰主佛之東為更有世界耶更無世界耶若云更有何得言極極者盡也若云更無是則世界有邊文殊不應從東而來答曰更有世界若爾後難善遣前難如何答從此東方凡有世界處主佛必遍所以言極非謂世界有邊由此文殊亦從東來如盡衆生之願門但是衆生但有佛性無非所化非是衆生有化盡時言終不見文殊師利從西向東來近主佛者此遮常情定相之解恐有疑云主佛在此娑婆金色在東彼界文殊從東向西來近主佛今移主佛極於東方越過金色彼界文殊應從西向東來近主佛所以遮云終不見文殊師利從西向東來近主佛何以故主若移時伴亦移故言亦不見文殊師利從佛前過向西近佛者恐外疑云雖不見文殊從西向東來近主佛應是文殊從佛前過向東却回向西來近主佛故鈔遮云亦不見等以表主移伴亦移故如恐未曉復舉喻明如一法師市中作法東門一僧而來佐法乃從東向西故法師移至東門之外是則東門一僧必從西向東而來佐法如或不然應是東門一僧從師前過向東却向西方而佐其法遮此常情二解故鈔云爾言如人以十錢布地等者問前舉十人為喻今何重舉答彼約遞至主伴此約一往主伴若爾星月之喻已顯一往故答曰星月喻中未彰主佛周遍伴剎故此重明如人以十錢布地標也未是已布於地錢心為主錢緣為伴者指配法合也第一錢當中者對東西上押之錢名中同本界不移之主伴對東西各移之主伴名中則以第二錢押第一錢上近東一緣之地者此意云復用第二錢押第一錢上如何押耶故釋成云漸近東展出一楞之地喻第二重主伴各移近東一界則開元通寶等皆移近東一緣之地者此顯一移一切皆移也如是錢錢重重相押皆漸近東者法合云如是主伴重重相押皆漸近東是知東方界界有主界界有伴無不周遍故若至金色但有十箇主佛者主佛有不遍世界之失何者界有十佛剎微塵數故彼若救云一佛主佛剎塵數世界無不遍失者應第一主佛移近東一佛剎塵數界外第二佛剎微塵數界中何故鈔云向東一界復違鄰次之義也更以十錢近西亦然者合前主移近西也餘説云云恐非正理言如第一會重重遍法界者問普光忉利等處亦説第一會法門不若説何以經中但言菩提場説第一會不言於餘若彼不説何以遍答有多解一約佛德能云遍法界約根見聞云菩提場故下疏云但隨見聞説有初成九會之別二據稱性圓融義云遍法界據不壞相行布義云菩提場三就廣融義於菩提場全攝普光忉利等法界處盡故由此但在菩提場即是遍法界經就能融云菩提場故經云華藏世界所有塵一一塵中見法界一塵尚然況一處耶四就普遍義即菩提場遍普光忉利等法界處也既普光忉利等法界處中皆有菩提場是故但在菩提場説第一會亦無普遍若爾第一會主與餘會主為相見不若許相見應成雜亂若不相見何以知遍答相即互亡不相見相入雙存許相見雖許相見有力無力異亦無雜亂若爾既云無力應不名主答但約相入門之無力非關主伴門之無力也若約主伴皆成有力各對當會伴菩薩故今約相入互成無力主佛自望更相入故又解或彼無力即成其伴同彼相即二種玄門有同體故是故準知九會教主若互相遍分有無力却成主伴故無雜亂餘會餘佛等準此應釋言故有三兩身等者將時處根以顯佛身不全昭著疏雖空空絶迹而義天之星像燦然者肇公云大像隱於無形故不見以見之大音匿於希聲故不聞以聞之斯之謂矣疏湛湛亡言者上句直目無言理本也下句即目言之事末也教海佛音本質教也波瀾根聞影像教也或分教義而有異故又解上言湛者遣言也復云湛者遣無言也恐未兼亡故致亡言以遣能所遣之迹也意全當句即絶也教海者即上亡言理本也波瀾即目言之事末也若爾何云教海耶答言音實相即法輪故第十教體海印炳現故鈔夫大像無形等者語借老子意目一真法界或比類而言以劣況勝也道體淺近尚無形言真法深玄豈有名相希字結上無聲微字結上無形絶朕雙結上二言心絶動搖離相言亡戲論離言故大般若經那伽室利分龍吉祥云我欲入城為有情故巡行乞食妙吉祥云隨如意往然於行時勿得舉足勿得下足勿屈勿申勿起於心勿戲論勿生路想城邑聚落想大小男女想想等所以者何菩提遠離諸所有想無高無下無卷無舒心絶動搖言亡戲論無有數量是也自入真赴證聖何用廣陳言教相義翻欲擾人不順本法名翻引生倒解名擾此難近躡説儀周普遠通四段之中皆有相故言無説無言無示無相或無能説言無所示義或無對初根説無對久根示或無聲説無名句示言無中無有二等者此意於無相理中無內外人法等一切二也言無二亦復無者為遣有二之相假借無二之迹於無相理中何有無二所以云無二亦復無言諸法無二無不二者無二空也無不二空空也言謂若有有可有等者此意云真如理中若有一種有相堪可定相實有則許對彼乃有一種無相堪可定相實無何所以耶有無相待故已上反釋自下順釋今無彼有相堪可實有驗知亦無此無相堪可實無故言若無所得當句即絶者謂空空二字分能所遣迹終不盡今言絶迹性本自空更不待遣方符至理若爾上云空空應無益用有能所遣如鳥履沙故若許無用何須言之今謂通云衆生悟法難便造玄先須由漸故資遣拂如彼真空絶相觀三句九門揀情顯解方云泯絶無寄令契真空法多如是學者準知言謂依晴空等者喻依情空炳現星像法依義天朗現法門疏據影顯云義天之星像燦然言若礙於言等者良以無言有二一者礙二者不礙如次可知言若礙於言身子被呵等者乃淨名中卷舍利弗言天止此室其已乃知答我止此室如耆年解脫舍利弗言天止此久耶天曰耆年解脫亦如何久舍利弗默然不答天曰如何耆年大智而默答解脫者無所言説故吾於是不知所以云天曰言説文字皆解脫相所以者何解脫不內不外不在兩間文字亦不內不外不在兩間是故舍利弗無離文字説解脫也所以者何一切諸法皆解脫相即其義也言不礙於言文殊攸讚者此亦淨名入不二法門品意謂先三十二菩薩各説入不二法門以言顯理猶滯於言次文殊云如我意者於一切法無言無説無示無識離諸問答是為不二法門上三十二皆有言也後維摩詰默然無言顯不二理此則無言也是故文殊讚淨名曰善哉善哉乃至無有文字語言是為真入不二法門故云不礙於言文殊攸讚斯之謂也問曰淨名默住以顯絶言頓理何云不礙言耶答曰但絶生滅虗妄言説不礙真門如義言説問曰如義言説為理為事若云事者違自真門事相本盡故若云理者復違此假理本不礙事末故今謂通云文雖用彼義乃稍別是則用淨名之文成華嚴之義妙之至也言況文字性離即言亡言者上句標下句釋即言釋上文字亡言釋上性離或此意云況文字真性俱離彼即言亡言之兩迹也言流八音者或體業具為後屬依呼八轉之聲也或最好易了調和柔耎不誤不女尊慧深遠之八音也言至趣無言無相理本也非遠不礙言相事來也心行得之滯迹心行取之也則甚深叵窮邊際也上句縱下句奪也言像有言有相事末也非近不礙無言無相理本也靈懷體之無漏真智證之也而目擊爛然可觀也上句縱下句奪也肇公云道遠乎哉觸事而真聖遠乎體之則神即其義也上云言像者出周易故易云言者所以明象得象而忘言象者所以存意得意而忘象是故存言者非得象者也存象者非得意者也象生於意而存象焉則所存者乃非其象也言生於象而存言焉則所存者乃非其言也然則亡象者乃得意者也亡言者乃得象者也今借此語用也言絶之理無言而非絶不礙言也繁興之籍言也而非興不礙無言也言融常心言無所遣矣者表即妄同真也下疏云即凡心而見佛心融常心也下經云能令三界所有聲聞者皆是如來音融常言也不有此語恐謂唯佛心言與理無礙也疏若乃千門潛注等若乃二字引句之詞千門潛注與衆典為洪源等者此經所詮無障礙法界具無邊異義但以前之四根未堪具受故我世尊隨彼根宜於無障礙法界中分四諦等義以為小乘等教隨彼偏根所執偏義是無就彼法體所斷通義是有仍屬此經無障礙法界故此云爾問曰本末之義云何曲三種一云小乘云末大乘云本故法華經云除先修習學小乘者又云我此九部法小乘法也隨順衆生説入大乘為本是也二云三乘為末一乘為本故法華云於佛一乘分別説三是也三云前四偏教云末第五圓教為本故鈔云華嚴為諸教之本源矣又下鈔云前四因中即有至果皆無等是也前之二本餘教容有後之一本獨我華嚴鈔如海潛等者此借出現品喻義證教也言九流等者正理云漢藝文志云一儒流述唐虞之故宗仲尼之道二道流陳堯舜揖讓之德明南面為政之衛三陰陽流順天曆象敬授民時四法流明賞敕法助來制也五名流正名列位言順事成六墨流清庿淨祀養老惠施七縱橫流受命使手專對權事八雜流和大國體事無不貫九農流勸勵耕桑備陳食貨出釋氏六帖言第五經等者隋譯經也秦譯當第六言始見我身者即指圓根菩薩初始於菩提樹下見我十身無礙毗盧佛身言聞我所説者即前圓根菩薩聞我毗盧所説華嚴經即皆信受者無一圓根不信受也若爾何以鹿苑轉四諦輪也故經云除先修習學小乘者此意但除却先來修習學小乘人不堪聞此根本法輪外所有圓根衆生盡皆信受是知將根準教既有小根必有小教故鈔云所説也我今靈山會上亦令前來小乘之人得聞是法華經悟入根本華嚴佛慧也所謂初入佛慧既是華嚴復入佛慧理有何疑初成之説非法華故疏智周鑒而常靜者故肇公云夫聖人虗心冥照理無不該懷六合於胸中靈鑒有餘鏡萬有於方寸其神常虗即斯義也鈔昔人云等者所遮異釋也昔人將四不義所顯一理為體大以微細帝網二玄為相大以神通自在相即廣狹十世隱顯等玄門為用大問曰何以偏將二種玄門為相大自餘玄門為用大耶答曰二種玄門約本具義自餘玄門約新現義故此云爾理實互通問此師既許事事無礙寧不許事理無礙也答許事理無礙何為所遮異釋也今謂通云非彼不許但文中不説為所遮故鈔顯德相等者問曰此言德相為相大與十所因中德相之門同異云何答有二解一云此即是彼如將十玄就本具義屬德相門即是相大就應根義屬業用門即屬用大故前鈔云二約事事無礙十玄之相本自具足即是別教之意彼言本自具足即德相門也又云此言德相非德相門勿謂名同不分義異如佛證窮為德相門豈佛證窮唯證相大耶由此知非復舉一喻以顯深旨如世一劒先在匣中本具體相用三同德相文中本具三大也對賊便用如臨根業用門體相用三亦無所闕三大無闕更宜思審言即能證能觀者止為能證觀去為能觀平或地上止觀為能證地前止觀為能觀或果中止觀為能證因中若觀皆通事理也故下疏云定慧雖多不出二種一事二理制之一處無事不辦事定門也能觀心性契理不動理定門也明達法相事觀也善了無生理觀也諸經論中或單説事定或但明理定二觀亦然或敵體事理止觀相對或以事觀對於理定如起信云止一切相乃至心不可得為止而觀因緣生滅為觀或以理觀對於事定下經云一心不動入諸禪了境無生名般若是也或俱通二如下云禪定持心常一緣智慧了境同三昧是也或二俱泯非定非散或即觀之定但名為定如觀心性名上定是也或即定之觀但名為觀如以無分別智觀名般若是也或説雙運謂即寂之照是也配釋此文學者可知問曰上明止觀從境彰名云事云理若論止觀自體事理何收一云或止為理觀為事或觀為理止為事何以止觀不雙取事理耶答文違大段事理無礙故或止觀皆是始覺為體故下鈔云皆生止觀科約三大云事理無礙言權實無礙等者謂達事止觀名權照理止觀名實此亦約當句明無礙也言若別對三大等者此則將第四句能觀止觀之心對上三句所觀體用之境如對初句云冥真體理也體也境也生第四句常靜止心也萬化之域事也用也境也生第四句周鑒觀心也對第二句顯德相事也用也境也生第四句周鑒觀心也重玄之門理也體也境也生第四句常靜止心也對第三句用繁興事也用也境也生第四句周鑒觀心也以恆如理也體也境也生第四句常靜止心也故鈔云各具體用皆生止觀今言觀者乃是緣事之觀止者即是緣理之止全同起信云云言若作三觀釋等者能觀之心分成三觀所觀之境開為三諦對空觀開真諦屬體大對假觀開俗諦屬用大對中觀開義諦屬相大問曰三諦之中義諦為二諦之所依三大之中體大為二大之所依義理相順何故體大為真諦空觀所緣相大為義諦中觀所緣耶今謂通云此言三諦非取義諦但取真俗及中道諦但體大唯理法界作真諦生空觀用大多事法界作俗諦生假觀相大通四法界作中道諦生中道觀三大通所依方是第一義諦一心本法也或云三大是用義諦是體二大與體別論屬真俗二諦相大與體大合論屬第一義諦更希刊定問其中道諦為俗事耶為真理耶答幻有中道即事真空中道即理俱融中道雙通事理問行相云何答有五重故問何者是耶一幻有中道二真空中道三真空成幻有中道四幻有成真空中道五俱融中道貴令易曉列圖顯示言三止三觀融為一心等者問一心之中分止觀諦九法歷然行相云何答如依一鏡鑒現好醜中三影影喻三諦其理昭然現好影之明如空觀現好影之淨如體真止現醜影之明如假觀現醜影之淨如隨緣止現中影之明如中道觀現中影之淨如離邊止三影三明三淨約義條別究體唯是一鏡將喻對法學者詳悉疏真妄交徹即凡心而見佛心者上句標寬下句釋狹鈔真謂理也唯性非相佛也唯淨非染通性通相涅槃也唯淨非染通性通相妄謂惑也唯染非淨通性通相生也唯染非淨通性通相生死也唯染非淨通性通相言真該妄末者真理即事門也言妄徹真源者事法即理門也言謂無有不濕之波等者上句妄徹真也下句真徹妄也言如來不斷性惡者小教有二義一佛前十五界是有漏起他惡法故生無比之貪引央掘之嗔二云示現愛語羅睺叱呵調達故始教示二義一云真如昔日與惡而為實性今至果位惡法雖斷惡性常存故二云示現同前小教終教亦有二義一云昔日真如隨緣以作説法今至果位無明既斷惡相雖無隨緣真性仍存故如依靜水隨風成波風停波息成波三性恆存故如龍樹論獨力隨相非所斷故二云惡具二義一不壞相異真義當緣生相有也二稱性即真義當無性體空義今據後義故云不斷頓教云惡相本盡更不待斷惡性本現非所斷故圓教云稱性之惡如鏡中火現而常虗非所斷故雖通五教正取能同終教事理無礙故下鈔云如來不惡性者善惡同以心性為性若斷性惡則斷心性性不可斷亦猶闡提不斷性善又龍樹云如斬眠士夫豈悟士夫不傷等若爾何故涅槃經説如來無不善佛性答曰彼據以理從事即無此據攝事從理不斷又彼約現在為名此據過去立號故彼此文不相違背言又佛心中有衆生等者如和尚鏡中弟子是也言今約不壞相者一約不壞行布相行布門中衆生可具其佛如礦具金如璞具玉佛不可具其衆生如熟金而非礦如淨玉而非璞二約不壞行布教相聞凡即佛於凡有益引生趣求佛即是凡令人妄解引生倒解由此但云即凡心而見佛心言不離一心故者十所因中唯心所現故出起信論言妄攬真成無別妄故者依理成事門出起信論勝鬘經言真隨妄顯無別真故者事能顯理門真妄名異無二體故真理即事門事法即理門真外有妄理不遍故返釋理遍於事門妄外有真事無依故返釋事遍於理門然或説妄空真有唯識論涅槃經或説妄有真空三論二諦義俱空隨俗説二諦通華嚴經也俱有唯識華嚴雙非觸物皆中遮義也兩是真妄通二諦或觸物皆中表義也言淨分同真無漏依他同圓成性染分為妄有漏依他言淨分之事妄未盡故者無漏依他緣生幻有故金剛經云凡所有相皆是虗妄又下鈔云謂如真如現依他時設有淨分亦名為染如鏡現像不簡淨穢皆非鏡體故唯能現得名為淨所現皆染即其義也言淨分圓成皆有者淨分即依他摩訶般若也圓成即解脫法身也言若隨俗説二諦則真妄俱空者三諦中料揀也或三諦意或終圓義妄法無性故空真法無相故空或真妄相待方有真妄名生如彼長短故名俱空或依手巾體幻作兔兒相體如真相如妄若隨愚夫説作兔兒體相俱空若隨俗説二諦則真妄俱空言若約真妄通二諦則真妄俱通空有者一云在俗諦真妄俱有幻有實有故在真諦真妄俱空性空相空故二云在俗諦真妄俱空即前隨俗説二諦則真妄俱空在真諦真妄俱有故下鈔云真妄皆真則本末一味居然交徹言約宗以明唯識等宗不得交徹者問三論涅槃皆説交徹何云不得答一云內等不等涅槃及與三論何以得知等字在上宗字在下故一云亦等於彼彼論彼經雖説交徹非正所宗今我華嚴正以無障礙法界為宗故鈔云爾言情有即是理無者問理無之義遍圓二性為屬何性若屬圓成何云遍計有二義一者情有二者理無若屬遍計何云情有即理無妄徹真耶答義有兩途若與情有非一義屬圓成性若與情有非異義屬遍計性今約初義故鈔云真又解屬遍計性遍計性中通真妄故不同始教唯是妄故依他之中無性之義準此應釋言此經云有淨説生死等者上半假立謂待前流轉生死立涅槃煩惱名諍觸動善品損害自他故名為諍此有漏法諍隨增故名為有諍有彼諍故生死者有漏為體無彼煩惱故稱涅槃下半雙非謂生死涅槃俱因煩惱假立其名何有真實又二互相待故俱空二互相奪故皆寂上二句俱有交徹二二句俱空交徹或望能奪義俱有交徹望所奪義俱空交徹也言故影公云等者即是中論序也此一段文準下鈔釋而有四對言以真諦故無有俗諦故無無者此是初對定有無所在我約真諦上説空是無性空不同無物空也我就俗諦明有此是緣有非空性之有也二真故無有則雖無而有俗故無無則雖有而無一對彰有無體相是不壞有之無不礙無之有故成中道三雖有而無則不纍於有雖無而有則不滯於無一對彰有無之德若是定性之有此有則唯是有不得即無若是定性之無此無即唯是無不得即有今二互相即故不遍滯鈔云乃至者具足應云不滯於無則斷滅見息不存於有則常著永消俱不俱等何由而有諸邊都寂故云皆離此彰有無離過滯空則斷纍有則常既不滯不纍故無斷常又釋初對雙離有無故云無有無無此成空觀第二對不壞有無故云雖有而無雖無而有此成假觀第三對明二諦相即故不偏滯於有無故不為有邊所動無邊所寂成中道觀肇公亦云涉有未始迷虗故常處有而不染此不纍於有也不厭有而觀虗故恆觀虗而不證此不滯於無也第四離過準前又釋初對中初對是真空義下句是妙有義第二對亦有亦無義第三對非有非無義第四對離過則成具德四句也又初對雙離二過一離有二離無第二對離非有非無第三對離亦有亦無第四對總明離過故起信云真如非有相非無相非非有相非非無相非有無俱相即其義也言真妄皆真等者問妄法皈真其義可爾云何真法亦皈真耶答上言真妄法體也下言皆真真諦也又上言真對妄之真下言真絶妄之真又上約分相門收妄之真故疏事理雙修依本智而求佛智者上標下釋也依本覺理智釋理修也求始覺事智釋事修也鈔亦由惑者執禪則依智性乃至云並為偏執者義當四病也故大方廣圓覺經説衆生修行當離四病一者作病但作有為事行未識真如本心尚不得生佛家豈得冥合圓覺故説為病義當執法者也二者任病生死既空何勞除斷涅槃本寂何假欣修一切放縱身心更不念其罪福泯絶無寄故成其病差乎近代多落此科誦禪歌毀於法筵虗尋名相説理性非於塔寺狂認福田妄立宗途誤惑含識斷除佛種良足悲哉凡佛真子當須屏遠殊不知藍墉適補比丘壽增寺礎將移天人目動況復觸事陟理絶空色觀空不廢衆緣真宴坐矣如維摩經菩薩行品佛告衆香世界諸菩薩等菩薩行者於遠離不以為貴不著己樂廢於彼樂在諸禪定如地獄想等斯則菩薩於禪實有所證佛尚誡令不著況未有所入得妄著耶且沙門斂念誠為通規其誰不然妄自矜衒兼投藥失所所損非細故智度論九十六説彌勒菩薩知須菩提樂説空義故教誡云不應新學菩薩前説何以故若有少福德善根者聞畢竟空法即便著空遂作是念若一切法空無所有者我為作何福德則應失前業等如是經論如來勸令離病彌勒誡物談空但有信心不可警慎三止病真心絶念動念即乖若止妄念不生真性自然顯現斯由不知妄念即真貪嗔本道而於妄外求真何異除波覓水故成其病四者滅病道由惑覆惑盡道彰故欲斷惑求真令得身心永寂夫菩薩用心利他為本今欲避𮘵取寂誠非大士況乎不釋動以求靜不怖惑而度生真覺士也今欲離障求寂尚雜二乘狹見豈能冥通圓覺故説為病此之三病義當執禪者也如是四行互聞即成非齊運則無過若能常作常止常任常滅易脫相資無非有益亦猶四大造色遞發有損併力成功今此事理雙修依本智而求佛智並除前病所謂執禪則多落止任滅之三病執法則唯墮作之一病故此雙行為真修矣又下疏云然今法學之者多棄內而外求習禪之者好亡緣而內照並為偏執俱滯兩邊又云勉旃求悟不得徒自勞形此遮執法者也努力修行不得撥無因果此遮執禪者也言無所求中吾故求之者暗引方等經乞士之語上句釋依本智下句釋求佛智也故方等經中説佛為雷音説於昔因緣已又云過去有佛名栴檀華彼佛去世甚久我於彼時如汝無異彼有菩薩名曰上首作一乞士入城乞食時有比丘名曰恆伽謂乞士曰汝從何來答曰我從真實中來又問何謂真實答曰寂滅相故名為真實又問寂滅相中有所求無所求耶答無所求又問無所求者何用求耶答無所求中吾故求之等乃至云恆伽聞已賣身供養下疏釋云性相雙鑒終日求而無所求也疏理隨事變等者一云一者理也多者事也或一與多皆目事也疏故得十身歷然而相作者歷然行布不壞相也相作圓融壞相也終日不壞而壞壞而不壞名不思議非謂體廢相存也若謂能即體廢相存者體據即義廢不即義存即與不即二互無礙存泯莫拘是不思議相約即義尚存不即極存但一向存應非無礙是可思議學者更審鈔一同時具足相應門等者然此十門具於五對一總別對初門是總餘九為別二法喻對第七是喻餘九為法三假實對第九是假餘九為實四全分對三四是全六八為分五增微對廣顯主增狹隱伴微不唯五對無礙實乃舉一全收言能以衆生身作自身等者問此言衆生為取我等妄染衆生耶為衆示現變衆生耶答一云但取變化衆生若取我等妄染衆生應無所化俱作能化十身故又違此鈔云則於此身現如是形復違下鈔衆生身等攝皈三身中化身故二云但取我等妄染衆生何知論三分中是染分故三世間中衆生世間故若爾前難何通答常作能化不礙為所化故就能悟門取衆生身作自菩薩身為能化就迷門取衆生不作菩薩身為所化言則於此身現如是形者約同體變化也下皈化身者豈不見下鈔云萬化云云皆是法身大用又經云心佛與衆生是三無差別又果門攝法無遺三云上二雙取引證同前向明十身皆是佛身恐滯常情略伸區別問既俱佛身唯應第七如來身攝何分餘九若就行布而有餘九應非皆是佛身所攝耶答圓融不礙行布故佛為能融皆是佛身不壞本相故存餘九二門雙取故説十身皆是佛身若以餘九隨一為門具十亦然今就佛門是故云爾問前之七身作菩薩身行相可知具色相故後之三身既非色相云何作於菩薩身耶下疏答云入法智中自然應現自己身故令於虗空忽見自身故名為作作餘亦爾又問餘之七身可作能化具色相故後之三身既非色相云何化生而作能應耶答曰苟能得法契神何必要因色相是故彼三即為能應佛身良以根性心樂類非一故鈔言歷然者不壞相故者歷然即是不亂不亂鈔指即是行布驗知不壞相行布義非圓融中體廢相存也言如初發心時便成正覺不壞初心之者初心即妙覺成佛義如常即而不即初心義存二義雙取説得初心成佛出梵行品文良以初心即無其體全攬妙覺體成故如世指環別無其體全攬金成故説指環當體即金環相仍存故言十信攝於諸位諸位十信歷然者十信攝於諸位圓融也諸位十信歷然行布也出賢首品文問約圓融義十信攝於諸位為於信位實成佛耶為實未成佛耶若實成佛住行向等便徒虗設若實未成佛信該果海有言無義有云圓融門中已成佛行布門中未成佛若爾後位但應行布修斷圓融門中已成佛故若謂雖已成佛不礙復有修斷者妙覺位後應更修斷若更修斷前佛應勝後佛應劣修斷多少不同故今謂通云六位互攝如六面鏡互現其影信攝餘五位如第一鏡影現五鏡影信位有障信攝諸位一切皆障是知一障一切障第一鏡上塵垢昏坌彼鏡中影一切不現是知一昏一切皆昏如在信位修斷其障能攝之障既斷所攝之障一切皆除是則一斷一切皆斷如磨第一鏡塵垢皆除不唯能之鏡昏除鏡中之影昏障亦無即是一磨一切皆磨一現一切皆現約信位中諸位惑障皆斷豈不名佛約第一鏡塵垢皆除豈非明淨約住位中諸位惑障全未斷故豈得名佛約第二鏡中諸鏡塵垢全不磨故豈名明淨是知位位圓修圓斷譬如鏡鏡全磨全淨以喻對法朗在目前疏廣大即入於無間等者疏中影略應云無外廣大身剎即入於無間塵毛無間塵毛包納於無外身剎問塵毛具二義不壞相故狹稱性故廣可爾無外身剎不壞相故廣豈稱性故狹名無礙也答亦不壞相故狹稱性故廣故經云空生大覺中如海一漚發空尚如漚何況身剎又云十因各隨義顯今取法無定性故大能小也或亦稱性故小性非定大故何以得知全在一塵而包容故鈔雖有即入意取廣狹揀濫釋成也問廣狹無礙別立玄門凡聖無礙應別立也染淨依正等皆應別立此若不爾彼廣狹門應即入收不應別立答許別立但示方偶且作是説皆皆無量疏炳然齊現等者上句法下句喻問隔瓶見物豈不違肉眼九緣生義闕空緣耶瓶具質礙故答良由瓶淨得見彼物若爾如對明鏡何不見障外之色耶答鏡但表淨裏不淨故琉璃表裏皆瑩淨故如水澄清見魚鱉故鈔一能含多皆曰相容者下鈔又云法法皆爾故云相容也微細之義下釋有三一能含微細一塵一毛故二所含微細不壞相故三難知微細小能含大常情不測故如對一釋迦像想彼像中含盡十方三世遍法界虗空界無盡三寶禮彼一像即是遍禮無盡三寶也供彼一像念彼一像等準前應知如焚一爐香想彼香中含一切香華燈幢傘蓋飲食湯藥果木音樂螺鈸宮殿池沼等一切諸供養具遍供如前一像中無盡三寶隨獻餘供含物亦然曰修此行有何罪而不滅有何福而不生良以法雖本爾心不相應難獲巨利幸願群英勉強而行自餘玄門倣此而修滯相而修百千萬劫未及一眴之功深思深思相入門中當想自身遍入十方諸佛會裏佛菩薩四衆八部身中彼若説法我亦説法彼若聞法我亦聞法彼若斷障我亦斷障彼若證真我亦證真彼若發菩提心我亦發菩提心彼若化生我亦化生彼若拔苦與樂我亦拔苦與樂盡彼諸行善事我亦行之復想六道衆生皆在自身之內自若禮誦彼一切衆生悉皆禮誦等自餘妙行準此應知疏隱顯俱成等者如觀一釋迦像於中乃有無盡佛菩薩等身像也但彼多像隱一像顯也鈔而明下有晦等者上明異處下辨同處文理昭然言如東方入正定為一半等者此意一菩薩全在東方入定而不妨同時全在西方出定是謂難思問何故入定為明出定為晦耶答在定觀根審法名明出定涉有化生名晦是故在定復得顯加出定但感冥加明晦之義昭然可悉或約但見入定不見出定故鈔影復現影重重無盡者此是其喻法合云何如一塵稱性以作能含一切剎土俱為所含之剎皆攬塵成塵復稱性復含其剎是知能含塵塵不盡所含剎剎無窮是此門也問第一塵稱性含剎盡耶舍剎不盡耶若含剎不盡是則彼塵不稱其性若云稱性而含剎不盡彼不含剎應在性外若許含盡彼第一塵所含之剎但作第二重能含更有何剎為第二重所含耶若遞互合與微細相入二門何異若云第一塵稱性含剎皆盡彼所含剎亦乃稱性作能含時復更出生所含之剎者問所出生剎為本為新若本具者應第一重塵却有含剎不盡之失若新生者德相門中應無帝網此義極難深宜用心今謂通云如瑩一圓鏡在東瑩一方鏡在西兩鏡互入同相入門一性而入似微細門今帝網門則不如是如東圓鏡現西方鏡影全盡無不盡之失其方鏡常入而不入還在本位其西方鏡內却現東圓鏡影并圓鏡內方鏡之影全盡亦無不盡之失其西方鏡并所現影已有三重其東圓鏡常入而不入現在本位復作能現現西方鏡并彼二影亦無不盡其東圓鏡并彼三影已有四重其西方鏡常入而不入還在本位復作能現現東圓鏡并彼三影無不盡失其西方鏡并彼四影已有五重後後作法準此應知由重重無不盡之失及相濫之過故鈔云亦如兩鏡互照重重涉入傳耀相寫遞出無窮即其義也故下大鈔十七上半二十紙云又重重現故者雙釋普入及方網言塵能受剎剎以塵成亦能受剎重重皆入名為普入既交絡入九方入東東入西時帶餘九入西入南時帶東諸方而入於南故成重重即初地中如帝網差別故為真實義故鈔以三世相因互相攝故者緣起相由故時無別體依法假立如依昨日日輪立過去世依今日日輪立現在世依來日日輪立未來世昨日日輪離今日來日二輪之外別無日輪全攬今日來日二輪作昨日日輪上立過去世彼日輪體既攬今日來日二輪所成果不異因即是今日日輪應立現在世復即來日日輪更立未來世餘二因二果準此應知方成九世如攬塵成剎歸本是塵如攬念成世歸本名念一念本時攝九世末時本末雙舉故云十世問一念即無量劫應是相即門也答雖有即義意取十世如前廣狹門故言故莊生一夢身為蝴蝶者莊子第二齊物篇云昔者莊周夢為蝴蝶挧挧然自喻適志不知周也方其夢為蝴蝶而不知周則與死不殊異也而所在無不適志則當生而係生有必能當死而戀死矣由此觀之知失在生而哀死者誤也俄然覺則蘧蘧然周也不知周之夢為蝴蝶歟蝴蝶之夢為周歟周與蝴蝶則必有分矣此謂物化意云昨日之夢於今化矣生死之變豈異於此又自周而言蝴蝶稱覺未必非夢此亦可以喻萬法如夢矣鈔以隨一事即是無盡法界者問與相即門何別答但是相即門四句中一即多之一句義也同微細門是相入門中一攝多之一義也或不同相即彼行布門一與多異圓融門中廢一同多今記事門行布門中體是一法圓融門中便是多法非是廢一同多故不同也如託一人便顯六親非廢一人方即六親況生其解尤異相即鈔然有二意故賢首改為廣狹等者今代至相反難賢首云若真理為廣事相為狹則是事理無礙知無間塵毛名狹無外身剎為廣此二門異亦不成事事無礙若無外身剎與無間塵毛無礙即事事無礙義成而復狹中存廣即相入門狹中不存廣即相即門賢首若云雖有即入意取廣狹者至相亦云雖有即入意取純雜彼此異因不可得故有云二師理齊清涼雙取但以賢首廣狹通一切法至相純雜但論其行故鈔云今以至相但約行為小異或廣狹中有無礙言故異至相若爾純雜中有具德語何殊賢首今云通云至相所立純雜各異致招多難賢首所立廣狹是一都無前妨如將一塵稱性故廣不壞相故狹豈有相濫若爾同體廣狹可然異體云何答初既不濫後有何疑何以得知下釋十玄次第云廣狹躡前事理無礙為後八門之所以也又下清涼會取純雜云契理為純不壞相雜是故得知如無異意賢首所難還成自害幸希詳當鈔不信不解不順不入者如次配教理行果四法也言以不能生如來家者進不至十地見性等家退不生三賢解悟家是知依權教修者尚不至三賢豈臻十地若爾何故下文云別教十地證竟但是圓家住爾答彼宗自談云證十地竟圓宗斷彼義當住爾如寡聞比丘自謂無學小教斷彼實是凡夫又如愚法二乘謂證涅槃始教斷彼但是擇滅回心已後更經多劫方至十信等也疏扗視聽於嘉會者問文殊巡行經云五百聲聞聞而不信法華不輕亦令其聞何得此中不令其聞耶答為顯不共故故智論明般若有共不共指此不思議經不共二乘説故又大聖化儀其類不等或聞而不信以為遠種如上所引或以威力令其出會如法華中五千拂席或令在會使其不聞即如今經法華漸教之終將收敗種故加令其去篤勵在會使其信受此經頓教之始為顯深勝留使不聞令諸後學修見聞種然嘉會之言即周易乾卦文言矣彼釋乾元亨利貞四德云元者善之長也亨者嘉之會也利者義之和也貞者事之幹也君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事君子行此四德故曰乾元亨利貞今但借其嘉會之言爾鈔悉覺真諦等者下疏曰然此聲聞皆是菩薩欲顯深法託為聲聞故所歎德言含本迹言悉覺真諦迹云現觀了四諦本云覺第一義諦皆證實際迹云入正性離生本云能入無際際故深入法性迹云所學已窮本云窮二空源永出有海迹云生分已盡本云能入不染依佛功德迹云逮得己利本云依十力等離結使縛迹云現行已離本云不斷不折住無礙處迹云種子亡故本云二無礙故其寂靜猶如虗空迹云心善解脫本云處亂恆寂於諸佛處永斷疑惑迹云慧善解脫本云未證無礙於佛智海深信趣入迹云皆可回心本云種智信入言皆悉不見神者神力十力等嚴好常光莊嚴等境界悲智所緣等遊戲不壞本相等神變重閣同空等尊勝一切不能制妙行悲智云切用等威德謂命等十種自在住持謂勝住持令有所作淨剎謂於娑婆見華藏等入身遍剎塵智入諸法至即新來衆詣即此往彼疏見聞為種八難超十地之階者此意但説八難見聞華嚴熏金剛種非謂八難現身聖證是故地獄轉報生天方登十地故鈔云皆容見聞為種之義未見明文説八難身得入見道若許入見何得名難復違論説極欣非上二極威非三塗唯欲界人天佛出世現觀若云但障權教見道名為難者劣道尚障何況勝道別教十地證竟但是圓家住爾八難未至別教三賢豈許得證圓教初地又準天台止觀乘急戒緩許三塗身而得聖道更宜思審鈔其有生疑不信者永不得聞如是義者問地獄天子由昔聞經熏成堅種不信毀謗墮阿鼻獄彼雖不信亦得聞經熏成堅種何故今文云其有生疑不信者永不得聞如是義答一云不信毀謗墮阿鼻獄長劫不聞故經云永非謂畢竟不聞二云但遮其不聞言永不聞三云不信雖聞猶如不聞問地獄天子昔聞經時不信誹謗不善心中云何得熏成佛堅種若種堅種是成佛因如何反墮阿鼻地獄又不善心得熏堅種應善心中却熏惡種若許爾者三乘聖人還墮惡趣是則因果雜亂深違教理有云其不善心但熏惡趣招地獄報其華嚴經熏成堅種作成佛因良以在纏本覺為本性住種性經聲入耳熏彼本覺用增勝故名習所成種性本新相合共為堅種故法華云佛種從緣起是故説一乘若爾他經聲為緣無自善心為因既闕因力如何熏種答本覺為因故若爾聞他殺盜等聲自生悲心應熏惡種亦有惡聲為緣本覺為因故不可本覺唯與善種為因頗有惡種不攬理成今謂通云聞經之心具二種義一者神解義二者暗鈍義由神解義解得華嚴語義內心為因經聲為緣因緣和合熏成堅種由暗鈍義誹謗華嚴語義內心為因經聲為緣因緣和合熏成地獄種一念心中齊熏二種實不思議如謗不輕云我等何用如是虗妄授記由解彼言記自成佛熏金剛種由不信故熏地獄種故梵網云但解法師悟盡受得戒彼受戒時亦熏堅種儻若不解得熏堅種者無一衆生無堅種故準諸法顯義體無有一法非華嚴故豈有衆生不見聞耶若皆有種何故鈔云由昔無因外曰文中但云見聞為種何須要解今復通云若不解時不名見聞如舍利弗等在逝多園所見世尊即是無盡身雲佛所見祇園即華藏界所聞言教即是華嚴但未了解不名見聞又云見毗盧佛身眼得清淨現今所見一切境界無非毗盧十身何故一切衆生眼得未清淨耶由此得知未能解得並是佛身不名為現如人見金解作其鐵外人問曰汝見金耶彼人答曰我不見金但見其鐵應知不解不名見聞應知見聞必作其解由解心故順本覺性由順本覺熏成堅種於理甚妙更希刊削鈔中有一光名清淨功德者故下疏第八下半六十九云第二舉因對顯者為顯勝故此有數重一似相德深廣言不能備故置之説好二好德復多以三十二相既有八十隨好十蓮華藏之相好彌多矣且舉其一三一中置勝但説劣者故明足下四足下一好復有多光但説一光亦不可説故寄因顯因光成益三重頓圓況果一光如是展轉況於諸相況復總説如來諸德果海絶言亦斯義矣言了知如是悉是虗妄乃至清淨善根者下疏八下半七十二釋云後了知下能滅謂了惑本虗居然不生故晉經云此諸煩惱皆悉除滅除滅故清淨惑亡智顯即自在光明善根成就言香幢雲者即九地善根也言若有衆生見其蓋者至一恆河沙善根者疏釋云準晉經云種一恆河沙轉輪聖王所植善根所謂白淨寶網輪王等是則多箇輪王非一輪王之多善也梵本亦然而言清淨金網者準瓔珞上卷金輪在十回向初地已上皆是琉璃輪而增寶數為別是知舊譯為寶網者勝金網也故彼經云歡喜地百寶瓔珞七寶相輪為四天王一萬子以為眷屬百法身百佛國土中化十方天下已後略無化之分齊寶數一一增至七地十三寶相輪八地但云大應寶相輪九地云白雲寶相輪十地百萬神通寶光瓔珞無畏珠寶相輪若順晉經白淨之言則是九地即前香幢雲自在光明若然彼但是所等則金網無失若取十地為清淨金網正當十地以無畏珠為清淨義又攝化分齊與上第十地攝報果同則證十地明矣故下此王放光遇者亦登十地言一恆沙者謂從九地已還乃至住十銅輪以此十地所化分齊比前諸位此齊如恆沙矣故晉經云寶網輪王等等取前也鈔上二皆明證速者指疏中二則超十地之階與圓曠劫之果指鈔中二則善財童子及威光太子言又此經宗三生圓滿者非謂隨生圓滿備經三生方得圓滿或一生身經歷三生如是聞經已依解起行隨行證入或多生身但在一生如是聞經已雖熏堅種無真解行圓因既闕妙果曷成縱經多劫只是一生三生之義各在何位準賢首説長流凡夫見聞成種名見聞生四十心位十地聖人真解真行名解行生妙覺如來因圓果滿名證入生準清涼義但取十地為證入生餘同賢首言即上二句者見聞為種并解行在躬言即下二句者超十地之階與圓曠劫之果鈔本悲為身定所依身悲所熏故即悲為身定依體故大悲為門益生唯悲令物入故入定用悲為能入故大悲為首凡所益物悲先導故智定之中悲增勝故以大悲法而為方便入定益物悲為方便即智即定悲無愛見又此四亦是從佛向機之漸次矣充遍虗空一廣周故二無緣故言入師子頻申三昧舊經云奮迅者即頻申之義俱是展舒四體通暢之狀總相釋者即用之體寂而造極則差別萬殊無非法界即體之用不為而普周故小大相參緣起無盡名曰頻申自在之義又準涅槃真師子王自知身力牙爪鋒鋩乃至晨朝出穴頻申欠呿四向顧望發聲震動為十一事何等為十一一者謂欲壞實非師子詐作師子故二為欲試自身力故三為欲令住處淨故四為諸子知處所故五為羣輩無怖心故六為眠者得覺悟故七為一切放逸諸獸不放逸故八為諸獸來附近故九為調大香象故十為教告諸子息故十一為欲莊嚴自眷屬故一切禽獸聞師子吼水陸之屬潛沒深淵陸行之類藏伏孔穴飛者墮落大香象王怖走失糞清涼以法義合彼師子謂以同體大悲為身以增上大悲為首以即智大悲為眼純以智慧為牙爪大悲方便為振尾悲為方便居然末故方動振動義故總取四悲為足依此立故以法界三昧窟所入證故以無緣大悲為窟門入出由此故以體用無礙為頻申舒展自在故以演法界法門為哮吼決定宣説一切衆生本與如來同法界故如此師子隨一一毛皆稱法界次言為十一事而頻申者一摧破魔軍詐師子故二示衆神力十力等力為身力故三淨法界土佛住處故四為邪見凡夫知歸處故五安撫生死怖群黨故六覺悟無明眠衆生故七為惡法獸捨放逸故八令諸菩薩及邪見諸獸來依附故九為諸外道及二乘香象令如盲聾捨放逸故十教諸菩薩子息令頓證故十一莊嚴正見四部眷屬俱增威勢不怖一切邪黨一切邪黨皆怖畏故又野干隨逐師子百年不能作師子吼二乘安處法會如盲如聾故言廣説以十能入等者經云彼諸菩薩以種種解種種道種種門種種入種種理趣種種隨順種種智慧種種助道種種方便種種三昧入如來等十不可説佛剎微塵數佛神返海方便門疏象王回旋六千道成於言下者文殊回觀法器故如象王回身首俱轉無輕舉故即六千比丘會表六根清涼可入法界故問此言成道為當何位答唯居十信何以知耶故下大疏成彼化事中通有三會一比丘會顯回小入大故二諸來人會通收諸權入一實故三善財會顯純一乘根一生成辦故又前二會表居信未久尚不定善財信終可入證故斯之謂矣又綱要云爾時尊者舍利弗下成彼化事通有三會第一六千比丘會顯回小入大故第二從第六十二經初至復有無數衆生於三乘中各得調伏即諸乘人會表總收故第三從爾時福城人聞文殊師利童子下攝善財會上三皆是十信以信未入位故有三類此下善財純一乘根入位之後唯是一人故盡經終唯明善財文甚分明幸勿餘惑鈔觀文殊十德者下疏云一身相勝二常光勝三放光勝四衆會勝五行路勝表常依八正故六住處勝舉足下足無非道場隨心轉故七莊嚴勝常觀空有二邊心地之下具如來藏恆沙性德無二心亡照任運寂知而顯現故八樹林勝樹立萬行嚴法體故九自在勝於我無我得不二解自在主中為最勝故十上攝勝此有二意一約事心常上攝諸佛法故二約表諸佛顯揚皆依般若究竟至於一切智故言令發十種無疲厭心者所謂積集一切善根心無疲厭一見一切佛承事供養二求一切佛法三行一切波羅蜜四成就一切菩薩三昧五次第入一切三世六普嚴淨十方佛剎七教化調伏一切衆生八於一切剎一切劫中成就菩薩行九為成就一切衆生修行一切佛剎微塵數波羅蜜成就如來一力如是次第為成就一切衆生成就如來一切力十後九皆有無疲厭心四字法門無盡衆生無邊取相而修多生疲厭厭則退墮二乘若無愛見而修則無疲厭雖無疲則佛果非遠況我身耶言則得三昧名無礙眼等者下疏釋云略有三義一能見離障故二所見無擁故三一具多用故雖具此能而無見相故名三昧言得此三昧至而為莊嚴正明眼用也言及亦聞彼至悉皆解了者天耳用也亦能觀察至諸根心欲者他心用也言亦能憶念至十種辨才者宿住用也言又即成就至一切佛法者通顯多門上一定之用既爾多門無盡例然此顯圓教攝根創立大心乃得十地之後十通之用以始攝終故如初發心功德品等辨疏啓明東廟者即啓菩提智明也此菩提心為當何位善財童子為聖為凡古有多釋一云地上菩薩一云地前賢人一云通二地前地上二位中收此上諸釋皆非正義故賢首云應是善趣信行中人依圓教宗有其三位一見聞位即是善財次前生身見聞如是普賢法故成解脫分善根如前嘆德中辨二是解行位頓修如此五位行法如善財童子此生所成至普賢位是三證入生即因位窮終沒同果海善財來生是也若爾定是何位謂以在信是信位在住是住位一身歷五位隨在即彼收以通一切故如普賢位此之一解甚順經宗疏主自云謂歷位而修得見普賢一時頓具地獄天子尚三重頓圓何以善財尅定時分等此意行則漸修位即頓證是今義矣鈔至福城東者其城居人多有福德故曰德城城表防非東為群方之首亦啓明之初表順福分善入道初故又表福智入位本故住莊嚴幢娑羅林者此云高遠以林木森聳故表當趣萬行莊嚴故大塔廟者即歸宗之所日照三藏云此城在南天竺城東大塔廟是古佛之塔佛在世時已有此塔三藏親到其所其塔極高大東面鼓樂供養西面不聞於今現在此處居人多唱善財歌詞此城內人並有解脫分善根堪為道器此表所依法界本覺真性諸佛同依故云往昔諸佛曾所止住等言五百優婆塞等者表五位證入故言別觀善財者解心順理曰善積德無盡曰財知其不群特回聖眷言又令憶念過去善根者令憶宿善使不自輕故言隨文殊師利而説偈言等者同餐妙旨獨頴衆流重法隨師説偈求度故彼偈云三有為城墎憍慢為垣墻諸趣為門戶愛水為池塹願輪大悲轂信軸堅固轄功德寶莊校令我載此乘言一百一十由旬者為表十地及等覺地一一皆具諸地功德或不分等覺即開十信進退皆表一百一十也始信該於極果故曰遙申隨順行成故曰右手言若離信根至之所憶念者九句經文前七闕因一闕行本故二求小故心劣處生死而憂悔三橫不具四竪不進五滯一善六不廣求七不起無住行願後二闕緣後不能了下有十五句前五約所知理事後十約能知分齊例前諸文思之疏寄位南求者寄位即是寄修行相也寄者託也依附之義位者次也階降之義斯則行布圓融寄漸顯頓寄人顯法寄相顯性也下疏云且依古德配為五相謂四十一人名寄位修行相寄四十一位依人求解顯修行故二從摩耶下九會十一人明會緣入實相即會前住等成普別兩行契證法界故初得幻智後得幻住該於中間如幻之緣入一實故三慈氏一人名攝德成因相會前二門之德並為證入之因故故法門名三世不忘念則攝法無邊四後文殊名智照無二相謂行圓究竟朗悟在懷照前行等唯一圓智更無前後明昧等殊故五普賢一人名顯因廣大相始覺同本圓覺現前稱周法界無不包含故其後四相亦得稱為寄位前三義同等覺故摩耶慈氏並入重玄之門文殊表菩薩地盡心無初相普賢義同妙覺才見普賢便等佛故今從別義且為五相此五亦是菩薩五種行相一高行歷位上升二大行同入一實三勝行具上廣大成補處因四深行般若絶相五廣行一一性稱然南者古有多義初一約事謂舉一例諸一方善友已自無量況於餘方餘四約表二者明義表捨暗向智故南方之明萬物相見聖人南面蓋取於此三中義離邪僻東西二邊契中正之實道故四生義南主其陽發生萬物表善財增長行故北主其陰顯示滅義故世尊涅槃金棺北首五隨順義背左向右即隨順義以西域風俗城邑薗宅皆悉東向故自東之南順日月轉顯於善財隨順教理故此五義中初一則通次一後二地前表契中道義地後表之亦通地前正證離相地中不以南表地後顯於業用不同地中後文殊有示無方表於般若加行有修正證無二故普賢無方無示表法界普周故有人唯取隨順一義非前諸釋謂正明之義出此方故寧知西域南非明等況通方之説言旨多含故通五義矣鈔時善財童子至教化衆生等者自見己身等普賢化也言不於此剎沒彼剎現者以沒現相如法性故此彼相即故言與普賢等者等因圓也與諸佛等者等果滿也一身充滿至悉皆同等者別顯等相若依通相義當等覺離言不可説故疏盡衆生之願門者問衆生當有成佛盡時不設爾何失二俱有過若云有盡而生界便滅佛界便增又違十地經云若衆生界盡我願乃盡而衆生不可盡故我此大願善根無有窮盡又如來利他功德亦有盡時是知最後衆生定不成佛從初發心都無所化入聖衆生利他行闕因行不圓豈得成佛若云不盡盡衆生之大願但當虗發又違涅槃經凡是有心定當作佛盡法界內頗有一生無佛性耶既是有性遲速縱異寧有一生不成佛耶勿謂新新續起衆生是則衆生有始故仁王經云三界外有別衆生始起者是外道大有經説勿謂成佛已後再作衆生良以金無重礦佛無再生無明既盡無重生理故龍樹名為無始有終住地由此得知進退非理今謂通云如世一人得長生術飛行自在踊在虗空如有一人已成佛道應問彼人之西虗空多耶彼人之東虗空多耶答不可論其多少何以故虗空無邊故應問此佛之前成佛者多耶此佛之後未成佛者多耶答不可論其多少何以故生佛無邊故此人用神通力往東而行一彈指頃越過百千萬里虗空此佛運慈悲力一念化了百千萬類衆生皆成佛道是則此人不老不死亦不暫住如是而行盡未來際頗有東方一界虗空此人不過越耶是則此佛不遷不滅亦不暫住如是而化盡未來際頗有一衆生此佛不化令成佛耶應知東方界虗空彼人皆可越在西方應知衆生一一皆可化度令成佛道雖盡未來如是而行豈行盡東方虗空耶雖盡未來如是而化豈化盡衆生耶何以故虗空無邊故何以故衆生無邊故勿謂東方新生虗空勿謂已越西方虗空還來東方勿謂衆生新生勿謂已成佛道還作衆生縱行無量劫終不可説彼人之西虗空多彼人之東虗空少縱化無量劫終不可説已成佛者多未成佛者少是故諸難一時頓盡更請研尋尤增義味鈔明時難遇者十地論云是中時者無八難故如偈説如王懷憂惱病恚著諸欲嶮處無侍衛讒無忠臣如是八難時智臣不應語心王亦如是非時不應説釋曰論但有偈更無解釋今當釋之前一偈半是喻但半偈合王喻衆生於所説法取捨自在故一如人煩惱言不入心衆生憂惱法不入心二病苦喻衆生有苦法不入心三恚四欲可知五嶮處喻八難處六無善法為侍七近惡友讒八無善友忠臣此八皆為説法之難今時反此故云難遇言今值聖明天子者即唐德宗皇帝也言敷陳五教者或五經之教或五帝之教或小始等五教也言學肆者肆陳也今時習學之處謂之學肆周孔云司市常以陳肆辨物學中列列書史如市陳列貨物也又要覽云因後漢張楷字公超學徒隨之所居為市故今學處而稱肆焉言諸佛祖師者出佛名經言大聖雖周法界者真身寬遍也攝機長在此山者應身局處也應感普周若百川影落應身寬遍也清涼長在猶素月澄空真身局處也意顯真應局無礙故言況大孚靈鷲標乎聖等之名等者案感通傳云今五臺山東南三十里現有大孚靈鷲寺兩堂舊迹猶存南有花園可二頃許四時發彩人莫究之或云是漢明所立又云魏文所作互説不同如何會答俱是二帝所作周穆王時已有佛法此山靈異文殊所居周穆王於中造寺供養及阿育王亦依置塔漢明之初摩騰天眼亦見有塔請帝立寺山形似於靈鷲故號為大孚靈鷲寺大孚者弘信也帝信佛理立寺勸人花園今在寺前後之君王或改為大花薗寺至則天大聖皇后與于闐三藏譯華嚴經見菩薩住清涼山因改為大華嚴寺焉言不入餘人之手者出現品經云不入餘衆生手唯除不思議乘菩薩也言積行菩薩等者亦出現品如前鈔引言手舞何階者手舞之餘不能階及也手舞之言出毛詩序彼云情動於中而形於言言之不足故嗟嘆之嗟嘆不足故歌詠之歌詠不足不知手之舞之足之蹈之也鈔即總別一對者華字唯能嚴大方廣佛唯所嚴嚴字通能所故言無説者性無言故離説者應言方會故言一以萬行飾其本體至非瑩不明者嚴飾法也修顯本果也依本智之理修也二以萬行至琢玉成像者嚴成人也修生新果也而求佛智之事修也言又飾本體如鑄金成像者此喻金即是像以表飾法即是成人修顯即是修生因與果一故言以行成人如巧匠成像者下鈔云新佛舊成曾無二體以報就法如出摸之像像本舊成故無二體言新成舊佛法報似分者以法就報如以金成像金像似分以有未成像金故今成像竟似分二矣前對是非異此對是非一非一即非異故言似分意無二體此喻像即是金似表成人即是飾法修生即是修顯緣為果異故或前據法頓成後約人漸成也言唯經舉四義者謂法也貫也攝也常也故上生疏云生資教攝永絶煩籠理籍文貫長離散滅百靈長軌千葉良規利物詮真目為經也録摘文解盡宏廓之幽宗真應權實四十二衆主伴重重等如長空等空空絶迹湛湛亡言大象無形九流智周鑒而常靜昔人以四不義所顯體大五重中道圖三止三觀融為一心如來不斷性惡情有即是理無四病無所求中吾故求之故得十身歷然相作能以衆生身作自身約同體變化十信攝諸位廣大即入於無間一能含多皆曰相容影復現影重重無盡以三世相因互相攝故莊周夢為胡蝶隨一事即是無盡法界不信不解不順不入杜視聽於嘉會悉覺真諦見聞為種其有生疑不信者永不得聞如是義三生圓滿大悲為身象王回旋十無疲厭心啓明東廟寄位南求盡衆生之願門大聖雖周法界聖舉四義寫本記云高麗國大興王寺壽昌二年丙子歲奉宣雕造大宋國崇吳古寺宣和五年癸卯歲釋安仁傳寫淳熙歲次己酉釋科點重看祖燈眼疲也莫罪莫罪
