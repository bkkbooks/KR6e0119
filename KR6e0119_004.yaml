body:
  text: 上京開龍寺圓通悟理大師賜紫沙門鮮演述疏夫真身等者謂離妄別倒名真依止積聚稱身此屬自報及法二身相合為體言寥廓者謂遠色遠聲亡境亡心超言超思無為無相也言與法界合其體者謂能與自受用報體所與理法界也能所冥合共為真身之體言包羅無外者顯應用普周也含容無外曰包廣容也該博無外曰羅普遍也言與萬化齊其用者能與十重他報三類化身所與萬類事法也言齊其用者約融三世間及混四法界皆為佛身是故萬類幻化即是佛身應用今據人法有異故假言齊實無能所差別故鈔即以如智共為真身者攝賢首義賢首大師自受用身無彼色聲功德但有大定智悲如智冥合共為體故言既智合如則令色相佛身功德無不合如者攝刊定義刊定記主自受用身具有色聲以佛身有十蓮華藏塵數相故無漏蘊界遍帝網剎窮未來際故涅槃云滅無常色獲常色故清涼雙用故鈔云爾鈔混萬化即真者約法也混融萬化即一真無障礙法界也言會精粗一致者約人也會同報化之精粗歸一法界無盡之身雲也言三江者尚書注韋招云謂吳松江錢塘江浦陽江也然三江之源出自崑崙積石之山也今云岷山即指此也鈔同共一法身雲者於中有五一身一所證法界諸佛無別故二心一八識心王俱不可知故三智慧一四智三智二智一智皆無別故四十力一今承文便粗陳十力辨釋有二一釋名出體二列數解義且釋名出體者釋名復二一者通名二者別名言通名者能摧怨敵自能勝他不可屈伏他須劣己故此十種通名為力別名如下二出體者就其強勝慧為體性若據相應四蘊為體通論眷屬定道共戒無漏色等助為體故若依此經融一切法以為其性二列數解義者數有其十問如來唯一諸法實相智力何以列十答從緣境用故成十種若爾由時品類相續分別有無量力豈但十種答度人因緣以此十力足辦其事故不增多一處非處智力因果相當名之為處因果不相當名之為非處二過未現在業報智力三世衆生自作自受故三根勝劣智力謂等五根有軟中上故四種種解智力染淨解欲所好不同故五種種界智力內具五乘貪瞋癡等種性不同故六一切至處道智力有無漏因行至於果故七禪定解脫三昧智力示同三昧現神變故八宿住隨念智力明記過去本生事故九天眼智力觀緣未來死此生彼故十漏盡智力自他解脫無疑惑故上依大疏揀略以明欲知其源更應撿問五無畏一故智度論云一總持無畏於法記持不懼忘失二智根無畏知根受法不懼差失三決疑無畏隨問能答不懼不堪四答難無畏有難皆通不懼疑滯是也言詳而辨之乃至所謂真法身也者攝他報并化歸自報真佛也通指無漏五蘊二報三化之身為體言若直指功德實相至非色像之謂也者亦兼萬行功德及無為法法報化三身為體也言一約十地所得十身等者隨地各得一身故一離諸邪曲見性故二清淨戒故三離嗔恚故四常勤故五見諸諦故六觀因緣理非覺觀所知故七具足方便故八離一切戲論無煩惱故九身相不可量遍一切故十成就一切種智故如次釋上十種身也問今論佛身十地因身豈相關預答以因徹果故凡心尚即佛心因身豈非佛身或以分同圓故如海十德德德皆海故十地十身十身皆佛故或據三世間十身中菩薩身故鈔有世界名娑婆其佛即毗盧遮那故知相融也者約處辨佛即是化身約名辨佛乃是真身明知真應相融也言身不分異亦非一故者一多無礙也故下疏云其猶並安千器數步而千月不同一不礙多也一道澄江萬里而一月孤映多不礙一也情隔則法身成異心通而玄旨必指云云自他於佛何預鈔以一身全現故非一非多也者言一身非多也全現非一也此言全現者處處現故言故下光明覺品疏中明有同時同處見異時異處見等者彼疏云一或多機異處各感見一二或同處各見三或異時別見四或同時異見五或同時異處見六或同處異時見七或異時異處見八或同時同處見九或一人於同異交互時處見多人所見十或一人於同異俱時處見一切人所見以見普眼機故然佛不分身無思普現也菩薩尚不能思況人天能見耶者問下鈔明見佛通局敘此宗云不論凡聖通見十身又云非唯見丈六化質亦徹見法界身雲今此不見豈不相違答此約盡窮佛德云不見彼約分覩佛身云見又云此約偏根云不見彼約圓根云見又此約以事就理云不見彼約以理從事云見又此拂迹云不見彼約寄迹云見又此約自利功德證道境界云不見彼約利他業用教道境界云見或此約下不測上非自分境云不見彼約上加於下承佛神力云見更希刊削鈔明前十身各有十相者良以十身文雖頻列義亦常聞恐昧體相略伸區別一衆生身謂有漏五蘊為體三界業惑五趣之報為相二國土身即以微塵真如法界為體乃以小中大染淨廣狹倒正普入一重平漫方網重重無盡以為之相三業報身謂業及煩惱以為其體謂自相各各守其體性共相固有苦空等故假名差別以為其體四聲聞身謂以向果聖人為體五緣覺身謂以麟角部行為體六菩薩身謂發心以去等覺已還賢聖為體此上三身同業報身但以自共之相假名差別以之為相此上四身相皆同者但有自相共相差別假名分別實無我人餘亦假名偏語此四者業因尚假苦果可知聖人尚假況於凡類又三乘聖人方能知假佛德超絶不得云假也七如來身即以究竟覺智真如法性以為其體其相復以十身為相一菩提身覺樹道成故二願身願生兜率酬本願故三化身應根化現佛相好等揀異猿猴鹿馬等化故云爾也四力持身遺形舍利塑畫等類皆此身攝諸佛神力住持在世故名力持此上四身於三身中皆化身攝五相好莊嚴身具十蓮華藏無邊相好故揀異三十二相等於三身中實報身攝六威勢身所有光明攝伏衆生故遠公云善軟衆生慈光攝取剛強衆生威光伏取故云攝伏即通報化身也七意生身由得自在解脫應彼地前地上若凡若聖同異類等無量之身隨意俱生故名意生此通變化及他受用身八福德身所有不共二乘之福能作廣大利益因故是故衆生種少善根當得佛果也九法身唯取如來性淨圓明無漏身界所證法體界是藏義生義含無邊德生世出世諸樂事故故名法身三身之中亦法身攝十智身謂以圓明無漏妙平等四智以為身也此通四身智冥於理同法性身大圓鏡智相應淨識能頓現於自受用身平等性智現他受用身成所作智起變化身妙觀察智亦通四身通觀四故是則智身通於四也八知身謂以三乘聖人能證之智以為其體有十一一善思量相通於聞思二慧二如實決擇相即是修慧上二俱通理教約體分別也三果行所攝相即因果分別行即是因通於三慧果唯證入離前三慧也四世出世間差別相此下俱約位分別此相為總謂世間俗智名之為世三乘聖智名為出世又見道前名世見道已去名為出世五三乘差別相小乘即法類四諦他心世俗及盡無生等智中乘即七十七智等大乘權實無量六共相七不共相於大乘中粗妙分別甚深般若不共二乘相似般若是則名共八出離相九非出世相通就三乘縛解分別於新熏種習未習故十學相十一無學相通於三乘修習究竟分別前行果中中乘雖約學無學意在行果小乘學中亦有果故大乘位位容有果故由此得知不同彼也九法身其體即以三乘所證之法為體其相有五一平等相即是理法一法身生佛無二故二不壞相即是行法謂稱理起行故三隨時隨俗假名差別相即是義法隨所化根相應時分説差別故理本無言假言顯理權實皆是假名四衆生非衆生法差別相即熏顯理法所遍之境此通染淨平等法身遍情非情故五佛法聖僧法差別相即是乘法唯約於淨三乘同證第一義故隨智有異三種不同故所顯理亦説淺深十虗空身其體多以事空義兼於理其相謂一無量故芥子中空亦無分量故二周遍故遍至一切色非色處故三無形故不可見也世人見者但見空中光明之色想心於中知無實物作虗空解便謂見空其實不見又此含無為空故亦不可見也四無異故謂無障礙不同色法彼此相異有障礙故五無邊故謂無始終起盡之邊故六現色身故謂虗空寬廣能現一切諸色像等故上之所明附教採摝義既勝妙不可闕略唯希達者勿謂詞技言成正覺佛菩提身願佛願身業報佛相好身住持佛力持身涅槃佛化身法界佛法身心佛威勢三昧佛福德身本性佛智身隨意佛意生身言所謂安住世間成正覺佛無著見者無著自屬正覺非謂菩薩於彼不著若菩薩於此不著下九豈當著耶是知皆就所見明見亦不得半就所見半就能見言無著者安住世間故不著涅槃成正覺故不著生死乘無住道示成正覺故名無著稱此而見是見正覺他皆依此願佛出生見乘願出生見故又乘此願能生一切德故業報佛深信見萬行之因深信為首住持佛隨順見隨順衆生住持舍利等故涅槃佛深入見深入涅槃故能持滅深入法界佛普至見法身充滿於法界故心佛安住見湛然安住真唯識性是佛心故三昧佛無量無依見寂然無依故三昧觸類皆寂故無量本性佛明了見平等性智了本性故本覺真性性本了故隨樂佛普受見隨自他意無身不受故依上十見則見真佛鈔如摩尼天鼓等者摩尼雨寶天鼓出聲疏四依起無礙者所依能起海印定也能依所起寂用故問上言寂用已有其定今言海印豈非重併答有云前依寂起用此依照起用此義不爾若但依照且非是定今謂通云前寂用無礙依別未定而興用今依起無礙依本總定而興用別定對總咸作能依又解云前雖云定意顯無心今方論定故鈔云謂雖寂用無心不妨皆依海印之力故鈔隨其所樂悉令見者謂色無定色若金剛之合朱紫形無定形猶光顯之住修短相無定相似明鏡之對妍故隨樂皆見也鈔若分與圓異分既有多應有多箇法界合成一身者問假令多箇法界合成一身復有何過答問軍林等是假非實又性應非一故問若分與圓一寧雜分圓答圓融行布二義不同圓融則分圓常一行布即分圓常異如有分限事與無分限理更相遍也若爾行布門中應有多箇法界合成一身其過何免答全圓融之行布故無前失鈔不染不變體空而染隨緣相有染而隨緣相有不染不變體空言若轉以喻顯等者前舉真心隨緣喻世不見形復舉海水成波喻以況深旨故鈔云轉以喻顯鈔非情即佛體故者下疏釋真如一百億至九十六云無有少法而能壞亂令其少分非覺性者如遍非情則有少分非是覺悟況經云佛性除於瓦石論云在非情數中名為法性在有情數中名為佛性明知非情非有覺性故應釋云以性從緣則情非情異為性亦殊如涅槃等泯緣從性則非覺不覺本絶百非亡四句若性互融則無非覺悟起信云以色性即智性故名智身以智性即色性故説名法身遍一切處論云菩提菩提斷俱名為菩提説智及智處俱名為般若亦可證此既二性相即緣復即性故無少分非覺悟者況心為總相又融攝重重者哉言若以佛身上十身菩提願化力持意生即三身中化身攝也相好威勢福德義通報化法身即法身智身義通三身局唯法報故者問何故下疏云菩提威勢福德皆名報身意生相好願化皆化身法身智身力持皆法身又彼鈔云菩提為總亦是化身餘九中願化力持此唯化身意生威勢通他受用及與變化福智相好通於二報及變化身法局法性下鈔又云又顯十身五體五用謂威勢福德智法相好此五法體餘五為用體即是真用即是應真應二身融為一味此彼相戾其故何耶答良以此宗圓融無礙隨攝無拘故前後門隨應配攝疏以此身雲遍前時處常説華嚴者問既彼佛身含四法界故鈔釋云未有一法非佛身也何有所遍時處也答佛門取之一切皆佛時處取之皆是時處全此全彼無障無礙疏約攝報説者納果名攝酬因名報謂十地菩薩各有四種果一調柔果二發趣果三攝報果四願智果初地菩薩攝報作閻浮王乃至十地菩薩作第四禪王既第十地菩薩為彼天王明知説色究竟天成佛是約攝報果説鈔起信論云又是菩薩功德成等者此一段文人多異解今引心地觀經以為注解貴令後學不生疑惑言又是菩薩功德成滿於色究竟處示一切世間最高大身心地觀經云三僧祇劫所修萬行利益安樂諸衆生已十地滿心運身直往色究竟天出過三界淨名國土坐無數量大寶蓮華而不可説海會菩薩前後圍繞以無垢繒繫於頂上供養恭敬尊重讚嘆如是名為後報利益已上經文全無加減即是鈔引地論云二者後報利益摩醯首羅智處生故謂以一念相應慧無明頓盡名一切種智心地觀經云爾時菩薩入金剛定斷除一切微細所知障證得阿耨多羅三藐三菩提如是妙果名現利益也已上經文亦無加減即是鈔引地論云一者現報利益受佛位故自然而有不思議業能現十方利益衆生者利他業用他報化身也上所引文相宗自報實成終教他報示成仍寄示成以顯實成故今雙會言何故他受用報身在此天者等者問此他受用為菩薩現耶為如來現耶若菩薩現何故心地觀經云一切如來為化十地諸菩薩衆現於十重他受用身不言菩薩現耶若如來現何故鈔云然第十地寄當此天即於彼身示成菩提故在彼天答一云唯如來現隱自報實佛故説天王菩薩示成菩提如對小乘隱一心真見道便説世第一無間引生苦法智忍也二云菩薩現既許地前十信尚得現於化身何不許十地得現報身耶又十地既得平等性智豈不能現化報身耶言餘義如別説者起信鈔釋在彼天者而有五義一云以二乘人報化身八相為真佛不信別有聖人又信第四禪是聖人生處今欲令二乘知八相非真故於彼天示成佛也二由三災不及故三緣欲界色質粗重是有無色界都無色質是無表離有無契於中道故四以摩醯首羅面有三目表證三德大涅槃故五下界慧多定少上界四空定多慧少為表定慧平等故又依彼疏重解前文又是菩薩功德成滿者一因位窮也故地論云一者現報利益受佛位故於色究竟處示一切世間最高大身者二果位彰也故地論云二者後報利益摩醯首羅智處生故也何故他受用報身在此天者一義云以寄十王顯此十地然第十地菩薩寄當此天即於彼身示成菩提故在彼天餘義如別説謂以一念相應慧者謂一念始覺至心源時契於本覺無明頓盡名一切種智無明盡故顯照諸佛亦可一念等皆無間道名一切種智是解脫道即顯上真心於此成也上皆自利行滿下利他德顯便云自然而有不思議業能現十方利益衆生者顯上方便心明不待功用也又亦可初智淨相後不思議業相皆是本覺隨染所成也鈔十事功德者經云一者根深難可頓拔二者自身生決定想三者不觀福田及非福田四者修淨佛土五者滅除有餘六者斷除業緣七者修清淨身八者了知諸緣九者離諸怨敵十者斷除二邊鈔引涅槃經高貴德王難與此經問明品文殊賢首二士難答文意頗同故彼疏文結成前難云謂若諸佛於因行法有具不具可有剎等不同今皆同具剎等那別答中意云非唯因同果德亦同而見異者隨機感耳非佛自位而有差別何者諸佛因果具同異故謂同滿行海是同因也將此同因隨所調伏種種回向應根之果是異因也由此異因感差別果由上同因同感真應身土等果是則約佛即同能隨異約根同處而見異以生就佛雖異而常同以佛就生雖同而見異以佛望佛能異之必同其猶錦窠常同常異瑜伽三十八諸佛平等唯除四法一壽量二名號三族姓四身相意明隨機故除此四事餘皆等也就果同中自性身土一向體同自受用者平等無二相似名同餘二身土亦相似名同而隨機見異故成唯識云自性身土一切如來同所證故體無差別自受用身及所依土雖一切佛各變不同而皆無邊不相障礙餘二身土隨諸如來所化有情有共不共所化共者同處同時諸佛各變為身為土形狀相似不相障礙展轉相雜為增上緣令所化生自識變現謂於一土有一佛身為現神通説法饒益於不共者唯一佛變諸有情類屬佛異故疏若不融前義亦失經宗者此意若不融前權佛權外立實亦失華嚴無礙之宗問前之四教為有佛耶為無佛耶若云有佛何故下鈔云前四因中即有至果皆無大鈔又云別教十地證竟但是圓家住爾出現品説權教菩薩終不生如來家故豈有佛耶若云無佛何故疏云若不融前義亦失經宗權教無佛不融何過今謂通云若依前四教實行衆生當不成佛如前引教是知無佛若依圓教修行已得成佛為應權根示作權佛此佛是有若不融此故失經宗疏明將有説必須靜鑒前理者周易繫辭云尺蠖之屈以求伸也龍蛇之蟄以存身也精義入神以到用也注云精義物理之微者也入神寂然不動感而遂通者也故能乘天下之微會通其用也斯之謂也鈔含前四意者靜鑒二字具前第一第二故或以言略應云明將有説必須靜鑒前理受諸佛加含前四意鈔入毗盧遮那藏身三昧者毗盧遮那能觀大智如來藏身所觀深理以果揀因毗盧遮那之如來藏身三昧定也從境彰名或即體為名言菩薩者揀果也言無量者十住各攝多聞善巧言方便者任性能智觀解善巧言入者謂心詣於法言善思惟者巧順理事揀無礙無心成事言智光者智即是體光有三義一正智前相二斷惑真用三了境俗用真俗二用無礙明照理事法界言智慧光明者照事名智照理名慧此二無礙能破見惑及與無明言剎那者時之極也言際者時相都寂也言佛華嚴者萬行被敷嚴法身故言頻伸者縮展之義也即用之體寂而造極曰頻即體之用不為而普周曰伸通言入或云住者五識對境意從門出遠境護根意識却入此通權小今此經宗即照之寂名入即寂之照名出入已未起名住言二不入者末入位故者問明等三其義可爾名號等三其理如何説佛三業豈未入位耶故下鈔云信求入位許不入定説佛三業何不入定以果從因因即十信十信不入果亦不入是十信中所説果故言説世間法尚須入定者世界成就品普賢入定是也鈔眉間放光者通表一乘中正之道者下疏釋云表離二邊故於體不許有無二邊於義不著常無常等諸法相邊於行不習苦樂二邊於道不住邪正二邊於人不執因果二邊於教不説世出世二邊於諦不見真俗二邊於化不定權實二邊是故為衆放眉間光鈔譬如暗中寶者喻法顯略喻中五事一暗二寶三無燈四有眼五不可見喻闕有眼一事法中五事一障染二心寶三無人説四有智慧五莫能了法闕障染一事學者應知鈔言有情者即含前佛菩薩等者問佛菩薩是情佛非有情若是有情發弘願云有情無邊誓願度豈是佛所度耶若非有情何故鈔云言有情者即含前佛等答言有情者通有三義一情者愛也二情者識也三情者性也若約初義佛非有情若約後二義佛是有情六十二種有情中佛是一數或據示現佛為有情亦通初義愛語羅睺故鈔五類法界皆有説義者問第四既泯法界既是人法雙亡絶言絶相何有説義答但因人法雙泯之義引生了解便名為説非要興言故綱要云説者則諼於萬類觸物皆有表彰是也或泯不礙存故有説義問準此所談能説之人通世間與前依主復有何別彼亦融三世間故答統體咸同就義有異彼據以佛為門此據本位而説故無相濫疏七依聽者然準外典而有三種文子云上學神聽中心下耳也疏即下諸衆略有十類至文當明者故下鈔云一影響衆若影之隨形響之應聲二常隨衆謂作輔翼得圓滿故如賢首等三守護衆為守護如來如執金剛等四嚴會衆為莊嚴如道場神等五供養衆如偈讚即行供養若華香幢等即財供養也六發起衆諸請嘆者即其事也七當根衆聞法獲益當根領悟八表法衆同名林等表行同名首等表信九證法衆順證佛菩薩等説證不虗故十顯法衆即聲聞不聞顯法不共故對前十類辨權實者影響一衆自有二類一果德衆謂能加證法諸佛互為主伴非權非實然權實有其二類一本高迹下如佛為菩薩二本下迹高如菩薩為佛今既是佛則非迹下實是如來又非本下即是實非權無權可對故亦非實因果海故若位極菩薩影響一向是權故有經云昔為能仁師今為佛弟子二尊不並化故我為菩薩等當根唯實餘八通權實若辨地位影響證法通因果餘皆為因因位高下以難準定疏除當根衆餘皆見緣者此意當根之衆即第三順根感因故此除之若爾何故綱要云聽者則正在當根傍兼影響今謂通云此約以人從法當根屬因綱要約人法別論感者善相乃在因中當根之人故在緣攝故彼此文不相矛楯疏然有二類一者言請二者念請諸會有無現相品當辨者故下疏云四請問儀式復有二義一約言念二約通別初中請有二種一言二念答亦有二一言答二示相交絡相望應成九句在文唯四初會之中具二問答謂現相品長行念聲供聲言請初光示法主現華表義現衆表教即示相答三昧品中以言重請下之三品亦以言答第二會唯念請如來示相答菩薩言説答佛心自在不待興言佛力殊勝現相能答第八會言請言答此顯菩薩不同佛故第九會念請示相答顯以心傳心唯證相應離言説故二通別者初後二會別問通答二八兩會別問別答又初會亦得是別問別答次文當明疏如第九會者一云屬上第會中佛入師子頻伸三昧令大衆頓證法界義當説經故疏云師子奮迅衆海頓證於林中即其義也二云屬下第九會中普賢文殊等承佛神力説經故三云屬上九字誤書應是七字第七會中僧祇隨好佛自説故四云屬下第字應無通指九會因人説經要假上加言不異前故略有無加者謂第八會重總説五十二位故言不入定故無有加者為第二第七第九三會説人不入定故鈔一切説是一説者顯法無異故是一説問其第四句我等諸佛亦如是説亦顯法無異故與此何別答彼就説人體非一故與此不同也又準下鈔云然有四句一一切處文殊同一説偈故是一切即一二但一文殊十節説偈是一即一切三各於佛所即一唯是一四諸處文殊各偈不同即是一切中一切今此所論即當初句疏若爾僧祇隨好應非一切者此難影略更云應非同説應非果海無言或此難中通含三難同説一切説果海無言三義通表一經僧祇隨好既佛自説是知三義不能該攝一切故云應非一切鈔唯佛能了故佛自説者文準下疏第八下半六十九紙云佛自説者有二意故一僧祇因終此品果極故二皆佛説二好用劣相而用難思恐物不信故佛自説言欲拂前因果之相故佛自説者一云餘菩薩説表因分可説對彼因分果分名不可説今佛自説却表因分不可説前對因分可説果分名不可説今表因分不可説已無可説之迹果分寧有不可説之迹故鈔云爾二云餘品菩薩因人説如來果人不説表因分可説果分不可説若不重遣還成滯迹今如來果人説菩薩因人不説表果分可説但可總標令人知有因分不可説拂迹入玄冥同性海無前因定可説果定不可説之蹤迹也故賢首義分齊云一性海果分定是不可説義何以故不與教相應故即十佛自境界也故地論云因分可説果分不可説是也二緣起因分即普賢境是也此二無二全體遍收其猶波水思之可見又下疏云是地所攝有二種一因分二果分説者謂解釋一分者是因分以於果分為一分故然因果二分古有多釋全乖文旨者今所不論有可通者正而用之直望論意即指義大為果分故不可説遠公云三是所顯證道之行四是證道所表地法此二合為義大以證依法成法由證顯故合為義賢首云一所依果海如太虗空二地智所證十重法界如空中所盡之處三根本地智能證法界如前依盡相此三合為義大説大為因分是則可説遠公云一是言教二是所説教道之行此二合為説大以行依言成言依行發故合為説賢首云四諸地後得隨事起行悲智不住五諸地加行所起解行為趣地方便六寄法顯成諸地差別此三合為説大更以義取略有二種一唯就十地以明以證智為果分方便寄法等並因分此復二義一以修證相對則方便造修為因分息修契實為果分二以詮表相對則以寄法顯地差別為因分真實證智為果分如初三地寄同世間次三寄二乘及禪支道品等令衆因此表解地義為因所表證智是此因之果斯皆智言所不及故不可説如彼鳥迹同於虗空方便寄法可以言顯故云可説如空中鳥迹約鳥説異是以一迹通有二分即可説不可説也二約究竟佛果對普賢因説義通一部謂即此證智冥同究竟果海為果分如鳥處之空不異大空地相之因同普賢因以廣説則有無量著別事殊勝願力復過於此故是則迹處之空隨於空處之迹亦有説義地智亦可寄言標舉故問上論云是地所攝有二如何説為究竟果耶答豈不向言冥同果海故上論云此智是誰證偈言佛所行故又上加分云不思議佛法又地影像分云彼十大山因大海得名大海亦因十山得名菩薩十地亦爾同在一切智因得名彼因果相順故是知論主亦用究竟之果為十地攝又且依一相不可指陳等云不可説及與可説若有因緣故果可寄言即事入玄因亦叵説故云説少分也不可局執上言因緣者即四悉檀也故下鈔十九上半十紙內云果海離言唯證相應皆不可説有因緣故者即四悉檀因緣即得無説之説耳因果二分別教要義事希覽者審細詳悉鈔但有作用發起等者故下疏第九上半三十一紙云第三入此三昧時下明發起分光明動地警群根故後顯出聲令聞法故前皆有加而無發起此有發起而無加分者前表解可從他故有他加此表行因己立故自力發起又表行依解起無別法故不加攝解成行亦須入定聖旨多端不可一準言冥常不捨又有意加故者釋冥加有二義也前約自他俱不知故後據唯他不知故藏攝鈔以契對經即名依主者所契名契若望能契可作持業或揀席經揀別依主鈔如質多名心者具云質多耶即業起心也泛言其心通有四種梵語名別所目亦殊一訖利他耶此云肉團心此是身中五藏也具如黃庭經五藏論訖也二訖㗚乃耶此云緣慮心此是八識俱能緣慮自分境故謂色是眼識境乃至根身種子器界是阿梨耶識之境名緣一分故云自分也三戰栗陀耶此云堅實心亦云貞實心是真心也通上質多耶集起之心故有四種焉言今謂若十二部修多羅至思之者清涼出古意也謂修多羅分通三藏修多羅藏通十二分分藏互通理趣既齊無勞顯示但修多羅分通餘十一分修多羅藏不通餘二藏此義不齊故須解釋一云十二部帙不別故修多羅分通餘十一三藏部帙別故修多羅藏不通餘二藏二云十二分三學無別許通三藏三學隔別不通今詳不爾但以餘十一分有契合義無修多羅名乃用第一修多羅分名貫通餘之二藏雖有契合之義然無修多羅藏名仍具修多羅分名不用修多羅藏名貫通如京南二十里有百姓是京官所管彼處自無官長故京北二十里雖有百姓然非京官所管自有押洲官長故以喻對法學者應悉故鈔自通釋云二藏之中有契合者細思由此得知修多羅藏名是別非總古無總別不分失又解修多羅分約名通於三藏當分之中具三藏故約名不通餘十一分別得總名故餘有別名故約義通十一略相修多羅義該十一故所以者何以彼十一分但重廣釋前略相故修多羅藏約名通於十二分當藏之中具十二故約名所不通餘二藏別得總名故餘有別名故約義不通餘二藏俱具總相不具略相故何以故餘之二藏亦非重廣釋此故細思細思慎勿輕浮故下鈔云其後一總別彼為挺拔今正破之彼意云既契理合根名修多羅則律與論皆有契合豈得不名修多羅耶故今示云二藏有契合者即十二部中修多羅爾此約義該何須更立兩重總別則三藏中修多羅唯局總相十二分中却具三相故從總相立於經藏揀異二藏也若兼順義經非敵對古無敵對翻名失揀異席經借義助名古無以義為名失古既無失過歸刊定故前鈔中云非是重古輕今不欲欺誣亡沒是也科云伸全縱彰半奪者一云亦名四皆敵對名全約義唯聖教一名敵對餘三名非敵稱半二云但約名為難刊定全是古人全非名全更約義奪古人半是半非名半何者約名古人言線是敵對一半是也經非敵對一半非也約義古人言經非敵對一半是線是敵對一半非故云半奪三云經線俱敵對名全唯經從義名非敵對稱半是知古人亦知經線約名俱是敵對經線亦義俱非敵對言線是敵對約名也影取經亦敵對為線明知言契經半從義耳即其義也鈔儒則儒教夫子為主者正理云儒也在乎家治長幼順序不嬌不亂盡忠盡孝大則配天地小則正身節用施政閨門之內流恩僕隸之下言墨翟為主者破邪論云竊聞八十老父繫壞而歌十五少童鼓腹為樂耕能讓畔路不捨遺孝子家承忠臣滿國然君王有難則殉命以報讐父母有痾則終身以待側豈非曾參閔子之友庠序成林墨翟耿恭之儔相承羽翊言五經者謂周易毛詩尚書春秋禮記九經者春秋中開三謂左氏公羊穀梁禮記開三謂周禮儀禮曲禮并周易毛詩尚書故成九也鈔蘊即五蘊等者色受想行識也十八界者六根六境六識十二處六根六境十二因緣無明行識名色六入觸受愛取有生老死四諦苦集滅道四食臨觸意思識四靜慮離生喜樂定生喜樂離喜妙樂捨念清淨四無量慈悲喜捨四無色空無邊處識無邊處無處有處非想非非想處也八解脫者先釋名次出體初釋名者一有色觀諸色解脫未得無色定未離色界染觀內外色作光明想二內無色想觀外諸色解脫已得空處內離色染而觀外色作少多等三淨解脫身作證具足住已得捨念圓滿清白以此為依修習清淨勝行圓滿名淨解脫身者意身作證者由於智斷得作證故前二意解疏遠名觀今此除障最勝聖意親取名作證由此聖者多住於此及於第八此二勝故二界邊故又四根本圓八九次備故四空無邊處解脫境空無色故是境界是能緣空無邊之處也下皆倣此五識無邊處解脫謂緣無邊虗空之識而為境界六無所有處解脫境空無色故上界推求之時無少所得故七非想非非想處解脫非想者謂超無處有粗想故非非想者非全無細想故八想受滅解脫身作證具足住由想受二種強勝於餘是心行故厭患勞慮暫未止息止息此時要斷障得名為解脫為滅受想之解脫障依主釋也上七持業解脫障故或以別揀通即為依主已知名義次顯體性者俱舍論説前三無貪性眷屬五蘊性次以無色定善為性大乘則世間出世間正智為體有漏者以分別中世間正智為體無漏者即無分別智及後得智唯慧為性緣色非色及真如境離諸定障引生勝德非餘能故若相應體初七以四蘊為性眷屬五蘊性體故對法云若定若慧及彼相應諸心心所無色界中許有定道無表色故第八解脫以二十二法厭心種子為體即不相應行蘊所攝八勝處青黃赤白地水火風十遍處前八勝處上加於空識三十七品謂四念處身受心法四正勤已惡令止未惡令不生已善令增未善令生也四神足欲勤心觀五根信進念定慧也五力即前五根魔不能伏七覺支念擇法精進喜定行捨輕安也八聖道語業命念定見思惟精進皆正貫也四無礙法義詞樂説也四意趣一平等法身平等二別時戲塔成佛等也三別義法無生滅四衆生意樂毀讚令進等也四隨者一隨樂將護彼意稱悅其心二隨宜隨宿習化三隨治應病投藥四隨義導根熟時聞即悟故亦名四悉檀初則世界悉檀二則為人悉檀三則對治悉檀四即第一義悉檀梵云悉檀此云義宗鈔並在十藏品中救之等者然此十二分教義綰一代旨既幽遽故今引釋故下疏云舊名十二部經恐濫部帙改名分教名有二相唯修多羅或二或三修多羅者此云契經言二相者一總相謂涅槃十五云始從如是我聞終至歡喜奉行皆名修多羅二者別相雜集第十一云謂長行綴緝略説所應説義然更有異名異名有四一法本二但名經三直説四聖教言法本者遠公以五義釋之一教為理本二經為論本三總為別本四初為後本五略為廣本以彼立三修多羅故以前五中後三為修多羅相故一總相二別相三本相亦名略相總不異前前二中總故別謂就前總相分出十一餘不收者即長行綴緝等還復攝在修多羅中名為別相用斯別相望祇夜等為其本故名初為後本由長行未盡方起祇夜故言本相者於彼別相十二部中初略標舉名修多羅後廣釋者隨別名之如言色者即是根本略相後云青黃等者是名廣相故云略為廣本然其後二即別略二不違雜集長行綴緝等言即是十一處不攝者如賢首品出爾時文殊師利説無濁亂清淨行大功德已等類此是結集綴緝非佛正説故云十一所不攝者然其後二等者彼鈔云以刊定記破云隋遠法師雖説修多羅總別略三初順涅槃二無聖教亦乖正理三違雜集雜集云修多羅者謂長行綴緝略説所應説義彼自釋云略説所應説義即是長行綴緝曾無先略標舉後廣釋之相當知略者總之異名謂修多羅一分是總餘十一分是別今修多羅依藏部中總相業用而立其名餘藏部名依藏部中別相業用所以者何修多羅業用能貫攝故餘藏餘部所詮所化由此貫攝彼方成故故涅槃云始從如是我聞終至歡喜奉行皆修多羅攝釋曰此即彼之立破由此刊定言違雜集故令辨相却同雜集故云不違此正成別相故云長行綴緝是十一所不攝者恐義未顯故引賢首品文示之其略説所應説義即是略為廣本如欲顯示菩提心功德故即其類也鈔云其略説所應説義者通略相修多羅即開雜集論文而為兩段出別略之據只用上賢首品一文雙證二義如云文殊師利説無濁亂清淨行大功德已者但是長行綴緝若云欲顯示菩提心功德故即是略相標下文之所説故此第三略相亦順成實成實名直説語言總相而言名為直説一一語言多義分別名非直説斯則通十二分皆有此一不同別相十一不攝若十二分中修多羅並通前三若三藏中修多羅唯局總相有不曉者妄非先賢而云修多羅但依總相業用則違諸論長行綴緝等言二祇夜者此云應頌一顯前未了故二應後來根故三授記者梵云和伽羅那亦云記別一記生死因果二記當來成佛事四伽陀者此云諷誦謂孤起頌一云易誦持故二云為樂偈者故五尼陀耶此云因緣一因請方説為重法故如三家五請等二因事方説如本末故如觀善財并因事制戒等六優陀耶此云自説一為令知而請法故如十地本分等二為令所化生殷重故念佛慈悲為不請友故七本事梵云伊帝目多伽一説如來往事如説威光太子等二説弟子性事如説諸善友因緣故八本生梵云闍陀伽謂説昔受身一説如來如説威光太子數數轉身值諸佛等二説弟子如諸善友等然其本事但云其事除所生事本生要説受身等九方廣梵云毗佛略一廣大利樂故二正法廣陳故十未曾有梵云阿浮達磨亦云希法一德業殊異故如初生即行七步斯經不起而升四天二法體希寄故謂説佛菩薩不共功德經文非一十一譬喻梵云阿波陀那一為深智説似令直解故如法華云諸有智者以譬喻得解二為淺識就彼取類誘令信故如為誓人説二蘊等此經所無雜集通説為令本義得明了故十二論義梵云優波提舍一以理深故二義不了故並須循環研核此之十二於大於小為局為通若皆大者則違涅槃等文涅槃第三云護大乘者受持九部法華第一云我此九部法隨順衆生説瑜伽等論説聲聞藏無有方廣然諸經論且約一相故作是説如實説者大小皆有且如深密中菩薩依十二分教修奢摩陀瑜伽二十一云佛為聲聞一一具演十二分教而涅槃説大但有九者依三部中之小相故謂因緣中取因事制戒依譬喻中依為誘引於論義中約非了法華九部小者三相大故於記別中取記作佛於自説中依不請友方廣之中依廣大利益其正法廣陳通大通小然契經望餘總相略相則許通有別相即無應頌諷頌本事本生互望並無本事本生望於記別亦是互無自説因緣容得互有如因事説不由請故除上所除餘皆互有此經之中具足十二已如上引十二分教義已略周疏離熱惱因者一滅業非二滅煩惱得清涼果者三得滅果鈔定共道共二戒者禪定聖道相應現思在定時道法爾能遮惡法功能殊勝名戒未入已出其戒即無故名隨心散心位中不能遮故鈔小謂性罪等者一云佛未制時世人已知是罪名性佛制已後方知是罪名遮或分別煩惱所發三業過非名性俱生煩惱所發三業過非名遮是故三乘見道已去遠離性罪鈔論體論處所等者因明釋云一者論體謂言生因立論之體二者論處所謂於王家證義者等論義處所此有六種一於王家二執理家三大衆中四於賢哲前五於善解法義沙門波羅門前六於樂法義者前三者論據謂論所依即真能立及真似現比量等其自性差別義為言詮亦所依攝四者論莊嚴謂真能破五者論負謂似立似破六者論出離將興論時立敵安處身心之法七者論多所作法由具上六能多所作疏一者剋性等者問既約兼正通詮其三何故尅性三二一別耶答曰望義別故何者經詮三學俱盡其玄律詮三學二盡其玄論詮三學一盡其玄故此云爾如世三僧各稱三藏一正二兼正稱經僧博通三藏正稱律僧但精二藏稱論僧唯窮一藏以喻例法昭然可悉又解經多詮三律多詮二論多詮一所尚不同又分兼正鈔若不為説毗伽羅論可名為藏者藏者慳祕也故法華云若以小乘化乃至於一人我則墮慳貪此事為不可又解隱匿名藏故涅槃經迦葉菩薩曰諸佛有密語無密藏世尊讚之曰如來之言開發顯露清淨無翳愚人不解為之密藏智者了達則不名藏釋曰待根成熟若不為説大乘之法則應名藏若許爾者乃與此文甚相乖反也疏則唯十藏攝者非是十藏品中十藏但取十種玄門以為十藏故疏釋曰具足主伴顯無盡故十玄之中舉初及後影中間故問十玄是義十藏是教豈相愜當答上疏云以義揀教此意用十玄義揀能詮經將教從義故名十藏如彼三藏亦是以教從三學義故名三藏言教義融故者亦答前難以義從教但號十玄以教融義通稱十藏又解亦是此經十藏品中十藏所攝故綱要云若依此經十藏品中自明信等十藏十藏為實攝於此經疏通相十二分教者今古諸師同稟故疏夫教海沖深等者四句如次配教理行果之四法也雖非鈔意消疏可得準鈔釋者教海法雲智光各上一字是法下一字是喻教深且廣近喻名海雲雨所説之法故名法雲智如光故名為智光謂佛功德無有邊際猶赫日揚光偏語其勝故名為智教海法雲通該前三智光一種唯目佛果言智光無際者日光合空既亡限量真智證如故無邊際故下大疏以法對喻略伸十義廣辨難思一謂日與空非即非離真空智日一異似同二非住非不住真理無相名非住正智契遠名非不住三而日善作破暗良緣顯空之要冥蒙惑暗待此方除微妙真空因茲始顯四雖復滅暗顯空空無損益智雖斷證理本凝然五理實無損事以推之暗蔽永除性乃無增空界所含萬像皆現所依真理損益雖無能德障顯除仍有斯乃不損益之損益妙之至也六而此虗空性雖清淨若無日則暗起疑然真理體本寂寥智光不起隨緣障生七非虗空空故自能除暗若除者必假日光非真空絶相能自破惑惑若破時須憑智日八日若無空無光無照空若無日暗不自除智無真理匪鑒匪明真空無智惑寧自滅九然此暗性無來無去日之體相亦不生不滅惑染自性尚無去來覺智本然寧有起滅十但有日照空則乾坤洞曉智若明則因果理事等分明故妙辨叵窮者拂迹入玄四辨八音不可説也鈔四辨者一法無礙辨二義無礙辨三詞無礙辨四樂説無礙辨復於第四約義開七一捷辨須言即言故二無斷盡辨謂相續連環終無竭故三迅辨明於事理心無癡暗言即迅疾如懸河故四應辨應時應根無差異故五無錯謬辨凡説契理無錯失故六豐義味辨名數事理皆無量故七一切世間最上妙辨此有五德一甚深如雷二清徹遠聞三其聲哀雅如迦陵頻伽四能令衆生入心愛樂五其有聞者歡喜無厭具斯五義故云無勝上言八音者一最好音其音清雅如伽陵鳥二易了聲言詞辨了三調和大小得中四柔軟言無粗獷五不誤言無失誤六不女其音雅朗七尊慧言無戰懼八深遠臍輪發聲疏以無言理體也之言事用也詮事用言絶之理理體也以無變一法門之變無量門此是能化言説多端也言無窮之根者所化根感非一也鈔能廣能深能高能遠者或將教理行果如次配釋或將教海沖深等四句如次配釋或散嘆深廣高遠也鈔皆不能安等者反表大海皆能所謂安而不溢故受而不濁故攝而同名故持而不盡故言大法明聞思所了大法照修慧所了大法雨益他所作言皆不能安等者反表唯第十地菩薩方能所謂安存而不捨信受而不疑上二約文包攝而不散次一約義住持而不亡次一雙通文義鈔具縛凡夫能知等者問前説九地不知今云具縛能知豈不相違今謂通云前云九地不知不能盡知此云能知少分知故不相違或前約證窮此據信解或前自力下不測上此據他力上加於下故不相違言仰推之智者彼經勝鬘白佛言三種善男子善女人於甚深法義離自毀謗生大功德入大乘道何等為三謂若有善男人善女人自成就甚深法智若善男子善女人成就隨順法善男子善女人於諸深法不自了知仰推世尊非我境界唯佛所知是名善男子善女人仰推如來智除此諸善男子善女人已餘諸衆生於諸深法堅著妄説遲背正法習諸外道腐敗種子當以王力及天龍鬼神力而調伏之鈔四輪者下疏云然莊嚴論等六名四種不放逸輪先辨相者各具五種因緣一住好國土輪者彼名勝土輪言五緣者一易求謂四事易故二善護王如法故三善地處調和故四善侍同戒見故五善寂無喧聲故二依止善人輪五緣者一多聞二見諦三巧説四憐愍不貪利故五不退無疲倦故三集福德輪當彼第四名先福輪一可樂謂由住勝世為因故二無難由值善人為因故三無病四三昧五智慧此三以自正輪為因四發大誓願輪當彼第三名自正輪故成實論名目發正願輪一善緣妙法為緣故二善聚具福智故三善修止觀諸行相應修故四善説無求利故五善出所有善法恭順修故然前二就果立稱後二從因立名雖俱通因果影略互顯前二外緣後二內因願是智因福是福因此四何緣受輪之稱依成實論以此四輪能摧八難故謂初住善處能除五難即三塗北洲及長壽次依善人除佛前後難三發大願除世智辨聰四宿植善根除生盲聾啞前五是惡處六是惡時七是惡因八是惡果或彼四輪非此四輪彼除八難之障非判一代之教多聞闕疑未敢詳定言四教者藏通別圓也鈔所謂解脫相等者如次即是我樂淨常之四德也不空如來藏之相大也言我此九部法者故法華云或説修多羅伽陀及本事本主未曾有亦説於因緣譬喻並祗夜優波提舍經是也言如經説一無常等者鈔有六義如次是小教立相破相頓教終教圓教義也言生滅代謝者由生待滅非常滅由滅待生非常生故名無常言無彼常故者此依他法無彼遍計常無相無彼圓成常有相名無常言不生滅者謂但空真理本來不生名無畢竟不滅名常或俗諦門中常有生滅真諦無彼故名無常又準下疏義引菴提遮經云不生不滅是無常義生滅即是常義鈔釋曰此意正顯性相交徹二義相成生滅相盡無常即常故不生不滅是無常義隨緣變易常即無常則生滅是無常義也又性即相故不生不滅是無常義相即性故生滅是常義又遠公用中邊論意解曰不生不滅是彼無常實性故名無常又生公釋云常之為無乃所以無無常故即不生不滅矣即諸行而不可得故入中道非常非無常也又肇公釋淨名云小乘觀法以生滅為無常義大乘之士以不生滅為無常義無常名同而幽致殊絶矣其道虗徹故非常情之所能測妙得其旨其唯淨名乎遣常故者無常非謂有無常無常常無故云不生不滅是無常義又大乘法師云小乘以生滅為無常謂不生滅為常故今折彼汝見有不生滅為常者此常還是無常故云不生不滅是無常義言無法可常者絶待真理無彼對待可常故名無常是故真門隨順但具非常非無常之言念今遮可常故名無常言非常非無常者約圓融義更互相即故乃雙非不滯一邊以為中道言又苦集滅道等者隨藏通別圓之四教分生滅無生無量無作之四諦也言十二支者一無明支正唯分別兼通俱生世俗勝義二愚別發下惑發上上不發下二行支自性為思相應同聚福與非福不動業故初發次招並為能引實通種現三識支唯第八識四名色支業招五蘊除後三支五六處支業感六根六觸支業報觸數七受支業報受數上五咸為導引熏感同時義立前後實唯種子未潤已前假通現行結生已後八受支正唯俱生兼通分別九取支或前愛增或目四取欲貪見戒我語取故上二能潤實通種現唯除不還唯種潤故一發教潤不同無明初後位別分愛取二十有支識等五支能招行種愛取潤已近有果故此三咸為能生通前十支或過或現並為其因而破常見十一生支結生已去少壯已還十二老死支衰滅之位五滅蘊為體此之二支咸為所生或現或當並為其果而遣斷見實現假種老非定有故色非遍地故合附為支病非定遍憂悲不順故不立支行人於此而修觀行而有二種一雜染安立觀二清淨非安立觀者謂行粗淺安立施設名曰安立菩薩將故斷除先順觀之從無明生行行生識乃至老死也如是順觀生死相續令生厭離既順觀已逆觀其果從何而有謂觀老死果由誰有謂由生乃至行支由誰有謂由無明作四諦觀觀老死支苦集滅道乃至行支準上可知不觀無明以無因故是故但作四十四智非安立觀者無非分別智體合如理心境二冥非假施設名非安立諸惑永滅故云清淨於中有二一順二逆先順觀者由根本智見諦斷惑無明滅行不生乃至老死苦果不有無明滅故慧解脫相應諸惑滅故心解脫能發無明既滅故所發諸業亦亡惑業無故後果不續即得無學得無學已逆觀所滅生死苦果由誰滅乃能由無明滅又作七十七智觀十二支者一一支中有三智一觀因智二審因智三法住智觀因智者謂觀老死從誰生由生生次審因智重審觀故推審二智別觀三世法法住一智總觀三世故共有七智唯除無明義不異前餘十一支各有此七成七十七智緣生要義經論多明池魚暫聞而生天緣覺頓了而證聖振毛張目畢在疏文舉領提綱粗如此説言又如中論偈云等者偈有四句初一句標法體下三句釋義在境為三諦在心為三觀也鈔依四教具細顯示今束大綱貴令易曉一藏教釋者分折因緣果法成無名空藉託因緣果法成有名假由無故離常由有故離斷合上空假二義名中如一品字具上三義分彼三口離散品字成無名空假藉三口和合品字方有名假具上二義離定有無名中二通教釋者約體真空空也就相妄有假也雙離斷常中也如一空華約體本空空也病眼見有假也都無榮枯之相中也三別教釋者緣生無性空也無性緣生假也空假所依佛性妙理中也如彼鏡像實體無故空也假相有故假也空假所依清淨明鏡中也四圓教釋者但將別教三種舉一全收即是上來大綱已竟下隨鈔逐難釋者言雖三句皆空者假言空者獨立法無故中言空者斷常法無故言尚不得成即空等者舉淺況深揀定也此意藏教所明三義尚不成破相通教所明緣生無性舉體全真第一真空淺觀何況別教所明無性緣生佛性妙理第二第三幻有中道深觀也言不須破滅體即是空者形揀藏教折法歸空也此教所明妄緣生時體實是空如彼空華病眼見時體實本空言而不得即假即中者以彼破相空宗不存幻有之假相未彰佛性之妙理言設作假中皆順入空空者彼宗設縱作假中二觀核其定實還成空觀如作假觀審知萬法隨順世俗虗妄為有稱實是空如作中觀了彼但空之理無斷常故豈非是空故鈔云假亦即空假施設故中亦即空離斷常二邊故言進非別圓者非同別圓三觀足具故言即空即假即中者非是三諦互即但是一種之法生之法即此三義若云三諦互即何異圓教言即空者約遍計也即假者約依他也即中者約圓成也言三種迤邐各各有異者空假中三展轉相望各各不同也如攬麻成繩妄認作蛇三義各別蛇空繩假麻為所依以況中道言三種皆空者義當三無性也無主故空者無實我也虗假故空者無實法也無邊故空者無斷常也問豈空假二觀不離斷常耶何故中觀獨名無邊故空答空多涉斷假多涉常唯斯中觀迥離斷常故獨名得言三種皆假者同有名字故者謂物無當名之實故既無當名之實豈非假也如食油名實非食油言中真者真諦之中遍計空故中根者俗諦之中化衆生故中實者義諦之中離虗妄故所以三諦通名中者俱離兩邊故言不住作不作者作即動也不作靜也不住彰動靜無礙即是寂用無礙義也言雖三而一者行布不礙圓融也雖一而三者圓融不礙行布也言三種皆空者標也言思道斷故者釋三諦絶迹故皆空也三種皆假三種皆中文顯可知鈔今分後二之語不分初一者此意但由後之二語故分教非由初一故分教若分教時三語皆分如世弟兄三人長者唯和孝次唯轉逆少通孝逆若據長兄不可分居但據二弟故乃分居若分居時三皆分居分居之因唯後二故不關初一疏言有通別就顯説故者此潛通外妨謂有問言若細推尋互不互通故此遮云今就顯説也疏王之密語所謂別故者此喻王言雖同所要物殊臣不分別豈符王意法令準之佛言雖密義有權實若不分別豈符佛意也鈔有四無常者攝相説也無常為門苦空無我皆號無常故云有四言若佛出世等者經有五節一寄佛寶顯無常觀二寄法寶顯苦觀三寄僧寶顯無我觀佛亦名僧上首僧故上三所觀唯屬生死能觀唯屬權行次合水鹽馬三喻也四四於空中顯正解脫所觀唯屬解脫能觀雙通權實但無二十五有欲令比丘修學空想通權行也言二十五有者頌云四洲四惡趣梵王六欲天無想五那含四空并四禪廣如涅槃十四而解脫中空無我空苦空不淨空無常遮此四種權行能空之法即是真常解脫異名密含三德所謂不動是樂德無想是淨德無變是常德唯實行也雖含權實之行並合前器喻五寄佛性彰其妙有兼顯我德即合前馬喻此五節經前三節文理顯可知後二節文鈔釋有二一云空是真空遮詮顯實遮四權行佛性是妙有表詮顯實顯一實行二云兩節經中含具四德空中含三德如文昭著佛性中含我德四德具矣在境名德在心名行言馬又我義者此鈔言略具足應云最後佛性彰其妙有即含前馬又是我義此言又者非是對前不自在馬但對空中三種異名已具三德佛性合焉又是我德兩節文中四德具矣學者細思勿滯舊聞不生正解言是則此中具彰八行者此一段經中具彰無常苦無我空四種權行常樂我淨四種實行故名為八疏以深為淺失於大利者類焦沅而鬻炭也言以淺為深虗其功者同蒸砂而求飯也鈔如言初發心時便成正覺等者初心成佛因徹果海稱性深義若能善修頓成佛果理定無疑如不分教却同權宗但是如來接引劣根方便假説致令行人不能正修稱性圓融發菩提心高推聖境非自分故殊不知自身包性德而為體本是如來依智海以為源隨緣流浪有何得而不本具有何行而不能修若云如此妙行賢聖所修非我能辨者即是欺誣自身本具法身真佛不唯失其大利抑又妄招過罪故神變經説若有人見神呪功驗殊勝却云此是普賢文殊等能為斯事非我所能者斷祕密乘命根犯三昧耶淨戒何以故良以欺誣自身本具法身真佛也上之過罪並不分權實爾故下疏云若謂久習無明云何頓成大智者豈不聞冥室千年之暗一燈倐忽頓除耶夫機差教別聖旨深玄並未證真同居學地共詳聖智誠日戈難且以淺為深有符理之德以深為淺有謗法之𠍴以遠為近則有益於行人以近為遠法非我分諸佛説教貴在俯就物機後輩學人若欲高推聖境儻失大利豈不傷哉旦夕鈎磻溪朝升台輔豈謂夫明經常選而語其優劣者哉況才生王宮貴極臣佐寧同百戰夷項備歷艱辛況十千劫之功高亦非聊爾人耳是以語其智等虗空而非類論其德碎塵剎而難量極念劫之圓融盡法門之重現初心契於智海豈有邊涯猶微滴入於天池齊無終始經云發心畢竟二不別如是二心先心難等即其義也言分折權小始二教實後之三教取捨偏前之四教圓第五圓教遲前三種教遲成佛果速後二種教速成佛果言三時者有空中也言三輪者轉照持也言半滿者文顯小乘名半大乘名滿意通權教名半實教名滿言五味者故涅槃經云善男子譬如從牛出乳從乳出酪從酪出生酥從生酥出熟酥從熟酥出醍醐醍醐最上若有服者衆病皆除諸有諸藥悉入其中善男子佛亦如是從佛出於十二部經從十二部經出修多羅從修多羅出方等經從方等經出般若波羅蜜從般若波羅蜜出大涅槃猶如醍醐問曰十二部經總攝諸經復云何言出修多羅等故遠公云以佛合牛約應身佛十二部經合乳説小乘經修多羅合酪説大乘教藉小開大故名為出復四俱大乘詮事之教名修多羅謂施戒等事方等合生酥即大乘中破相空教因事顯理故名為出以般若合熟酥究竟離相證實之慧名為般若依理起慧是故名出約行辨教亦得名出般若經云然此般若即是向前菩提體也以菩提合涅槃般若了因了彼無始法性涅槃是故名出約實教辨亦得名出涅槃經清涼釋云佛自揀此經異於小乘今牛出乳是大乘教耳若爾何成五味謂十二部經辨所説教出修多羅者十二分出生契理合機之義修多羅出方等者由契理故顯出真理廣陳為方等故從方等出般若者依理出生智故般若出涅槃者以智契理成極果故故云涅槃猶如醍醐言四門者共與不共觀照實相也共者三乘同稟不共者菩薩獨覺也疏開則得多而失少者理開之十義為十種得合之五義為五種失故云得多而失少也合則得少而失多者合之五義為五種得開之十義為十種失故云得少而失多也問合之五義為開之失者其義未詳何者且如開教家前之五義對其合教一一奪之云何有失一云理雖一味從合教義也詮有淺深奪歸開教也此意今辨分教何關其理從理一味不違教殊由此得知理本一味不為開教之失餘準例知既爾開教應全無失云何失少答得意之流任開任合皆無過失迷昧之輩見開見合皆生過失如見開教便謂理殊佛音非一佛意為多佛言唯局淳源枝流故為其失非謂違人亦有其失餘之得失準此應思鈔順下出現至有十義等者彼疏云一隨類音一無聲不至二無根不聞經云衆生隨類各得解是也帖遍降種種喻婆竭羅龍王所興雲電雷風雨四洲六天隨類不同故二隨樂欲音前多類音各隨欲樂説種種法經云如來於一語言中演説無邊契經海是也又佛以一妙音周聞十方國衆音悉具足法雨皆充滿通證上二也帖降注滋榮喻阿那婆達多龍王遍閻浮提普注甘雨百穀苗稼皆得生長等三隨根解音隨前樂欲所説一法大小各聞寶積云佛以一音演説法衆生各各隨所解是也帖天女妙聲喻善日天女出一妙音與百千種樂相應四隨時音即上大小之法令聞不聞皆自在故云不失時亦兼隨聞一法令欣憂不同寶積云或有恐畏或歡笑是也帖梵聲及衆喻宮中出聲梵衆皆聞各謂我語不出衆外上四多約即體之用是圓音義後六多約即用之體顯一音義五外隨緣招我無生滅應根感而談有始終稱法性而言亡起盡帖谷響隨緣喻六內集緣成何有主宰就相有而修幻緣約體空而無實我帖劫盡唱聲喻三災將壞雖無主我次第有聲聲初禪等安樂殊勝聞已進修即生上界七甚深欲言其一萬類殊應欲言其異一體無二雖多差別皆於甚深法界之所流出帖降雨難思喻大莊嚴龍王不思議力能降無邊莊嚴雨等八純稱法界但隨生有差別韻約體元無邪曲音帖衆水一味喻逐器分成異本體未曾差九橫入無斷遍入法界化生無斷帖天鼓開覺喻無心出聲覺悟諸天捨放逸等十堅歸一極聲無變易至於究竟始漸成就終令圓益帖漸降成一喻摩那斯龍王將欲降雨先興大雲凝復七日待作務已乃降微細之雨又言六句者一莫窮其邊故非量二隨根隨時有聞不聞故非無量三多緣集故非有主四純一法界生故非無主五當體無生故無能示六巧顯義理故非無示言各得圓音一義者菩提留支得第三隨根解音羅什法師得第七純稱法界音也言齊楚俱失者出文選第四子虗賦言並應奪之者奪開教也而與之耳者縱合教也言然並為教本下又都奪耳者奪歸開教也此意佛音但是教本非是其教今辨判教何關其本二師談本豈相愜當故鈔云又都集耳鈔華嚴梵網等者即師所立唯華嚴經名平道教刊定錯認將謂梵網亦為平道由見梵網亦居蓮藏舍那説故言皆是稱性善巧者揀異隨宜方便也言一時頓演者揀異前後漸説也言説於世尊餘處隨根等者如法華云昔於波羅奈轉四諦法輪亦是指鹿苑所説非是自説靈山法華會也言或有國土唯説三乘者此顯不説法華也同此國土中為説華嚴為不説耶若説華嚴云何唯説三乘華嚴之經是一乘故若不説華嚴何云祕不見有一佛土其中如來不説此法明是平道答若就德相常遍説其華嚴今從業用云唯説三乘若爾就德相法華亦常遍説故何云法華亦有不説若就業用云有不説者其華嚴經就業用門亦有不説故鈔云或有國土唯説三乘故今謂通云若就德相唯是華嚴更無餘經但就業用曲巧隨根華嚴經中分出餘經是故餘經德相乃無業用方有説業用門有説不説華嚴之經約德相門常説遍説又解法華經唯是一乘解深密經唯是三乘其華嚴經非一非三能一能三語深名一乘語廣名無量乘深即廣故非一乘廣即深故非三乘今云或有國土唯説三乘但見不説法華唯一乘故不遮華嚴非一乘故是故華嚴無不説故鈔釋迦為主但是三身中化身遮那為主十身具顯者問若準餘教釋迦唯化遮那唯真故清淨法身毗盧遮那佛千百億化身釋迦牟尼佛若準此經名號品云或名釋迦牟尼或名毗盧遮那云何偏言釋迦唯化遮那十身答釋迦唯化約餘教説遮那十身約此經説疏略云四異異實有多者鈔列十門而與賢首教義十異理亦相參彼云一時異此經念劫相收餘經年月尅定二處異本末相融唯在娑婆三主異具足十身唯是化身四衆異同異一乘衆權小三乘衆五所依異侮印炳現後智流出六説異主伴通方有説不説七位異因果交徹賢聖歷別八行異稱性圓修隨相分齊九法門異略舉十種一彼有三佛此有十佛二彼有六通此有十通三彼有三明此有十明四彼有八解脫此有十解脫五彼有四無畏此有十無畏六彼有五眼此有十眼七彼有三世此有十世八彼有四諦此有十諦九彼有四辨此有十辨十彼有十八不共法此有十不共法餘門無量餘如經説十事異觸類之事即法門故依坐等事但表法故應知刊定不唯破彼即公抑又彈於本師清涼扶昔故伸敘釋鈔五説教時分異者問與前教門儀式中一時頓演有何異耶答彼得時而顯儀此正論時或彼據一時此兼十重故不同也疏偏方不定教者一云方者法也即偏為一類非漸非頓根説大乘法故名偏方二云方者處也通途時處正弘於小偏於一處而説大乘故名偏方言不定者漸頓不攝故名不定疏或但分為二者即是半滿者問此言半滿與前牟讖立二教中半滿何殊答前唯據法此兼約時故鈔云既破五時四三二時皆已破竟也疏實義即空者法空也若云我空無殊俱舍故學者應悉鈔理絶百非者所謂有無亦有亦無非有非無成四句也非有非無亦非有亦非無非非有非非無成八句也一異同前又成八句共有十六句隨三世開共成四十八斷常各具即有九十六并本四句乃成百非言故智度論云一切實等者如次配真諦俗諦雙表中道雙遮中道也或有空俱非四句皆實故云一切實有空俱非四句皆非實有空俱非四句皆亦實非實空有俱非四句皆非實非非實又準大鈔有四重四句初單四句如向已明二復四句者一有有有無即是幻有門中所攝幻有真空二無有無無真空為門所攝幻有真空三亦有亦無有亦有亦無無雙照門中還攝有無故四非有非無有非有非無無雙遮門中亦攝有無而言復者四句之中皆説有無故第三具足四句者四句之中皆具四句故第一有句具四句者謂一有有二有無三有亦有亦無四有非有非無即是幻有為門攝餘三句故也第二無句中四句者一無有二無無三無亦有亦無四無非有非無有空為門攝餘三句故第三亦有亦無具四句者一亦有亦無有二亦有亦無無三亦有亦無亦有無四亦有亦無非有非無表句為門攝餘三句故第四非有非無具四者一非有非無有二非有非無無三非有非無亦有亦無四非有非無非有非無遮句為門攝餘三句故上四四一十六句為具足四句第四絶言四句者一單四句外一絶言二復四句外一絶言三具足四句外一絶言有三絶言前三重四句乃屬因門第四絶言四句沒同果海又前三四句即是教道絶言四句即是證道也言是知失意則四句便成四謗得旨則四句即是四德也故下鈔十八上半云謂定有者增益謗若定無者是損滅謗亦有亦無相違謗非有非無戲論謗一真如是有義以迷悟依故不空義故不可壞故二真性是空以離相故隨緣義故對染説故三真如亦有亦空以具德故逆順自在故體融鎔故四真性非有非空以二不二故定取不可得故餘之四句前已略明又皆即有之空方為具德之空即空之有方為具德之有是則非有之有非空之空為具德耳又盡有之空盡空之有方為具德又隨一句必具餘三若言亡慮絶方為具德耳如次證上謗德可知鈔一切衆生皆有佛性等者言有但有因性言無但無果性言伽毗羅城空者各歸四大故大涅槃空者各歸三事故言非有如虗空非無如兔角者故彼經云善男子衆生佛性非有非無所以者何佛性雖有非如虗空何以故世間虗空雖以無量善巧方便不可得見佛性可見是故雖有非如虗空佛性雖無不同兔角何以故龜毛兔角雖以無量善巧方便不可得生佛性可生是故雖無不同兔角鈔逆順入出等者於色界四無色四滅定一九次第定自下向上名順出入從上向下名逆出入或順或逆皆有全超半超以表自在故此據小乘若大乘所見與此稍異故涅槃經大衆問品云爾時一切菩薩摩訶薩天人雜類異口同音唱如是言奇哉純陀成大福德能令如來受取最後無上供養而我等輩無福所致所設供具則為唐捐爾時世尊欲令一切衆望滿足於自身上一一毛孔化無量佛一一諸佛各有無量諸比丘僧是諸世尊及無量衆生皆示現受其供養釋迦如來自受純陀所奉設者爾時純陀所持粳糧米成熟之食摩訶陀國滿足八斛以佛神力悉皆充足一切大會爾時純陀見是事已心生歡喜踊躍無量一切大衆亦復如是等斯則一處見異大小並彰矣鈔四大本淨等者悟彼性空舉體全真故云本淨言不無起生法忍者七八九三地也言柔順忍者四五六地也言須陀洹果此云預流乃是初果疏揀去不定者謂與所立教各相返者皆名不定也鈔於中漸約不具者談有時不談其空云空時不云其有故名不具頓約具説者空有俱陳故言不同延公大小相望成漸頓也者延公大由小起名漸大不由小起名頓約根性以刺漸頓此師空有具陳名頓空有隨闕名漸約化儀以刺漸頓故不同也又此頓漸而有多門準下大鈔通有四句文云一頓悟漸修如頓見九會之臺要須躡階而漸升法亦如是頓了心性即心即佛無法不具而須積功遍修萬行此約解悟扶桑赫日頓然出芳草嚴霜漸爾消二者頓修漸悟即如頓遍磨鏡色漸明淨萬行頓修悟則漸勝此約證悟習射初心期中的調弓時久近華心三者頓悟頓修如利劒斬絲千葉莖齊斷亦如染絲一時齊染一時成色故萬行齊修一時朗悟仙藥一丸才點處頑銅千兩頓成金四漸修漸悟猶如斬竹節節不同如臨浡澥前前淺似瑩泥珠後後明又大鈔引楞伽經有四漸四頓俱以喻顯一如菴蘿果漸熟非頓此喻十信二如陶家作器漸成非頓此喻十住三如大地漸生非頓此喻十行四如習藝漸就非頓此喻十向二四頓者一明鏡頓現喻喻初地至七地二日月頓照喻此喻八地已上三藏識頓知喻此喻報佛四佛光頓照喻亦喻法報前喻報成此喻頓照又禪詮都序云諸家有云先因漸修功成而豁然頓悟猶如伐木片片漸斷一時頓倒亦如遠詣都城步步漸行一日頓到有云因頓修而漸悟如人學射此説運心頓修不言功行頓畢有云因漸修而漸悟如登九層之臺足履漸高所見漸遠故有人云欲窮千里目更上一層樓皆説證悟也有云先須頓悟方可漸修者此約解悟也如孩子頓生功業漸成故華嚴説初發心時即成正覺然後三賢十聖次第修證若未悟而修非真修也良以非真流之行無以稱真何有飾真之行不從真起故彼經説若未聞此法多劫修六度行畢竟不證真也有云頓悟頓修者此説上上智根性根勝故悟樂欲欲勝故修俱勝一聞千悟得大總持一念不生前後際斷斷障如斬絲萬條頓斷修行如染絲萬條頓色也荷澤云見無念體不逐物生又云一念與本性相應便具恆沙功德八萬四千波羅蜜門一時齊用也此人三業唯獨自明了餘人所不及金剛三昧經云空心不動具六波羅蜜法華亦説父母所生眼徹見三千界等也且就事迹而言之如牛頭融大師之類也此門有二意若因悟而修即是解悟若因修而悟即是證悟然上界只約今生而論若遠推宿世則唯漸無頓今頓見者已是多生漸薰而發現也有六法無頓漸頓漸在根者誠哉此理固不在言本只論機誰言法體頓漸義意有此多門內門有意非強穿鑒比見時輩論者但有頓漸之言都無分析就教有化儀之頓漸頓儀如華嚴化儀如法華應根之頓漸大不由小起名頓大由小起名漸就人有教授方便之頓漸談真空絶相名頓談事理無礙名漸根性悟入之頓漸頓如華嚴本會漸如華嚴末會發意修行之頓漸趣真如門名趣生滅門名漸於中唯云先頓悟後漸修以違返也欲絶疑者豈不見猛風頓息波浪漸停訴良頓成禮樂漸學如高貴子孫於少時亂沒落為奴生來自不知貴時清父母論得當日全身是貴人而行迹去就不可頓改故須漸學也是知頓漸之義甚為要矣勿謂頓漸多門似同不許頓漸多義有異請諸學者善須體釋鈔其第三亦約化法揀異前二從多分説此釋妨也應有問言第三亦約化法何不疏云亦約化法答有二意一頓漸二名恐濫延師以義揀之故偏云耳第三圓教前無師立無相濫故不云化法二從多分説文顯可知鈔若漸根生熟俱漸者桃兒生熟俱桃頓根生熟俱頓杏兒生熟俱杏則頓漸可分則桃杏可分上舉是也下顯非也既云未熟名漸已熟名頓既云未熟名桃已熟名杏此則於一漸根但生熟為異無別頓義此則於一桃兒但生熟為異無別杏兒言生必至熟者漸具頓也熟必從生者頓具漸也言則第一難過失等者過者越也其難過越矣或過者失也其難錯失或是遣字誤書過也故鈔云為此一通三難皆遣言況初發心時便成正覺等者縱合為一義通釋此意既得正覺尚名圓階何況分階耶問若就行布不名分階若就圓融但名圓階是則進退不明分階云何合符答就圓融而成正覺名階佛境約行布而存初心名分兩義相合名分階佛境或舉勝況劣也既初心而即成覺得名圓階若初心而即十地豈非分階耶疏隋末唐初吉藏法師等者問法華為本末耶答亦本亦末故對所攝而稱本對所歸而稱末或唯是本故鈔云又經但云除先修習學小乘者明知經意不指般若等為枝末也法華為本居然可知鈔俱無實證名不上車者故彌勒所問經論云一切聲聞辟支佛人不能如實修四無量不能究竟斷諸煩惱但能折伏一切煩惱故也又經云汝等所得涅槃非真滅度又經云若不信此法得阿羅漢果無有是處已上二乘無有實證又出現品設有菩薩等文可證菩薩無有實證若爾既無證云何出界今謂通云非是三乘聖人全無所證但彼所證實是一乘都無其三俯應權根假言三種今約一乘良斷故無三乘實證如彼三獸同渡一河實無三河非謂全無所渡之河云何到岸故賢首義分齊云若望自宗並皆得果若不得者云何出世今云俱不得者以望一乘故是以實映權即方便相盡故皆得無也若欲逈彼三人入一乘故以至自位究竟處故後皆進入別教一乘故言並無體故者所有法體奪歸一乘故説三乘無體勿謂同兔角等無故如分一品字而作三口收歸一品三口無體故言無盡生智是二乘車體者問二乘無學起此二智不若起二智云何不得若不起二智云何言出界豈煩惱不盡而出界耶答起此二智故得出界但就一乘良斷奪歸一乘故云不得又解言出界者就三乘自説言不得車據一乘傍斷但就三乘自説亦得其車但約一乘傍斷亦不出宅故賢首義分齊云若先以三乘引後令得一乘亦是三一和合攝根成二益故屬同教此如法華經説言丈六權智等者問色天四智豈非牛車答且據三乘共信故作此指或就寄化顯報作如是説言諸子皆索故者問喻中索權故經云羊車鹿車牛車願時賜與法中索實一乘根發根宜扣聖言義索者若為通會答喻就能索故分其三法從所索故為其一言謂為究竟不解索乘者賢首教義云攝益者於中有三一唯攝界內機令得出世益即以為究竟此約三乘當宗説亦如瑜伽等辨二或攝界外機令得出出世益方為究竟此有二種若先以三乘令其得出後乃方便得一乘者此即一乘三乘和合説故屬同教攝亦名逈三入一教此如法華經説若先於一乘已成解行後於出世身上證彼法者即屬別教一乘攝此如小相品説三或通攝二機令得二益此亦有二若先以三乘引出後令得一乘亦是一三和合攝機成二益故屬同教此如法華經説若界內見聞出世得法出出世證成或界內通見聞解行出世唯解行出出世唯證入此等屬別教一乘此如華嚴説今據初義故云究竟也言三乘三根者身子為上根第一周法説即解故四大聲聞為中根第二周喻説方解故五百千二百為下根第三周宿世因緣説始得解了故疏以為方便者問此言方便為實非實耶答亦實亦非實故賢首義分齊中問曰臨門三車為實不實耶答亦實亦不實何以故是方便故由是方便引子得出非不實由是方便引故非是實此二不二唯一相也鈔無虗妄咎者彼得實益故許劣與勝故疏抑諸般若及諸大乘了義之經者般若亦法了故已有抑實之過諸大乘了義之經攝華嚴勝鬘等乘法俱了故成抑實之過也疏會三為一者問此言會三為一為存為泯耶答二皆可通故賢首教義云一切三乘等本來悉是彼一乘法何以故三乘望一乘有二門故謂不異不一初不異中亦二一以三即一故不異二以一即三故不異門若據初門三即一者未知彼三為存為壞若存如何唯一若壞彼三乘機更依何法而得進修答有四一由即一故不待壞二由即一故不礙存三由即一故無不壞四由即一故無可存由初二義三乘根得有所依由後二義三乘機得入一乘由四句俱即一故是故唯有一乘更無餘也鈔此是光宅之意者此是依光宅意難清涼也言若依此宗難者就此清涼義難清涼也言昔之權實二義亦存者此是清涼通釋也此意會二歸一昔實義存無抑昔之過會三歸一昔權義存四乘義成故云二俱有理若爾光宅若作是説亦應無過若許無過清涼何得不依今謂通云不依法華定斷一代時教何所攝耶若三乘攝有抑實之過若一乘攝在昔時故彼立一乘三後一故昔時一乘非三後故彼師唯立法華為一乘故疏云若唯説法華為一實等彼若救云昔日實教四乘不稱者由比汝宗不應依彼法華定斷一代教法也昔之實教非所判也疏若開權顯實則三是一更無別一者此是取昔之義取昔三乘理行果也昔説三乘閇於一實今云無三即是開權反表有一乃是顯實言則三是一更無別一者則三乘理行果體便是一乘離此更無一乘別體故名會三為一當取昔義也鈔三乘之因同歸一果故者因字誤書應是字言開會等言並通四種者四字誤書應是三字撿鈔自知鈔中但是理行果三不言其教疏若廢權立實等者廢彼三乘權教即所廢也立此一乘實法理行果也即所立也能廢能立一乘教即法華經也鈔三外無別一實之法故云義説為四等者問前會三為一當取昔義故疏云則三是一更無別一此會三歸一當廢昔義鈔云三外無別一實之法有何別耶答前約理行果也故取此約教故廢故不同也或前約三乘有體一乘無體當取昔義此約一乘有體三乘無體當廢昔義鈔即借涅槃第二三點成伊喻者文雖傍來義乃要妙故依出現疏鈔簡略明其紀綱貴令後學易知源矣然大涅槃蓋衆聖歸源冥會之所總顯深廣包含無外寂寥無為顯深也而廣悉備顯廣也形名絶朕識智難思復拂深廣之迹今以無名強名亦為五別一釋名涅槃正名為滅取其義類乃有多方或云無作無起無為無相不識寂靜安隱解脫此等異名皆是義翻即多方也總以義翻稱為圓寂以義充法界德備塵沙曰圓體窮真性妙絶相纍為寂而言大者橫無不包竪無初際此約三德涅槃若約義開略明三義一體大自性清淨故二相大方便修淨纍方德備故三用大化用無窮故二出體性涅槃既妙絶常數恬怕希夷雖逈出百非而靡所不在今以義求不出三法即摩訶般若解脫法身以為其體所以三者翻三雜染故翻煩惱成般若翻結業為解脫翻苦依身即法身也成智斷恩故般若是智解脫是斷法身是恩兼應物恩故成法門身般若也法性身法身也應化身解脫也作用解脫故能證大智冥所證理纍永寂故然此三種不離一殊德用分異即寂之照為般若即照之寂為解脫寂照之體為法身如一明淨相離故此三法不縱不橫不並不別南北曰縱縱即竪也謂法身本有次修般若後得脫則是縱義東西曰橫謂同時異體故合為一體曰並各居一處曰別滯在此四並非涅槃故皆云不此意時則同異無礙處則合離罔滯體則一異莫拘言思叵寄故云耳爾如天之目如世之伊名祕密藏為大涅槃三顯種類雖理無統義類塵沙今自狹之寬略分一兩或唯説一即大涅槃或説有二自有三門一餘無餘小乘有二釋一有宗云涅槃體一約時不同得二名字言體一者於此宗中煩惱業苦以通力故應起不起擇滅無為是涅槃體此體是一約對身智得二名字身智未盡説前涅槃以為有餘身智盡竟向前涅槃轉名無餘非身智滅即名涅槃以此身智起已謝滅是無常故若斷因故令後不起是非擇滅故非涅槃二依成實涅槃體二生死因盡名一涅槃生死果盡名一涅槃由有宗中要道親斷方稱揀滅身口二業及生死果非道親斷故不取之成實由斷煩惱餘不起故見修斷故亦得揀滅故名涅槃然望大乘皆名有餘有變易故若依大乘遠公自有四別一云二死因盡名曰有餘二死果盡名曰無餘二曰分段因果盡名曰有餘變易因果盡名曰無餘三云分段因果及變易因盡名曰有餘變易果滅名曰無餘四者唯就變易因果為二分段因果屬小乘故又唯識云二有餘依涅槃謂即真如出生死苦煩惱説盡餘依亦滅衆苦永寂故名涅槃釋曰此通大小而説真如為體即異小乘論下料揀云如何善逝有有餘依問也雖無實依而現似有惑苦依盡説無餘依非苦依在説有餘依是故世尊可言具四餘不繁引二性淨方便淨本性淨故從因方便之所顯故亦如體用餘如別説三真與應或分為三此有二種一約三乘二即自性真應上明真應自性合真二皆約淨今皆自性通於染淨或分為四一自性清淨唯識云謂一切法相真如理雖有客染而本性淨具無數量微妙功德無生死滅湛若虗空一切有情平等共有與一切法不一不異離一切相一切分別尋思路絶名言道斷唯真聖者自內所證其性本寂故名涅槃二有餘依三無餘依四無住處唯識次云二有餘依三無餘依具如上説四無住處涅槃謂即真如出所知障大悲般若常所輔翼由斯不住生死涅槃利樂有情窮未來際用而常寂故名涅槃一切有情皆有初一二乘無學容有前三唯我世尊獨言具四也四彰業用囊括終古道達群方靡不度生靡不成就故涅槃云能建大事則出現法門皆斯用也更有餘義並如第五正釋其文恐繁不敘故上鈔云大涅槃一章必盡其體用誠不虗矣疏實不兼權者法了故實乘不了故不兼權也鈔上通別圓等者問若據核其定實唯成當教中義云何通別圓耶若據互有名通者餘之三教亦應名通皆互有故又違前文云還非二乘折法進非別圓此是三獸渡河之意等今謂通云但以無性空義別圓亦有各用當教餘義揀之故無相濫如彼終教事理無礙圓教亦具但以事事無礙揀之成別又解別圓教中所有通屬義皆通教故餘雖互有各隨增強以立異名不應別難鈔六位通者一乾慧地通三乘資糧位二性地通三乘加行地三八人地或通預流向或唯苦法智忍四見地通三乘見道位五薄地一來果六離欲地不還果七已辦地阿羅漢八辟支佛地獨覺果九菩薩地十佛地此之十地不唯一乘故名位通言九無礙同也者斷九品惑無間道也言九解脫者證九品擇滅之智也言二種涅槃者有無餘二涅槃也鈔苦有無量相等者約一界中有十千名故又經云分別諸陰有無量相悉是諸苦非是聲聞緣覺所知鈔略無無作四諦者陰入皆如無苦可捨煩惱即菩提無集可斷生死即涅槃無滅可證邊邪即中無道可修名無作也鈔一教別謂恆沙佛法者謂詮恆沙俗諦理之佛所説教法也言藏識有恆沙俗諦理者謂十梨耶九相六染五意等也上約多分故鈔云別教多約俗諦即其義也言道種智者斷界外惑歷別假觀之智也言正説中道者表自義也談事即理故談理即事故無不與實相相應故言教不偏者揀他義也通多約理別多約事故號其偏言一切種智者一智一切智遍知之智也言不斷而斷者非初非中後名不斷前中後取故名斷故經云不斷淫怒癡亦不與俱言自然而流入者流入中道也言不蹤無前後故不橫非同勝也不並非一體故不別非異處也鈔折至極微都無實色者問小乘説彼極微是其實也云何言都無實色答若更折時便成空現故云都無實色或至極微眼不得故云都無實也言體法明空者一云體謂體性體性本空不須折破如彼空華體性空故一云體謂體達體會了達本來空故迷謂有體達如空故言即三觀迤邐故成別教者如觀一有情作斯三觀先觀彼體緣生無性舉體常空是故行人恆無愛見唯修此觀恐沉空寂故出此觀次觀彼體無性緣生不壞相有是故行人恆不滯寂唯修此觀又多流散復出此觀次觀彼體空有無二佛性中道是故行人恆除邊執化而無化無化而化故下疏云月映淮流流水不將月去月臨潭上萬仞不見先沉喻菩薩常在中觀同世遷流不漂生死證真寂滅不沉涅槃又肇公云旋嵐偃嶽而常靜江河竟注而不流野馬飄鼓而不動日月歷天而不周斯亦動寂無二矣三觀別觀故有別教起鈔諸仁者是身無常等者此約生老死病四相配之緣會初起名生本無今有故無常也老奪盛色故無強為疾所侵是無力死來壞滅故無堅已約粗事無常也亦云一期無常速朽之法不可信也者此約細無常也亦云剎那無常若悟無常可得四沙門果鈔法華無復兼但對帶唯説圓教者問法華云三界無安猶如火宅世界不牢固如水沫泡焰即藏教也我等同入法性即通教也金色三十二十力諸解脫同共一法中而不得此事大非小分即別教也何故言唯説圓教答皆是敘昔之義而非所取問三草二木不同豈非是別答一時所生一雨所潤故屬圓教也言不斷淫怒癡緣生無性故不可斷亦不與俱無性緣生故可斷可滅也不壞於身十身歷然行布成而隨一相十身相作圓融也不滅癡愛起於明脫者妄想弗煎而廊徹性空靈鑒匪磨而頓朗萬法也鈔新舊醫之喻者彼云譬如國王暗鈍少智有一醫師往復頑嚚而王不別厚賜捧祿療治衆病純以乳藥亦復不知病起根源雖服乳藥復不善解或有風病冷病熱病一切諸病悉教服乳復有明醫曉八種術善療衆病知諸方藥從遠方來即為王説種種醫方王聞敬信知舊癡騃驅令出國令衆斷乳以種種藥療治衆病皆得安樂等是也言謂十善道者不煞不盜不邪淫等也言曉八種術者一知病體二知病因三知病相四知病處五知病時六知病藥七知治者八知禁者言五種得戒者善來見諦三歸八敬羯磨言無作有作者即表無表也言五部毗尼是也者一大衆二法藏三一切有四飲光五化地言八背捨者即八解脫也言入九次第定等者色界四無色界四及滅盡定也言六十二見者一云於色蘊上起四見一我見二我所見僮僕一瓔珞二窟宅三也餘四蘊上各四故成二十三世別開以成六十并本身邊二見成六十二見此非正説二云法苑有六十二見章常見四十斷見有七邪見十五須者應撿言十一智者一法二類三苦四集五滅六道七他心八世俗九盡十無生十一如實也言三無漏根者一當知二已知三俱知也鈔故法句經云等者彼經六度皆有其偈布施偈云説諸布施福於中三事空究竟不可得施福如野馬戒云若説諸持戒無善無威儀戒性如虗空持者為迷倒忍云若見嗔恚者以忍為鞅知嗔等陽焰忍亦無所忍精進云若起精進心是妄非精進若能心不妄精進無有涯定云若學諸三昧是動非坐禪心隨境界流云何名為定般若云森羅及萬像一法之所印云何一法中而生種種見一亦不為一為欲破諸數淺智之所聞一見以為一結云若有聞斯法常修寂滅行知行亦寂滅是則菩薩道言般若無知者無妄知也鈔謂三僧企耶別修六度各有滿時者俱舍論第十八説於三無數劫各供養七萬又如次供養五六七千佛三無數劫滿逆次逢勝觀然燈寶髻佛初釋迦牟尼釋曰此二偈中初偈明法供養佛數謂初無數劫供養七萬五千佛第二無數劫供養七萬六千佛第三無數劫供養七萬七千佛後頌明逢何佛言逆次者從第三無數劫向前以明謂第三無數劫滿逢勝觀佛第二無數劫滿逢然燈佛第一無數劫滿逢寶髻佛最初發心逢釋迦牟尼佛發誓願言願我當作佛一如今世尊上明小乘定歷三祇然後成佛未審大乘時劫云何準下鈔云且如娑婆方之安養一劫名曰一日則安樂世界乃經三無數日爾更方袈裟幢剎未經歲月況於後後以劫為日之剎耶是則不可以此一方類定於成佛時劫之數二果類剎者即於一界即具諸界互不相見時劫亦殊安知修短故朝菌不知晦朔況春秋耶況於大椿之歲也寶雲經云善男子菩薩不能思議如來境界不可思量但為淺近衆生説三僧祇修習所得菩提而實發心已來不可計數賢首釋云不可計者不可計數阿僧祇也義分齊云若依小乘自有三人下根者謂諸聲聞極疾三生漏盡得果極遲經六十劫中根者謂獨覺人極疾四生得果極遲徑百劫上根者謂佛定滿三僧祇劫此中劫數取水火等一劫為一數十箇一為第二數如是展轉至第六十為一阿僧祇依此以數三僧祇也若依大乘修行成佛定徑三僧祇但此劫數不同小乘何者此取水火等大劫數至百千數此復至百千為一俱梨名第一數數此俱梨復至俱梨為第二數如是次第次取數等能數至第一百名一阿僧祇此即十大數中第一數也依此數滿三僧祇仍説百劫修相好等智度論破此別修相好不許三祇之外別修即是實教之意然實教之意自有二義一定三僧祇一方化儀故又是實佛故起信論云或示超地速成正覺以為怯弱衆生故或説我於無量阿僧祇劫當成佛道以為懈怠衆生故能示如是無量方便不可思議而實菩薩種性根等發心則等所證亦等無有超過方法以一切菩薩皆經三阿僧祇劫故斯則定也二者不定復有二意一為通餘雜類世界故如勝天王説即前樹形等是二據佛德無限故如寶雲經若約別教一乘融攝以説如毗目仙人執善財手時經多劫處歷無邊故不可以長短思之也若顯超勝一生頓圓若約甚深多劫莫窮故云不可定執貴在入玄言三十四心者十六心中八忍正斷三界分別煩惱兼斷下八地俱生煩惱於中八智證彼所顯擇滅無為所謂苦法智忍一苦法智二苦類智忍三苦類智四苦諦有四既爾集滅道諦各四亦然故有十六非想一地九品俱生煩惱無上可欣世道不伏前十六心不能斷除別起故九無間道斷惑九解脫道證理並前十六共成三十四心問藏教之中説大乘故天台不名小乘以為順理者清涼立作小教豈不違耶答天台但據所説有大乘故清涼却據能説唯小乘故且如佛説經談外道義不名佛教耶彼既不隨所説但就能説名為佛教此何不爾鈔不詮別理者不詮法空理也不斷別惑者不斷所智障也言一相無相者謂一真空相無彼虗妄想故言又已得故者前藏教初對舊醫戒定慧故創得新醫戒定慧故可立三藏之名通教重得故不建號如極善地預流果從初建號故或前教已得藏名後教不可重立若重立時即有相濫故言異生滅三者三學各具無量相故三學同以一理統之故言不可得空者帶妙有之空故言雖説歷別等者此意縱圓教中有行布義奪歸圓融但屬圓教不屬別教若爾何故次段鈔云迷其行布謂為別教但取圓融以為圓教答彼師本意帶圓融行布奪歸圓教單行布義判屬別教華嚴一經具二行布地前行布帶彼圓融判歸圓教地上行布不帶圓融判歸別教故問何故聖教更互而説答有深所以故賢首云謂如三乘中亦有説因陀羅微細等而主伴不具或亦説華藏世界而不説十等或一乘中亦有三乘法相謂以十眼中亦具有五眼十通中亦有六通等而義理皆別此則一乘垂於三乘三乘參於一乘是則兩宗交接連綴引攝成根欲性令入別教一乘故疏未明法空名別等者謂唯説生空狹故名別復説法空寬故名通鈔良以自謙者故周易謙卦云謙亨君子有終彖曰謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也釋曰衆卦之內唯彼卦而無咎諸師立義獨此師而無非矣疏二謂小乘於真如隨緣不變等者此疏言略具足應云於真如隨緣不變二分義中唯得不變故名一分二空之中唯説生空所顯之理故名為半鈔儒教等者優柔弘潤於物必濟曰儒用之不匱於物必通曰道其九流七經等前文已具疏既得不變一分豈名為滿者問彼據義別立名故異何得相從而伸其難豈非異門難異門耶答約義雖殊立名不便何者頗有智者呼五尺人為短長漢望六尺人故號其短對四尺人又號其長亦就義別不容他難者準此所破但破第三何故科文云破後三顯破第三影兼餘二謂此分滿之名不立餘二分滿之名豈成又所對分滿二名不立能對半滿兩號寧存科破後三誠不虗矣復有漸頓安辨偏圓不曉等過疏略不言學者準知鈔歲次娵觜者星名也雅云娵觜之口營室東壁四方似口因立名也若準陰陽有年直月直日直時直等此或年直月直也鈔前四名即衍公四宗義在立宗之初者下文云一因緣宗謂薩婆多顯正因緣立有緣果之性二假名宗謂即經部破於定性但從緣有萬法從緣故無定實如鐵之堅過火即鎔如水之濕遇寒即堅明知從緣即無定性假名而有三不真宗諸諸般若第二但破於性而有其相如會指成拳雖無定性非無拳相今復破之明性相俱空為法空矣四真實宗謂法性真理佛性等教第三但除妄計以顯空義未彰妙有不空真性今此方顯妙有之真性又第一宗是因緣所生法第三宗即我説即我説即是空第二宗又為是假名第四亦是中道義故此不敘録摘文解真身與法界合其體等三江同一法身雲約十地身十佛依起無礙非情佛體色究竟天菩薩示高大身十地功德若不融前義亦失經宗十類衆因果二分古有多説十二部修多羅儒夫子為主三科三十七品十二分教海沖深四辨八音四輪不生滅四諦十二支初發心時便成正覺開得多失少出現十喻或有國土唯説三乘十異四句四頓四漸俱以喻顯會三為一三點成伊三僧祇修六度三十四心雖説歷別衍公四宗大宋咸淳第七辛未歲春中月下七日於宋朝湖州思溪法寶禪寺借得行在南山高麗教寺之祕本謹以寫留之畢執筆沙門辨智
